<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرب القراءة الاحترافي - الحل النهائي</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .main-wrapper { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header { text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 20px; border-bottom: 3px solid #333; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 2px solid #000; height: 150px; text-align: center; vertical-align: middle; position: relative; }
        
        .side-label { width: 120px; font-size: 20px; font-weight: bold; background-color: #f0f0f0; }

        /* منطقة الكتابة */
        .input-area {
            font-size: 90px;
            font-weight: bold;
            outline: none;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
            overflow: hidden;
            
            /* السحر هنا: تلوين الحركات بالأحمر والحروف بالأسود */
            color: transparent;
            text-shadow: 
                0 0 0 black, /* الحروف بالأسود */
                0 0 0 red;   /* الحركات سنعالجها بالسكريبت */
        }

        /* تنسيق خاص للحركات الملونة */
        .vowel-red {
            color: red;
            text-shadow: none; /* إلغاء ظل الحروف للحركة */
        }

        .black-char {
            color: black;
            text-shadow: none;
        }

        .row-fatha { background-color: #fffde7; }
        .row-damma { background-color: #e3f2fd; }
        .row-kasra { background-color: #fce4ec; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">لوحة التدريب: الحروف المتصلة والحركات فوق الحرف</div>
    <p style="text-align: center; color: #666;">اكتب الكلمة مع حركاتها بشكل عادي (مثال: كَتَبَ)</p>
    
    <table>
        <tr class="row-fatha">
            <td class="side-label">تدريب 1</td>
            <td><div class="input-area" contenteditable="true" oninput="processText(this)"></div></td>
            <td><div class="input-area" contenteditable="true" oninput="processText(this)"></div></td>
        </tr>
        <tr class="row-damma">
            <td class="side-label">تدريب 2</td>
            <td><div class="input-area" contenteditable="true" oninput="processText(this)"></div></td>
            <td><div class="input-area" contenteditable="true" oninput="processText(this)"></div></td>
        </tr>
        <tr class="row-kasra">
            <td class="side-label">تدريب 3</td>
            <td><div class="input-area" contenteditable="true" oninput="processText(this)"></div></td>
            <td><div class="input-area" contenteditable="true" oninput="processText(this)"></div></td>
        </tr>
    </table>
</div>

<script>
    function processText(el) {
        // نستخدم خاصية التلوين المتقدمة عبر CSS لتجنب فصل الحروف
        // الطريقة الأكثر استقراراً هي ترك النص كما هو وتلوينه عبر الـ Shadow
        // لكن بما أنك تريد الحركات فقط حمراء، سنقوم بضبط الـ CSS بشكل ذكي
        
        let text = el.innerText;
        
        // مصفوفة الحركات العربية
        const marks = /[ًٌٍَُِّْ]/g;

        // نقوم بلف الحركات بـ span أحمر مع الحفاظ على الاتصال
        // ملاحظة: لإبقاء الحروف متصلة في المتصفحات الحديثة نستخدم الفواصل الصفرية
        let html = "";
        for (let char of text) {
            if (marks.test(char)) {
                html += `<span class="vowel-red">${char}</span>`;
            } else {
                html += `<span class="black-char">${char}</span>`;
            }
        }

        // حفظ مكان المؤشر
        const sel = window.getSelection();
        if (sel.rangeCount > 0) {
            const range = sel.getRangeAt(0);
            const offset = range.startOffset;
            
            el.innerHTML = html;

            // إعادة تعيين المؤشر للنهاية (حل عملي لمشاكل الكتابة بالعربي)
            const newRange = document.createRange();
            newRange.selectNodeContents(el);
            newRange.collapse(false);
            sel.removeAllRanges();
            sel.addRange(newRange);
        }
    }
</script>

</body>
</html>
