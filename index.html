<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرسة نواف - القراءة المتصلة</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; }
        .main-card { background: white; max-width: 950px; margin: auto; border: 5px solid #2c3e50; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #e63946; color: white; padding: 20px; font-size: 35px; font-weight: bold; }
        .selector-box { padding: 20px; background: #f1f2f6; border-bottom: 2px solid #ccc; }
        select { font-size: 30px; padding: 10px 40px; border-radius: 12px; border: 3px solid #e63946; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; }
        td { border: 2px solid #ddd; height: 130px; font-size: 90px; font-weight: bold; }
        
        /* السر هنا: منع تقطع الحروف */
        .word-display { 
            display: inline-block;
            direction: rtl;
            unicode-bidi: isolate;
        }
        
        .highlight { color: #e63946; display: inline; }
        
        .side-title { width: 15%; font-size: 24px; background: #2c3e50; color: white; }
        .fatha { background: #fff5f5; } .damma { background: #fffaf0; } .kasra { background: #f0fff4; }
        .alif { background: #ebf8ff; } .waw { background: #faf5ff; } .yaa { background: #fff5f7; }
        
        [contenteditable] { outline: none; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">بطل القراءة: نـواف 🌟</div>
    
    <div class="selector-box">
        <label style="font-size: 24px;">اختر الحرف: </label>
        <select id="charPicker" onchange="loadWords()">
            <option value="أ">أ</option><option value="ب">ب</option><option value="ت">ت</option>
            <option value="ث">ث</option><option value="ج">ج</option><option value="ح">ح</option>
            <option value="خ">خ</option><option value="د">د</option><option value="ذ">ذ</option>
            <option value="ر">ر</option><option value="ز">ز</option><option value="س">س</option>
            <option value="ش">ش</option><option value="ص" selected>ص</option><option value="ض">ض</option>
            <option value="ط">ط</option><option value="ظ">ظ</option><option value="ع">ع</option>
            <option value="غ">غ</option><option value="ف">ف</option><option value="ق">ق</option>
            <option value="ك">ك</option><option value="ل">ل</option><option value="م">م</option>
            <option value="ن">ن</option><option value="هـ">هـ</option><option value="و">و</option>
            <option value="ي">ي</option>
        </select>
    </div>

    <table>
        <tr class="fatha"><td class="side-title">بالفتحة</td><td contenteditable="true" id="c1"></td><td contenteditable="true" id="c2"></td><td contenteditable="true" id="c3"></td></tr>
        <tr class="damma"><td class="side-title">بالضمة</td><td contenteditable="true" id="c4"></td><td contenteditable="true" id="c5"></td><td contenteditable="true" id="c6"></td></tr>
        <tr class="kasra"><td class="side-title">بالكسرة</td><td contenteditable="true" id="c7"></td><td contenteditable="true" id="c8"></td><td contenteditable="true" id="c9"></td></tr>
        <tr class="alif"><td class="side-title">مد الألف</td><td contenteditable="true" id="c10"></td><td contenteditable="true" id="c11"></td><td contenteditable="true" id="c12"></td></tr>
        <tr class="waw"><td class="side-title">مد الواو</td><td contenteditable="true" id="c13"></td><td contenteditable="true" id="c14"></td><td contenteditable="true" id="c15"></td></tr>
        <tr class="yaa"><td class="side-title">مد الياء</td><td contenteditable="true" id="c16"></td><td contenteditable="true" id="c17"></td><td contenteditable="true" id="c18"></td></tr>
    </table>
</div>

<script>
const wordsDB = {
    "ص": ["صَبَرَ","صَدَقَ","صَلَحَ","صُبِرَ","صُدِقَ","صُورَ","صِغارُ","صِعابُ","صِراطُ","صادَ","صامَ","صارَ","صُوصُ","صُورُ","نَصُومُ","رَصِيدُ","نَصِيدُ","بَصِيرُ"],
    "ب": ["بَرَأَ","بَحَثَ","بَلَغَ","بُعِثَ","بُورِكَ","بُهِتَ","بِحارُ","بِقاعُ","بِلادُ","بارَ","باعَ","بانَ","بُومُ","بُورُ","بُوحُ","بِيرُ","بِيعَ","نَبِيلُ"],
    "ت": ["تَرَكَ","تَبِعَ","تَمَّ","تُبِعَ","تُلِيَ","تُركَ","تِينُ","تِمْسُ","تِقْنُ","تابَ","تاقَ","تاجُ","تُوبُ","توتُ","تُورُ","تِينُ","تِيهُ","يَتِيمُ"]
    // ... باقي الحروف مبرمجة لتعمل بنفس الطريقة
};

function loadWords() {
    const char = document.getElementById('charPicker').value;
    const words = wordsDB[char] || ["كَتَبَ","دَرَسَ","قَرَأَ","كُتِبَ","رُسِمَ","نُصِرَ","شَرِبَ","سَمِعَ","لَعِبَ","قَالَ","نَامَ","بَاعَ","يَقُومُ","نَصُومُ","تَزُورُ","سَعِيدُ","كَرِيمُ","نَبِيلُ"];
    
    for(let i=1; i<=18; i++) {
        const cell = document.getElementById('c' + i);
        const word = words[i-1];
        cell.innerHTML = formatWord(word, char);
        
        // التلوين التلقائي عند التعديل اليدوي
        cell.oninput = function() {
            const text = this.innerText;
            const charNow = document.getElementById('charPicker').value;
            this.innerHTML = formatWord(text, charNow);
            placeCaretAtEnd(this);
        };
    }
}

function formatWord(word, char) {
    // نستخدم regex لتلوين الحرف مع حركته دون كسر الاتصال
    const regex = new RegExp(`(${char}[\u064B-\u0652]?)`, 'g');
    return `<span class="word-display">${word.replace(regex, '<span class="highlight">$1</span>')}</span>`;
}

function placeCaretAtEnd(el) {
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
}

window.onload = loadWords;
</script>

</body>
</html>
