    <style>
        :root { --main-red: #e63946; --dark-blue: #2c3e50; }
        body { font-family: 'Arial', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .container { background: white; max-width: 1000px; margin: auto; border: 4px solid var(--dark-blue); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--main-red); color: white; padding: 20px; font-size: 32px; font-weight: bold; border-bottom: 5px solid #b91c1c; text-align: center; }
        .controls { padding: 20px; background: #eee; text-align: center; border-bottom: 2px solid #ddd; }
        select { font-size: 28px; padding: 10px 40px; border-radius: 12px; border: 3px solid var(--main-red); font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 1px solid #ccc; height: 130px; font-size: 85px; font-weight: bold; text-align: center; position: relative; }
        
        /* تلوين الحرف مع الحركة بشكل يمنع التقطع */
        .hl { color: var(--main-red); display: inline; }
        
        .side { width: 130px; font-size: 22px; background: var(--dark-blue); color: white; }
        .r1 { background: #fff5f5; } .r2 { background: #fffaf0; } .r3 { background: #f0fff4; }
        .r4 { background: #ebf8ff; } .r5 { background: #faf5ff; } .r6 { background: #fff5f7; }
        
        .editable { outline: none; display: block; width: 100%; height: 100%; line-height: 130px; }
        .footer { padding: 15px; font-size: 24px; color: var(--main-red); font-weight: bold; text-align: center; }
    </style>
</head>

    <div class="controls">

// تهيئة القائمة المنسدلة
function setup() {
    const sel = document.getElementById('charSelector');
    for (let c in db) {
        let o = document.createElement('option');
        o.value = c; o.text = c;
        if(c === "ص") o.selected = true;
        sel.add(o);
    }
    applyAll();
}

// الوظيفة الأساسية للتحديث
function applyAll() {
    const char = document.getElementById('charSelector').value;
    const words = db[char];
    for (let i = 1; i <= 18; i++) {
        const td = document.getElementById('td' + i);
        // نستخدم div داخل الـ td لضمان التعديل وسهولة التلوين
        td.innerHTML = `<div contenteditable="true" class="editable" oninput="colorMe(this)">${words[i-1]}</div>`;
        colorMe(td.firstChild);
    }
}

// محرك التلوين الذكي
function colorMe(el) {
    let text = el.innerText;
    const char = document.getElementById('charSelector').value;
    
    // التعامل مع الحالات الخاصة (مثل الهاء والتاء المربوطة أو الألفات)
    let searchPattern = char;
    if (char === "أ") searchPattern = "[أإآا]";
    if (char === "هـ") searchPattern = "[هـه]";
    
    // Regex يبحث عن الحرف + التشكيل
    const regex = new RegExp(`(${searchPattern}[\u064B-\u0652]?)`, 'g');
    
    // حفظ مكان الماوس
    const selection = window.getSelection();
    const range = selection.rangeCount > 0 ? selection.getRangeAt(0) : null;
    const offset = range ? range.startOffset : 0;

    el.innerHTML = text.replace(regex, `<span class="hl">$1</span>`);

    // إرجاع الماوس لمكانه
    if (range) {
        const newRange = document.createRange();
        const textNodes = Array.from(el.childNodes);
        // محاولة بسيطة لإرجاع الماوس في حالة الكتابة
        newRange.setStart(el, el.childNodes.length > 0 ? 1 : 0); 
        newRange.collapse(true);
    }
}

window.onload = setup;
