<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرب القراءة الاحترافي</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .main-wrapper { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 2px solid #000; height: 140px; text-align: center; vertical-align: middle; }
        
        .side-label { width: 120px; font-size: 22px; font-weight: bold; background-color: #f8f9fa; }

        /* التنسيق السحري لإبقاء الحروف متصلة */
        .word-input {
            font-size: 80px;
            font-weight: bold;
            color: black;
            outline: none;
            width: 100%;
            height: 100%;
            display: inline-block;
            line-height: 140px;
            /* منع المتصفح من كسر الحروف عند التلوين */
            font-variant-ligatures: common-ligatures;
        }

        /* تلوين الحركات دون كسر الاتصال */
        .word-input [contenteditable] { white-space: nowrap; }

        /* الألوان التوضيحية للصفوف */
        .row-1 { background-color: #fffde7; }
        .row-2 { background-color: #e3f2fd; }
        .row-3 { background-color: #fce4ec; }

        .red-mark {
            color: red;
            /* نكبر الحركة قليلاً لتظهر بوضوح لنواف */
            font-size: 1.1em; 
        }

        .header { font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 20px; border-bottom: 3px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">لوحة الحركات المتصلة الذكية</div>
    <p style="text-align: center; color: #666;">اكتب الكلمة كاملة مع حركاتها (ستبقى الحروف متصلة والحركات حمراء)</p>
    
    <table>
        <tr class="row-1">
            <td class="side-label">تدريب 1</td>
            <td><div class="word-input" contenteditable="true" oninput="applyMagicColor(this)"></div></td>
            <td><div class="word-input" contenteditable="true" oninput="applyMagicColor(this)"></div></td>
        </tr>
        <tr class="row-2">
            <td class="side-label">تدريب 2</td>
            <td><div class="word-input" contenteditable="true" oninput="applyMagicColor(this)"></div></td>
            <td><div class="word-input" contenteditable="true" oninput="applyMagicColor(this)"></div></td>
        </tr>
        <tr class="row-3">
            <td class="side-label">تدريب 3</td>
            <td><div class="word-input" contenteditable="true" oninput="applyMagicColor(this)"></div></td>
            <td><div class="word-input" contenteditable="true" oninput="applyMagicColor(this)"></div></td>
        </tr>
    </table>
</div>

<script>
    function applyMagicColor(el) {
        let text = el.innerText;
        if (!text) return;

        // مصفوفة الحركات
        const marks = /[ًٌٍَُِّْ]/g;
        
        // استخدام "Zero Width Joiner" لإجبار المتصفح على وصل الحروف
        // لكن الحل الأبسط هو تلوين النص بالكامل ثم استخدام خلفية ذكية
        // هنا سنستخدم الاستبدال مع التأكد من عدم وجود مسافات
        let html = text.replace(marks, (match) => `<span class="red-mark">${match}</span>`);
        
        // حفظ موضع المؤشر
        const selection = window.getSelection();
        const range = selection.getRangeAt(0);
        const pos = range.startOffset;

        el.innerHTML = html;

        // إعادة المؤشر للنهاية (لأن التعديل على HTML يعيد تعيينه)
        const newRange = document.createRange();
        newRange.selectNodeContents(el);
        newRange.collapse(false);
        selection.removeAllRanges();
        selection.addRange(newRange);
    }
</script>

</body>
</html>
