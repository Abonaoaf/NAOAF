<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة نواف - الإصدار الثابت</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main-red: #e63946; --dark-blue: #2c3e50; }
        body { font-family: 'Arial', sans-serif; background-color: #f8f9fa; padding: 20px; text-align: center; }
        .container { background: white; max-width: 1000px; margin: auto; border: 4px solid var(--dark-blue); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { background: var(--main-red); color: white; padding: 15px; font-size: 28px; font-weight: bold; }
        .status-bar { background: #34495e; color: #fff; padding: 5px; font-size: 14px; }
        .controls { padding: 15px; background: #eee; border-bottom: 2px solid #ddd; }
        select { font-size: 22px; padding: 5px 20px; border-radius: 8px; border: 2px solid var(--main-red); font-weight: bold; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 10px 25px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 1px solid #ccc; height: 110px; font-size: 70px; font-weight: bold; text-align: center; vertical-align: middle; }
        .hl { color: var(--main-red); display: inline; }
        .side { width: 110px; font-size: 18px; background: var(--dark-blue); color: white; }
        .editable { outline: none; display: block; width: 100%; height: 100%; line-height: 110px; }
        .r1 { background: #fff5f5; } .r2 { background: #fffaf0; } .r3 { background: #f0fff4; }
        .r4 { background: #ebf8ff; } .r5 { background: #faf5ff; } .r6 { background: #fff5f7; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مدرسة نواف التعليمية 🌟</div>
    <div id="status" class="status-bar">جاري تشغيل النظام...</div>
    
    <div class="controls">
        <label style="font-size: 18px; font-weight: bold;">اختر الحرف: </label>
        <select id="charSelector" onchange="loadData()">
            </select>
        <button class="btn-save" onclick="uploadData()">حفظ في السحابة 💾</button>
    </div>

    <table>
        <tr class="r1"><td class="side">الفتحة</td><td id="td1"></td><td id="td2"></td><td id="td3"></td></tr>
        <tr class="r2"><td class="side">الضمة</td><td id="td4"></td><td id="td5"></td><td id="td6"></td></tr>
        <tr class="r3"><td class="side">الكسرة</td><td id="td7"></td><td id="td8"></td><td id="td9"></td></tr>
        <tr class="r4"><td class="side">مد الألف</td><td id="td10"></td><td id="td11"></td><td id="td12"></td></tr>
        <tr class="r5"><td class="side">مد الواو</td><td id="td13"></td><td id="td14"></td><td id="td15"></td></tr>
        <tr class="r6"><td class="side">مد الياء</td><td id="td16"></td><td id="td17"></td><td id="td18"></td></tr>
    </table>
</div>

<script>
// --- هام جداً: ضع بياناتك هنا ليعمل الحفظ السحابي ---
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
};

// تشغيل Firebase بأمان (لن يتوقف الكود إذا كانت البيانات خاطئة)
try {
    firebase.initializeApp(firebaseConfig);
} catch (e) {
    console.log("Firebase config not set yet.");
}

const database = firebase.database();

const autoWordsDB = {
    "أ": ["أَكَلَ","أَمَرَ","أَخَذَ","أُكِلَ","أُمِرَ","أُخِذَ","إِبِلِ","إِذَنِ","إِرَمِ","آدَمُ","آكَلَ","آخَرُ","أُوبُ","أُودُ","أُورُ","إِيمَ","إِيَادُ","إِيهِ"],
    "ب": ["بَرَأَ","بَحَثَ","بَلَغَ","بُعِثَ","بُهِتَ","بُورِكَ","بِحَارُ","بِقَاعُ","بِلادُ","بَارَ","بَاعَ","بَانَ","بُومُ","بُورُ","بُوحُ","بِيرُ","بِيعَ","نَبِيلُ"],
    "ص": ["صَبَرَ","صَدَقَ","صَلَحَ","صُبِرَ","صُدِقَ","صُورَ","صِغارُ","صِعابُ","صِراطُ","صادَ","صامَ","صارَ","صُوصُ","صُورُ","نَصومُ","صِيـدَ","رَصِيـدُ","عَصِيـرُ"],
    // بقية الحروف ستستخدم كلمات افتراضية
};

const allChars = "أبتثجحخدذرزمسشصضطظعغفقكلمنهـوي";

window.onload = function() {
    const sel = document.getElementById('charSelector');
    for (let c of allChars) {
        let opt = document.createElement('option');
        opt.value = c; opt.text = c;
        if(c === "ص") opt.selected = true;
        sel.add(opt);
    }
    loadData();
};

function loadData() {
    const char = document.getElementById('charSelector').value;
    const status = document.getElementById('status');
    
    // 1. عرض الكلمات الجاهزة أولاً لضمان عدم الاختفاء
    const words = autoWordsDB[char] || ["كَتَبَ","دَرَسَ","قَرَأَ","كُتِبَ","رُسِمَ","نُصِرَ","شَرِبَ","سَمِعَ","لَعِبَ","قَالَ","نَامَ","بَاعَ","يَقُومُ","نَصُومُ","تَزُورُ","سَعِيدُ","كَرِيمُ","نَبِيلُ"];
    
    for (let i = 1; i <= 18; i++) {
        const cell = document.getElementById('td' + i);
        cell.innerHTML = `<div contenteditable="true" class="editable" oninput="applyColor(this)">${words[i-1] || ''}</div>`;
        applyColor(cell.firstChild);
    }

    // 2. محاولة جلب تعديلاتك من السحابة إذا كانت الإعدادات موجودة
    try {
        database.ref('nawaf_educational_data/' + char).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const cloudWords = snapshot.val();
                for (let i = 1; i <= 18; i++) {
                    const cell = document.getElementById('td' + i);
                    cell.firstChild.innerText = cloudWords[i-1];
                    applyColor(cell.firstChild);
                }
                status.innerText = "✅ تم تحميل تعديلاتك من السحابة";
            } else {
                status.innerText = "🤖 عرض الكلمات الآلية (لا توجد تعديلات سحابية لهذا الحرف)";
            }
        });
    } catch (e) {
        status.innerText = "⚠️ يعمل في وضع عدم الاتصال (يرجى ضبط Firebase)";
    }
}

function uploadData() {
    const char = document.getElementById('charSelector').value;
    const words = [];
    for (let i = 1; i <= 18; i++) {
        words.push(document.getElementById('td' + i).innerText);
    }
    
    try {
        database.ref('nawaf_educational_data/' + char).set(words).then(() => {
            alert("تم حفظ التعديلات في السحابة بنجاح! ✅");
        }).catch(err => alert("خطأ: تأكد من إعدادات Firebase والقواعد (Rules)"));
    } catch (e) {
        alert("فشل الحفظ: لم يتم ربط Firebase بشكل صحيح.");
    }
}

function applyColor(el) {
    let content = el.innerText;
    const activeChar = document.getElementById('charSelector').value;
    let pattern = (activeChar === "أ") ? "[أإآا]" : (activeChar === "هـ") ? "[هـه]" : activeChar;
    const regex = new RegExp(`(${pattern}[\u064B-\u0652]?)`, 'g');
    
    el.innerHTML = content.replace(regex, `<span class="hl">$1</span>`);
    
    // إعادة المؤشر لمكانه
    const range = document.createRange();
    const sel = window.getSelection();
    range.selectNodeContents(el);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
}
</script>
</body>
</html>
