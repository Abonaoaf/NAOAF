<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم القراءة مع نواف</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border: 4px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #f9f9f9;
            text-align: center;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid #eee;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 20px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
        }
        /* القائمة الجانبية */
        .side-label {
            width: 120px;
            font-size: 18px;
            color: #fff;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            padding: 10px;
        }
        /* ألوان الصفوف لتسهيل التمييز */
        .row-fatha { background-color: #fff5f5; }
        .side-fatha { background-color: #e53e3e; }
        
        .row-damma { background-color: #fffaf0; }
        .side-damma { background-color: #dd6b20; }
        
        .row-kasra { background-color: #f0fff4; }
        .side-kasra { background-color: #38a169; }
        
        .row-alif { background-color: #ebf8ff; }
        .side-alif { background-color: #3182ce; }
        
        .row-waw { background-color: #faf5ff; }
        .side-waw { background-color: #805ad5; }
        
        .row-yaa { background-color: #fff5f7; }
        .side-yaa { background-color: #d53f8c; }

        .footer {
            text-align: center;
            padding: 15px;
            background: #fff;
            color: #e53e3e;
            font-weight: bold;
            font-size: 20px;
        }
        .highlight { color: #e53e3e; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">نشاط قرائي للبطل <span class="highlight">نواف</span></div>
    
    <table>
        <tr class="row-fatha">
            <td class="side-label side-fatha">بالفتحة</td>
            <td>دَرَسَ</td>
            <td>قَرَأَ</td>
            <td>كَتَبَ</td>
        </tr>
        
        <tr class="row-damma">
            <td class="side-label side-damma">بالضمة</td>
            <td>كُتِبَ</td>
            <td>رُسِمَ</td>
            <td>نُصِرَ</td>
        </tr>
        
        <tr class="row-kasra">
            <td class="side-label side-kasra">بالكسرة</td>
            <td>شَرِبَ</td>
            <td>سَمِعَ</td>
            <td>لَعِبَ</td>
        </tr>
        
        <tr class="row-alif">
            <td class="side-label side-alif">مد الألف</td>
            <td>صَادَ</td>
            <td>نَامَ</td>
            <td>قَامَ</td>
        </tr>
        
        <tr class="row-waw">
            <td class="side-label side-waw">مد الواو</td>
            <td>صُوصُ</td>
            <td>نَصُومُ</td>
            <td>يَقُومُ</td>
        </tr>
        
        <tr class="row-yaa">
            <td class="side-label side-yaa">مد الياء</td>
            <td>رَصِيدُ</td>
            <td>نَصِيدُ</td>
            <td>سَعِيدُ</td>
        </tr>
    </table>

    <div class="footer">نقرأ كثيراً حتى نقرأ سريعاً بإذن الله</div>
</div>

</body>
</html>
