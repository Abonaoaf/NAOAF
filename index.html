<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>السبورة التفاعلية - مدرسة الحروف</title>
    <style>
        :root {
            --primary-color: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50; /* لون خلفية غامق كالسبورة */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .board {
            width: 90%;
            max-width: 800px;
            background-color: white;
            color: #333;
            border: 10px solid #8d6e63; /* إطار خشبي */
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }

        .harakat-btns {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .harakat-btns button {
            font-size: 24px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            border: 2px solid #e74c3c;
            background: white;
            border-radius: 8px;
            color: #e74c3c;
            transition: 0.3s;
        }

        .harakat-btns button:hover {
            background: #e74c3c;
            color: white;
        }

        #displayWord {
            font-size: 120px; /* خط كبير جداً للسبورة */
            margin: 40px 0;
            min-height: 150px;
            font-weight: bold;
        }

        .highlight {
            color: var(--primary-color);
        }

        input[type="text"] {
            font-size: 24px;
            padding: 10px;
            width: 80%;
            text-align: center;
            border-radius: 5px;
            border: 2px solid #ddd;
        }

        .flipped-zone {
            font-size: 30px;
            color: #95a5a6;
            border-top: 1px dashed #ccc;
            padding-top: 10px;
        }

        .color-picker {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <h2 style="color: #ecf0f1;">🎨 سبورة الحروف التفاعلية</h2>

    <div class="controls">
        <div>
            <label>اختر الحرف:</label>
            <select id="charSelect" onchange="updateBoard()">
                </select>
        </div>

        <div class="color-picker">
            <label>لون التمييز:</label>
            <input type="color" id="colorPicker" value="#e74c3c" onchange="updateColor()">
        </div>
    </div>

    <div class="harakat-btns" id="harakatZone">
        <button onclick="addHaraka('َ')"> َ </button>
        <button onclick="addHaraka('ُ')"> ُ </button>
        <button onclick="addHaraka('ِ')"> ِ </button>
        <button onclick="addHaraka('ْ')"> ْ </button>
        <button onclick="addHaraka('ً')"> ً </button>
        <button onclick="addHaraka('ٌ')"> ٌ </button>
        <button onclick="addHaraka('ٍ')"> ٍ </button>
        <button onclick="addHaraka('ّ')"> ّ </button>
    </div>

    <div class="board">
        <input type="text" id="wordInput" placeholder="اكتب الكلمة هنا..." oninput="updateBoard()">
        
        <div id="displayWord"></div>

        <div class="flipped-zone">
            <span>الشقلبة: </span>
            <span id="flippedWord"></span>
        </div>
    </div>

    <script>
        const chars = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
        const charSelect = document.getElementById('charSelect');
        const wordInput = document.getElementById('wordInput');
        const displayWord = document.getElementById('displayWord');
        const flippedWord = document.getElementById('flippedWord');
        const colorPicker = document.getElementById('colorPicker');

        // تعبئة الحروف
        chars.split('').forEach(c => {
            let opt = document.createElement('option');
            opt.value = c;
            opt.innerText = c;
            charSelect.appendChild(opt);
        });

        function addHaraka(h) {
            wordInput.value += h;
            updateBoard();
            wordInput.focus();
        }

        function updateColor() {
            document.documentElement.style.setProperty('--primary-color', colorPicker.value);
            updateBoard();
        }

        function updateBoard() {
            let text = wordInput.value;
            let target = charSelect.value;
            
            // 1. معالجة التلوين (الحرف + الحركة)
            const regex = new RegExp(`(${target}[\u064B-\u0652\u0670]?)`, 'g');
            let coloredText = text.replace(regex, `<span class="highlight">$1</span>`);
            displayWord.innerHTML = coloredText || "...";

            // 2. معالجة الشقلبة
            flippedWord.innerText = Array.from(text).reverse().join('');
        }
    </script>
</body>
</html>
