<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرب القراءة المطور</title>
    <style>
        :root { --border-color: #000; }
        body { font-family: 'Arial', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .main-wrapper { max-width: 1000px; margin: auto; background: white; padding: 20px; border: 2px solid #ccc; border-radius: 15px; }
        
        .header { text-align: center; font-size: 32px; font-weight: bold; margin-bottom: 25px; border-bottom: 4px double #333; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 2px solid var(--border-color); height: 130px; text-align: center; vertical-align: middle; }
        
        .side-label { width: 110px; font-size: 22px; font-weight: bold; background-color: #eeeeee; }
        
        /* ألوان الصفوف لتمييز الحركات */
        .row-fatha { background-color: #fffde7; } 
        .row-damma { background-color: #e3f2fd; } 
        .row-kasra { background-color: #fce4ec; } 
        .row-alf { background-color: #f1f8e9; }   
        .row-waw { background-color: #f3e5f5; }   
        .row-yaa { background-color: #fff3e0; }   

        /* تنسيق الكلمة: الحرف أسود والحركة حمراء ومنفصلة */
        .word-box { 
            font-size: 70px; 
            font-weight: bold; 
            color: black; 
            outline: none; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 5px; /* مسافة بين الحروف */
        }

        /* تنسيق الحركة المرتفعة والمنفصلة */
        .mark { 
            color: red; 
            font-size: 80px; 
            display: inline-block;
            margin-right: 5px; /* مسافة أفقية لتبتعد عن الحرف */
            margin-left: 5px;  /* مسافة من الجهة الأخرى */
            position: relative;
            top: -20px; /* رفعها للأعلى لتبتعد عن جسم الحرف */
            line-height: 0;
            user-select: none;
        }

        /* استثناء للمد بالألف والواو والياء ليكونوا على السطر */
        .row-alf .mark, .row-waw .mark, .row-yaa .mark {
            top: 0;
            font-size: 70px;
        }

        .controls { margin-bottom: 25px; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        select { font-size: 22px; padding: 10px 25px; border-radius: 10px; border: 2px solid #007bff; }

        @media print { .controls { display: none; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="controls">
        <label style="font-size: 22px; font-weight: bold;">اختر الحرف: </label>
        <select id="letterPicker" onchange="renderTable()">
            </select>
    </div>

    <div class="header">لوحة القراءة للكلمات الثلاثية (( حرف <span id="currentLetter" style="color: red;">أ</span> ))</div>
    
    <table>
        <tbody id="tableBody">
            </tbody>
    </table>

    <div style="text-align: center; margin-top: 30px; color: red; font-size: 26px; font-weight: bold;">
        نقرأ كثيراً حتى نقرأ سريعاً بإذن الله 🌟
    </div>
</div>

<script>
    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    
    const levels = [
        { title: 'بالفتحة', mark: 'َ', class: 'row-fatha', samples: ["كل", "مر", "خذ"] },
        { title: 'بالضمة', mark: 'ُ', class: 'row-damma', samples: ["كل", "خب", "رز"] },
        { title: 'بالكسرة', mark: 'ِ', class: 'row-kasra', samples: ["رب", "هم", "مد"] },
        { title: 'مد بالألف', mark: 'ا', class: 'row-alf', samples: ["كل", "م ", "د "] },
        { title: 'مد بالواو', mark: 'و', class: 'row-waw', samples: ["ل ", "ف ", "ر "] },
        { title: 'مد بالياء', mark: 'ي', class: 'row-yaa', samples: ["د ", "ل ", "ر "] }
    ];

    const picker = document.getElementById('letterPicker');
    alphabet.split('').forEach(l => {
        let opt = document.createElement('option');
        opt.value = l;
        opt.innerText = `حرف ${l}`;
        picker.appendChild(opt);
    });

    function renderTable() {
        const letter = picker.value;
        document.getElementById('currentLetter').innerText = letter;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        levels.forEach(level => {
            const tr = document.createElement('tr');
            tr.className = level.class;

            // 1. العنوان في اليمين
            const sideTd = document.createElement('td');
            sideTd.className = 'side-label';
            sideTd.innerText = level.title;
            tr.appendChild(sideTd);

            // 2. الكلمات الثلاثية
            level.samples.forEach(sample => {
                const td = document.createElement('td');
                td.innerHTML = `
                    <div class="word-box" contenteditable="true">
                        <span>${letter}</span>
                        <span class="mark">${level.mark}</span>
                        <span>${sample}</span>
                    </div>`;
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });
    }

    renderTable();
</script>

</body>
</html>
