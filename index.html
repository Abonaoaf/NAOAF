<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سبورة نواف الفيفي الذكية</title>
    <style>
        :root { --main-text-color: black; }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            user-select: none;
            touch-action: manipulation;
        }

        .main-title { font-size: 32px; color: #ffce00; margin-top: 10px; text-shadow: 2px 2px #000; }
        
        /* شريط الأدوات */
        .settings-bar {
            background: #34495e;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 95%;
            max-width: 1000px;
            border: 2px solid #555;
        }

        .tool-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; justify-content: center; font-size: 20px; }
        select { font-size: 22px; padding: 5px 15px; border-radius: 10px; cursor: pointer; background: white; }

        /* منطقة السبورة العملاقة */
        .board {
            width: 95%;
            max-width: 1000px;
            background: white;
            border: 15px solid #5d4037;
            border-radius: 30px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            overflow-x: auto;
            transition: background-color 0.3s;
        }

        #displayArea {
            font-size: 180px; /* حجم عملاق */
            font-weight: bold;
            direction: rtl;
            color: var(--main-text-color);
            white-space: nowrap;
            padding: 0 30px;
            transition: transform 0.3s;
        }

        /* لون حرف الدرس المختار */
        .target-char { color: #ff0000 !important; }

        /* حاوية الأقلام */
        .pens-container { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            flex-wrap: wrap;
        }

        .pen { 
            width: 50px; height: 50px; 
            border-radius: 50%; cursor: pointer; 
            border: 4px solid #fff; 
            transition: 0.2s;
        }

        .pen.active { transform: scale(1.2); border-color: #ffce00; box-shadow: 0 0 15px white; }

        /* لوحة المفاتيح */
        .keyboard-zone {
            background: #2c3e50;
            padding: 20px;
            border-radius: 30px;
            width: 95%;
            max-width: 1000px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        
        .btn {
            font-size: 40px; height: 85px; cursor: pointer; border: none;
            border-radius: 15px; background: white; color: black;
            font-weight: bold; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px #ddd;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        /* ألوان الحركات للتمييز */
        .btn-green { background: #4caf50; color: white; }
        .btn-purple { background: #9c27b0; color: white; }
        .btn-blue { background: #2196f3; color: white; }

        /* أزرار التحكم */
        .action-btns { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-action { font-size: 20px; padding: 18px; border-radius: 15px; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-space { background: #555; }
        .btn-delete { background: #c0392b; }
        .btn-clear { background: #7f8c8d; }
        .btn-success { background: #f1c40f; color: #000; } /* زر أحسنت */

    </style>
</head>
<body>

    <div class="main-title">نواف الفيفي - سبورتي الذكية 🌟</div>
    
    <div class="settings-bar">
        <div class="tool-row">
            <span>حرف الدرس:</span>
            <select id="targetSelect" onchange="updateDisplay()">
                <option value="">بدون</option>
            </select>
        </div>
        
        <div class="pens-container">
            <div class="pen active" style="background: black;" onclick="changeWriteColor('black', this)"></div>
            <div class="pen" style="background: blue;" onclick="changeWriteColor('blue', this)"></div>
            <div class="pen" style="background: green;" onclick="changeWriteColor('green', this)"></div>
            <div class="pen" style="background: #e67e22;" onclick="changeWriteColor('#e67e22', this)"></div>
            <div class="pen" style="background: #9b59b6;" onclick="changeWriteColor('#9b59b6', this)"></div>
            <div class="pen" style="background: #5d4037;" onclick="changeWriteColor('#5d4037', this)"></div>
            <div class="pen" style="background: #7f8c8d;" onclick="changeWriteColor('#7f8c8d', this)"></div>
            <div class="pen" style="background: #1abc9c;" onclick="changeWriteColor('#1abc9c', this)"></div>
        </div>
    </div>

    <div class="board" id="boardFrame">
        <div id="displayArea">نواف</div>
    </div>

    <div class="keyboard-zone">
        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 20px;">
            <button class="btn btn-green" onclick="addHarka('َ')">َ</button>
            <button class="btn btn-green" onclick="addHarka('ُ')">ُ</button>
            <button class="btn btn-green" onclick="addHarka('ِ')">ِ</button>
            <button class="btn btn-purple" onclick="addHarka('ْ')">ْ</button>
            <button class="btn btn-purple" onclick="addHarka('ّ')">ّ</button>
            <button class="btn btn-blue" onclick="addHarka('ً')">ً</button>
            <button class="btn btn-blue" onclick="addHarka('ٌ')">ٌ</button>
            <button class="btn btn-blue" onclick="addHarka('ٍ')">ٍ</button>
        </div>

        <div id="lettersGrid" class="grid"></div>

        <div class="action-btns">
            <button class="btn-action btn-space" onclick="addChar(' ')">مسافة</button>
            <button class="btn-action btn-delete" onclick="deleteLast()">مسح ⌫</button>
            <button class="btn-action btn-clear" onclick="clearAll()">جديد 🗑️</button>
            <button class="btn-action btn-success" onclick="showSuccess()">أحسنت! ⭐</button>
        </div>
    </div>

    <script>
        const letters = "اأإآبتثجحخدذرزسشصضطظعغفقكلمنهويةوي";
        const harkat = "ًٌٍَُِّْ";
        let currentText = "نواف";
        
        const targetSelect = document.getElementById('targetSelect');
        const displayArea = document.getElementById('displayArea');
        const boardFrame = document.getElementById('boardFrame');

        // إنشاء لوحة المفاتيح والقائمة
        letters.split('').forEach(l => {
            const opt = document.createElement('option');
            opt.value = l; opt.innerText = l;
            targetSelect.appendChild(opt);

            const b = document.createElement('button');
            b.className = 'btn'; b.innerText = l;
            b.onclick = () => addChar(l);
            document.getElementById('lettersGrid').appendChild(b);
        });

        function addChar(c) {
            if (currentText === "نواف") currentText = "";
            currentText += c;
            updateDisplay();
        }

        // منطق الحركات: استبدال الحركة الموجودة لمنع التكرار
        function addHarka(h) {
            if (currentText.length === 0) return;
            let last = currentText.slice(-1);
            if (harkat.includes(last)) {
                currentText = currentText.slice(0, -1);
            }
            currentText += h;
            updateDisplay();
        }

        function deleteLast() {
            currentText = currentText.slice(0, -1);
            updateDisplay();
        }

        function clearAll() {
            currentText = "";
            updateDisplay();
        }

        function changeWriteColor(color, el) {
            document.documentElement.style.setProperty('--main-text-color', color);
            document.querySelectorAll('.pen').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            updateDisplay();
        }

        // تحديث شاشة العرض مع تلوين حرف الدرس بالأحمر
        function updateDisplay() {
            if (!currentText) {
                displayArea.innerText = "اكتب..";
                return;
            }
            const target = targetSelect.value;
            if (!target) {
                displayArea.innerHTML = currentText;
                return;
            }
            // التلوين مع الحفاظ على الاتصال
            const regex = new RegExp(`(${target}[\u064B-\u0652]?)`, 'g');
            const formatted = currentText.replace(regex, `<span class="target-char">$1</span>`);
            displayArea.innerHTML = formatted;
        }

        // وظيفة التشجيع (أحسنت يا بطل)
        function showSuccess() {
            if (!currentText) return;
            boardFrame.style.backgroundColor = "#fff9c4"; // تحول للون ذهبي بسيط
            displayArea.style.transform = "scale(1.1)";
            
            setTimeout(() => {
                boardFrame.style.backgroundColor = "white";
                displayArea.style.transform = "scale(1)";
            }, 600);
        }

        updateDisplay();
    </script>
</body>
</html>
