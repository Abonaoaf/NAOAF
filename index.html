<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة نواف التعليمية - لوحة التنوين</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main-red: #ff0000; --dark-blue: #1a2a3a; }
        body { font-family: 'Arial', sans-serif; background: #f4f4f9; padding: 10px; text-align: center; }
        .container { background: white; max-width: 950px; margin: auto; border: 5px solid var(--dark-blue); border-radius: 20px; overflow: hidden; }
        
        .header { background: var(--main-red); color: white; padding: 10px; font-size: 26px; font-weight: bold; }
        
        .controls { padding: 10px; background: #eee; display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        /* لوحة الحركات الكبيرة */
        .harakat-bar { 
            background: #fff; padding: 15px; display: flex; justify-content: center; 
            gap: 8px; border-bottom: 3px solid #ddd; flex-wrap: wrap; 
        }
        .h-btn { 
            background: #fff; border: 3px solid var(--main-red); border-radius: 10px; 
            width: 65px; height: 65px; font-size: 40px; font-weight: bold; color: var(--main-red);
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .h-btn:hover { background: var(--main-red); color: white; }

        .btn-save { background: #27ae60; color: white; padding: 10px 20px; font-size: 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; }
        td { border: 1px solid #ccc; height: 100px; position: relative; }
        
        .word-input {
            width: 100%; height: 100%; border: none; outline: none;
            text-align: center; font-size: 60px; font-weight: bold;
            background: transparent; display: block; position: relative; z-index: 2;
        }
        
        .word-display {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none; font-size: 60px; font-weight: bold; line-height: 100px; z-index: 1;
        }

        /* تلوين الحرف والحركة بالأحمر الصريح */
        .hl { color: var(--main-red) !important; text-shadow: 1px 1px 0px #fff; }
        
        .side { background: var(--dark-blue); color: white; font-size: 18px; width: 110px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">لوحة نـواف الذكية للحركات والتنوين 🎨</div>

    <div class="controls">
        <select id="mainChar" style="font-size: 20px; padding: 5px;" onchange="loadFromCloud()">
            <option value="أ">أ</option><option value="ب">ب</option><option value="ت">ت</option>
            <option value="ث">ث</option><option value="ج">ج</option><option value="ح">ح</option>
            <option value="خ">خ</option><option value="د">د</option><option value="ذ">ذ</option>
            <option value="ر">ر</option><option value="ز">ز</option><option value="س">س</option>
            <option value="ش">ش</option><option value="ص" selected>ص</option><option value="ض">ض</option>
            <option value="ط">ط</option><option value="ظ">ظ</option><option value="ع">ع</option>
            <option value="غ">غ</option><option value="ف">ف</option><option value="ق">ق</option>
            <option value="ك">ك</option><option value="ل">ل</option><option value="م">م</option>
            <option value="ن">ن</option><option value="هـ">هـ</option><option value="و">و</option>
            <option value="ي">ي</option>
        </select>
        <button class="btn-save" onclick="saveToCloud()">حفظ في السحابة 💾</button>
    </div>

    <div class="harakat-bar">
        <button class="h-btn" onclick="addHarakah('َ')" title="فتحة"> َ </button>
        <button class="h-btn" onclick="addHarakah('ُ')" title="ضمة"> ُ </button>
        <button class="h-btn" onclick="addHarakah('ِ')" title="كسرة"> ِ </button>
        <button class="h-btn" onclick="addHarakah('ْ')" title="سكون"> ْ </button>
        <button class="h-btn" onclick="addHarakah('ّ')" title="شدة"> ّ </button>
        <button class="h-btn" onclick="addHarakah('ً')" title="تنوين فتح"> ً </button>
        <button class="h-btn" onclick="addHarakah('ٌ')" title="تنوين ضم"> ٌ </button>
        <button class="h-btn" onclick="addHarakah('ٍ')" title="تنوين كسر"> ٍ </button>
    </div>

    <table>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    let database;
    try { firebase.initializeApp(firebaseConfig); database = firebase.database(); } catch(e){}

    const rows = ["الفتحة", "الضمة", "الكسرة", "مد الألف", "مد الواو", "مد الياء"];
    let lastFocusedInput = null;

    function init() {
        const body = document.getElementById('tableBody');
        body.innerHTML = "";
        for (let r of rows) {
            let rowHtml = `<tr><td class="side">${r}</td>`;
            for (let i = 0; i < 3; i++) {
                rowHtml += `<td>
                    <input type="text" class="word-input" onfocus="handleFocus(this)" onblur="showDisplay(this)">
                    <div class="word-display"></div>
                </td>`;
            }
            rowHtml += `</tr>`;
            body.innerHTML += rowHtml;
        }
        loadFromCloud();
    }

    function handleFocus(input) {
        lastFocusedInput = input;
        input.style.opacity = "1";
        input.nextElementSibling.style.display = "none";
    }

    function addHarakah(h) {
        if (lastFocusedInput) {
            const start = lastFocusedInput.selectionStart;
            const val = lastFocusedInput.value;
            // إضافة الحركة
            lastFocusedInput.value = val.slice(0, start) + h + val.slice(start);
            lastFocusedInput.focus();
            lastFocusedInput.setSelectionRange(start + 1, start + 1);
            showDisplay(lastFocusedInput);
        }
    }

    function showDisplay(input) {
        if (input.value.trim() === "") return;
        const display = input.nextElementSibling;
        const char = document.getElementById('mainChar').value;
        
        let p = (char === "أ") ? "[أإآا]" : (char === "هـ") ? "[هـه]" : char;
        //Regex محسن يمسك الحرف مع (الشدة + أي حركة أو تنوين)
        const regex = new RegExp(`(${p}[\u064B-\u0652\u0651]*)`, 'g');

        display.innerHTML = input.value.replace(regex, `<span class="hl">$1</span>`);
        input.style.opacity = "0";
        display.style.display = "block";
    }

    function saveToCloud() {
        const char = document.getElementById('mainChar').value;
        const words = Array.from(document.querySelectorAll('.word-input')).map(i => i.value);
        if(database) {
            database.ref('nawaf_educational_data/' + char).set(words).then(() => alert("تم الحفظ بنجاح! ✅"));
        }
    }

    function loadFromCloud() {
        const char = document.getElementById('mainChar').value;
        if(database) {
            database.ref('nawaf_educational_data/' + char).once('value').then(snap => {
                const words = snap.val() || Array(18).fill("");
                const inputs = document.querySelectorAll('.word-input');
                inputs.forEach((input, index) => {
                    input.value = words[index] || "";
                    showDisplay(input);
                });
            });
        }
    }

    init();
</script>
</body>
</html>
