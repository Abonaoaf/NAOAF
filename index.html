<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة نواف المتكاملة</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            user-select: none;
        }

        .header {
            font-size: 28px;
            margin: 10px 0;
            color: #ffce00;
            text-shadow: 2px 2px #000;
        }

        /* الجزء العلوي: اختيار الحرف المستهدف */
        .selection-zone {
            background: #333;
            padding: 10px;
            border-radius: 15px;
            width: 95%;
            max-width: 900px;
            margin-bottom: 10px;
            border: 2px solid #ff0000;
        }

        .section-title {
            font-size: 16px;
            color: #ffaaaa;
            margin-bottom: 8px;
            text-align: center;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 6px;
        }

        .btn {
            font-size: 26px;
            padding: 12px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: white;
            color: black;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .char-select-btn.active {
            background: #ff0000;
            color: white;
            box-shadow: 0 0 10px #ff0000;
        }

        /* السبورة */
        .board {
            width: 95%;
            max-width: 900px;
            background: white;
            border: 12px solid #5d4037;
            border-radius: 20px;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            margin: 15px 0;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        #displayArea {
            font-size: 130px;
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
        }

        .highlight { color: #ff0000; }

        /* منطقة التحكم السفلية */
        .keyboard-zone {
            background: #222;
            padding: 15px;
            border-radius: 20px;
            width: 95%;
            max-width: 900px;
            border: 1px solid #444;
        }

        /* ألوان الحركات المخصصة */
        .btn-harkat { background: #4caf50; color: white; font-size: 40px; } /* فتحة ضمة كسرة */
        .btn-special { background: #9c27b0; color: white; font-size: 40px; } /* سكون شدة */
        .btn-tanwin { background: #2196f3; color: white; font-size: 40px; } /* تنوينات */

        .write-btn { background: #eee; color: #333; font-size: 30px; }
        
        .action-btns {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action { font-size: 20px; padding: 15px; border-radius: 10px; color: white; }
        .btn-space { background: #555; }
        .btn-delete { background: #c0392b; }
        .btn-clear { background: #7f8c8d; }
    </style>
</head>
<body>

    <div class="header">🌟 سبورة نواف الذكية 🌟</div>

    <div class="selection-zone">
        <div class="section-title">اختر حرف الدرس (سيظهر بالأحمر):</div>
        <div class="grid" id="selectGrid"></div>
    </div>

    <div class="board">
        <div id="displayArea">...</div>
    </div>

    <div class="keyboard-zone">
        <div class="section-title">الحركات والتنوين:</div>
        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 15px;">
            <button class="btn btn-harkat" onclick="addChar('َ')">َ</button>
            <button class="btn btn-harkat" onclick="addChar('ُ')">ُ</button>
            <button class="btn btn-harkat" onclick="addChar('ِ')">ِ</button>
            <button class="btn btn-special" onclick="addChar('ْ')">ْ</button>
            <button class="btn btn-special" onclick="addChar('ّ')">ّ</button>
            <button class="btn btn-tanwin" onclick="addChar('ً')">ً</button>
            <button class="btn btn-tanwin" onclick="addChar('ٌ')">ٌ</button>
            <button class="btn btn-tanwin" onclick="addChar('ٍ')">ٍ</button>
        </div>

        <div class="section-title">لوحة الحروف:</div>
        <div class="grid" id="writeGrid"></div>

        <div class="action-btns">
            <button class="btn btn-action btn-space" onclick="addChar(' ')">مسافة (فراغ)</button>
            <button class="btn btn-action btn-delete" onclick="deleteLast()">مسح حرف</button>
            <button class="btn btn-action btn-clear" onclick="clearAll()">مسح الكل</button>
        </div>
    </div>

    <script>
        // إضافة إ، ة، آ، حروف المد
        const allChars = "أإآبتثجحخدذرزسشصضطظعغفقكلمنهويةوي";
        let targetChar = 'ب';
        let currentWord = "";

        const selectGrid = document.getElementById('selectGrid');
        const writeGrid = document.getElementById('writeGrid');
        const displayArea = document.getElementById('displayArea');

        // بناء اللوحات
        allChars.split('').forEach(c => {
            // لوحة الاختيار
            const sBtn = document.createElement('button');
            sBtn.className = 'btn char-select-btn';
            if(c === targetChar) sBtn.classList.add('active');
            sBtn.innerText = c;
            sBtn.onclick = () => {
                document.querySelectorAll('.char-select-btn').forEach(b => b.classList.remove('active'));
                sBtn.classList.add('active');
                targetChar = c;
                updateDisplay();
            };
            selectGrid.appendChild(sBtn);

            // لوحة الكتابة
            const wBtn = document.createElement('button');
            wBtn.className = 'btn write-btn';
            wBtn.innerText = c;
            wBtn.onclick = () => addChar(c);
            writeGrid.appendChild(wBtn);
        });

        function addChar(c) {
            currentWord += c;
            updateDisplay();
        }

        function deleteLast() {
            currentWord = currentWord.slice(0, -1);
            updateDisplay();
        }

        function clearAll() {
            currentWord = "";
            updateDisplay();
        }

        function updateDisplay() {
            // regex يشمل الحركات والتنوين والشدة
            const regex = new RegExp(`(${targetChar}[\u064B-\u0652]?)`, 'g');
            const formatted = currentWord.replace(regex, `<span class="highlight">$1</span>`);
            displayArea.innerHTML = formatted || "...";
        }
    </script>
</body>
</html>
