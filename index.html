<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة نواف الذكية</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main-red: #e63946; --dark-blue: #2c3e50; }
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { background: white; max-width: 1000px; margin: auto; border: 4px solid var(--dark-blue); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { background: var(--main-red); color: white; padding: 15px; font-size: 30px; font-weight: bold; text-align: center; }
        .controls { padding: 15px; background: #eee; text-align: center; border-bottom: 2px solid #ddd; }
        select { font-size: 24px; padding: 5px 25px; border-radius: 10px; border: 3px solid var(--main-red); font-weight: bold; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 10px 30px; font-size: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 1px solid #ccc; height: 120px; font-size: 80px; font-weight: bold; text-align: center; }
        .hl { color: var(--main-red); display: inline; } /* هذا هو لون التمييز */
        
        .side { width: 130px; font-size: 20px; background: var(--dark-blue); color: white; }
        .editable { outline: none; display: block; width: 100%; height: 100%; line-height: 120px; white-space: nowrap; overflow: hidden; }
        
        .r1 { background: #fff5f5; } .r2 { background: #fffaf0; } .r3 { background: #f0fff4; }
        .r4 { background: #ebf8ff; } .r5 { background: #faf5ff; } .r6 { background: #fff5f7; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مدرسة نواف - التلوين الذكي 🖌️</div>
    <div class="controls">
        <label style="font-size: 20px; font-weight: bold;">اختر الحرف الأساسي: </label>
        <select id="charSelector" onchange="refreshTable()">
            </select>
        <button class="btn-save" onclick="saveToCloud()">حفظ تعديلاتي 💾</button>
    </div>

    <table>
        <tr class="r1"><td class="side">الفتحة</td><td id="td1"></td><td id="td2"></td><td id="td3"></td></tr>
        <tr class="r2"><td class="side">الضمة</td><td id="td4"></td><td id="td5"></td><td id="td6"></td></tr>
        <tr class="r3"><td class="side">الكسرة</td><td id="td7"></td><td id="td8"></td><td id="td9"></td></tr>
        <tr class="r4"><td class="side">مد الألف</td><td id="td10"></td><td id="td11"></td><td id="td12"></td></tr>
        <tr class="r5"><td class="side">مد الواو</td><td id="td13"></td><td id="td14"></td><td id="td15"></td></tr>
        <tr class="r6"><td class="side">مد الياء</td><td id="td16"></td><td id="td17"></td><td id="td18"></td></tr>
    </table>
</div>

<script>
// --- إعدادات Firebase (ضع بياناتك هنا) ---
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
};

try { firebase.initializeApp(firebaseConfig); } catch(e) {}
const db = firebase.database();

const allChars = "أبتثجحخدذرزمسشصضطظعغفقكلمنهـوي";

// الكلمات الافتراضية (أمثلة صحيحة لبعض الحروف)
const backupDB = {
    "ل": ["لَبَنَ","لَحِقَ","لَمَسَ","لُجَّ","لُقِيَ","لُبِثَ","لِبَاسُ","لِسَانُ","لِحَاظُ","لادَ","لامَ","لابَ","لُوطُ","لُومُ","قُلُوبُ","لِيـنُ","حَلِيمُ","وَلِيدُ"],
    "ص": ["صَبَرَ","صَدَقَ","صَلَحَ","صُبِرَ","صُدِقَ","صُورَ","صِغَارُ","صِعَابُ","صِرَاطُ","صَادَ","صَامَ","صَارَ","صُوصُ","صُورُ","نَصُومُ","صِيدَ","رَصِيدُ","عَصِيرُ"]
};

window.onload = function() {
    const sel = document.getElementById('charSelector');
    for (let c of allChars) {
        let opt = document.createElement('option');
        opt.value = c; opt.text = c;
        if(c === "ص") opt.selected = true;
        sel.add(opt);
    }
    refreshTable();
};

function refreshTable() {
    const char = document.getElementById('charSelector').value;
    // جلب من السحابة أولاً، إذا لم يوجد نستخدم backupDB، إذا لم يوجد نتركها فارغة لتكتب أنت
    db.ref('nawaf_educational_data/' + char).once('value').then(snap => {
        let words = snap.val() || backupDB[char] || Array(18).fill("");
        for (let i = 1; i <= 18; i++) {
            const td = document.getElementById('td' + i);
            td.innerHTML = `<div contenteditable="true" class="editable" oninput="smartColor(this)">${words[i-1]}</div>`;
            smartColor(td.firstChild);
        }
    });
}

// الدالة الذكية: تلون الحرف فور كتابته
function smartColor(el) {
    let text = el.innerText;
    const char = document.getElementById('charSelector').value;
    
    // التعامل مع الحروف الخاصة
    let p = char;
    if(char === "أ") p = "[أإآا]";
    if(char === "هـ") p = "[هـه]";

    // Regex يمسك الحرف + أي حركة فوقه (فتحة، ضمة، كسرة، سكون، تنوين)
    const regex = new RegExp(`(${p}[\u064B-\u0652]?)`, 'g');
    
    // حفظ مكان المؤشر (Cursor) حتى لا يضيع أثناء التلوين
    const selection = window.getSelection();
    const range = selection.rangeCount > 0 ? selection.getRangeAt(0) : null;
    const offset = range ? range.startOffset : 0;

    // تطبيق التلوين
    el.innerHTML = text.replace(regex, `<span class="hl">$1</span>`);

    // إعادة المؤشر لمكانه الصحيح
    if (range) {
        const newRange = document.createRange();
        const textNodes = Array.from(el.childNodes);
        // محاولة بسيطة لإعادة المؤشر للنهاية لتسهيل الكتابة
        newRange.selectNodeContents(el);
        newRange.collapse(false);
        selection.removeAllRanges();
        selection.addRange(newRange);
    }
}

function saveToCloud() {
    const char = document.getElementById('charSelector').value;
    const words = [];
    for (let i = 1; i <= 18; i++) {
        words.push(document.getElementById('td' + i).innerText);
    }
    db.ref('nawaf_educational_data/' + char).set(words).then(() => {
        alert("تم حفظ كلمات حرف (" + char + ") في السحابة بنجاح! ✅");
    });
}
</script>
</body>
</html>
