<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة نواف - التلوين الفوري المضمون</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main-red: #FF0000; --dark-blue: #1A2A3A; }
        body { font-family: 'Arial', sans-serif; background: #F4F4F9; padding: 10px; text-align: center; }
        .container { background: white; max-width: 950px; margin: auto; border: 5px solid var(--dark-blue); border-radius: 20px; overflow: hidden; }
        .header { background: var(--main-red); color: white; padding: 15px; font-size: 28px; font-weight: bold; }
        
        /* شريط الحركات */
        .harakat-bar { background: #FFF; padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 3px solid #DDD; }
        .h-btn { 
            background: #FFF; border: 4px solid var(--main-red); border-radius: 12px; 
            width: 70px; height: 70px; font-size: 45px; font-weight: bold; color: var(--main-red);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .controls { padding: 10px; background: #EEE; display: flex; justify-content: center; gap: 15px; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; }
        td { border: 2px solid #CCC; height: 110px; background: white; }
        
        /* المربع الذكي */
        .word-input {
            width: 100%; height: 100%; outline: none; border: none;
            text-align: center; font-size: 60px; font-weight: bold;
            display: block; line-height: 110px; white-space: nowrap;
            overflow: hidden; cursor: text;
        }

        .hl { color: var(--main-red) !important; } /* تلوين الحرف المختار بالأحمر */
        .side { background: var(--dark-blue); color: white; font-size: 20px; width: 130px; font-weight: bold; }
        .btn-save { background: #27AE60; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مدرسة نـواف - تحدي المستحيل 🏆</div>

    <div class="controls">
        <select id="mainChar" onchange="loadFromCloud()" style="font-size: 20px; padding: 5px;">
            <option value="أ">أ</option><option value="ب">ب</option><option value="ت">ت</option>
            <option value="ث">ث</option><option value="ج">ج</option><option value="ح">ح</option>
            <option value="خ">خ</option><option value="د">د</option><option value="ذ">ذ</option>
            <option value="ر">ر</option><option value="ز">ز</option><option value="س">س</option>
            <option value="ش">ش</option><option value="ص" selected>ص</option><option value="ض">ض</option>
            <option value="ط">ط</option><option value="ظ">ظ</option><option value="ع">ع</option>
            <option value="غ">غ</option><option value="ف">ف</option><option value="ق">ق</option>
            <option value="ك">ك</option><option value="ل">ل</option><option value="م">م</option>
            <option value="ن">ن</option><option value="هـ">هـ</option><option value="و">و</option>
            <option value="ي">ي</option>
        </select>
        <button class="btn-save" onclick="saveToCloud()">حفظ السحابة 💾</button>
    </div>

    <div class="harakat-bar">
        <button class="h-btn" onmousedown="event.preventDefault(); addH('َ')"> َ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ُ')"> ُ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ِ')"> ِ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ْ')"> ْ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ّ')"> ّ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ً')"> ً </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ٌ')"> ٌ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ٍ')"> ٍ </button>
    </div>

    <table>
        <tr><td class="side">الفتحة</td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td></tr>
        <tr><td class="side">الضمة</td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td></tr>
        <tr><td class="side">الكسرة</td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td></tr>
        <tr><td class="side">مد الألف</td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td></tr>
        <tr><td class="side">مد الواو</td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td></tr>
        <tr><td class="side">مد الياء</td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-input" onfocus="lastI=this" oninput="colorize(this)"></div></td></tr>
    </table>
</div>

<script>
    const firebaseConfig = { apiKey: "...", authDomain: "...", databaseURL: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
    try { firebase.initializeApp(firebaseConfig); } catch(e){}
    const database = firebase.database();

    let lastI = null;

    function addH(h) {
        if (!lastI) return;
        
        let sel = window.getSelection();
        if (sel.rangeCount > 0) {
            let range = sel.getRangeAt(0);
            
            // إضافة الحركة مباشرة في موضع المؤشر
            let node = document.createTextNode(h);
            range.insertNode(node);
            
            // تحريك المؤشر بعد الحركة
            range.setStartAfter(node);
            sel.removeAllRanges();
            sel.addRange(range);
        }
        colorize(lastI);
    }

    function colorize(el) {
        let char = document.getElementById('mainChar').value;
        let text = el.innerText;
        
        if (!text) return;

        let p = (char === "أ") ? "[أإآا]" : (char === "هـ") ? "[هـه]" : char;
        // البحث عن الحرف المختار + الشدة + أي حركة أو تنوين
        let regex = new RegExp(`(${p}[\u0651]?[\u064B-\u0652]?)`, 'g');
        
        // تحويل النص إلى ملون مع الحفاظ على المؤشر
        let coloredHTML = text.replace(regex, `<span class="hl">$1</span>`);
        
        // حفظ مكان المؤشر النسبي
        let sel = window.getSelection();
        let offset = sel.anchorOffset;

        el.innerHTML = coloredHTML;

        // إعادة وضع المؤشر في نهاية المربع ليتمكن من الكتابة فوراً
        let range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
    }

    function saveToCloud() {
        const char = document.getElementById('mainChar').value;
        const words = Array.from(document.querySelectorAll('.word-input')).map(i => i.innerText);
        database.ref('nawaf_educational_data/' + char).set(words).then(() => alert("تم الحفظ بنجاح ✅"));
    }

    function loadFromCloud() {
        const char = document.getElementById('mainChar').value;
        database.ref('nawaf_educational_data/' + char).once('value').then(snap => {
            const words = snap.val() || Array(18).fill("");
            const inputs = document.querySelectorAll('.word-input');
            inputs.forEach((input, index) => {
                input.innerText = words[index] || "";
                colorize(input);
            });
        });
    }

    window.onload = loadFromCloud;
</script>
</body>
</html>
