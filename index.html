<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشاط قرائي احترافي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap');
        
        body { font-family: 'Cairo', sans-serif; background: #555; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* لوحة التحكم */
        .controls { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; width: 100%; max-width: 800px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        select, button, input { font-family: 'Cairo'; padding: 8px; font-size: 1rem; border-radius: 5px; border: 1px solid #ccc; margin: 5px; }
        button { background: #27ae60; color: white; cursor: pointer; border: none; }

        /* حاوية الورقة - محاكاة للصورة */
        .paper { 
            background: white; 
            width: 210mm; 
            min-height: 297mm; 
            padding: 10mm; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
        }

        .title-box { 
            text-align: center; 
            border: 2px solid #000; 
            padding: 10px; 
            margin-bottom: 15px; 
            font-size: 1.8rem;
            font-weight: 900;
        }

        /* الجدول الرئيسي */
        .main-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .main-table td { border: 1px solid #000; height: 100px; text-align: center; vertical-align: middle; position: relative; }

        /* عمود المستويات الجانبي */
        .level-cell { width: 40px; font-size: 0.9rem; font-weight: bold; writing-mode: vertical-rl; transform: rotate(180deg); text-align: center; }

        /* الكلمات */
        .word-text { font-size: 3rem; font-weight: 900; letter-spacing: 2px; }
        .highlight { color: #d32f2f; } /* تلوين الحرف باللون الأحمر */

        /* ألوان الأقسام الجانبية (مثل الصورة) */
        .bg-1 { background-color: #f8f9fa; } 
        .bg-2 { background-color: #e9ecef; }
        .bg-3 { background-color: #fde2e2; }
        .bg-4 { background-color: #e2f0d9; }
        .bg-5 { background-color: #e2efff; }
        .bg-6 { background-color: #f3e5f5; }

        .footer-text { text-align: center; margin-top: auto; padding-top: 20px; color: #d32f2f; font-weight: 900; font-size: 1.4rem; text-decoration: underline; }

        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
            .paper { box-shadow: none; border: none; width: 100%; height: auto; margin: 0; }
        }
    </style>
</head>
<body>

<div class="controls">
    <strong>لوحة التحكم:</strong>
    <select id="letterPicker" onchange="renderWorksheet()">
        </select>
    <button onclick="window.print()">🖨️ طباعة النشاط</button>
    <div style="margin-top:10px; font-size: 0.8rem; color: #666;">* يمكنك تعديل الكلمات في كود الجافاسكريبت بالأسفل بكل سهولة.</div>
</div>

<div class="paper">
    <div class="title-box">
        نشاط قرائي (( حرف / <span id="headerLetter">ب</span> ))
    </div>

    <table class="main-table" id="contentTable">
        </table>

    <div class="footer-text">نقرأ كثيراً حتى نقرأ سريعاً بإذن الله</div>
</div>

<script>
    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    
    // الأقسام الستة
    const sections = [
        { title: "كلمات مفتوحة", colorClass: "bg-1" },
        { title: "كلمات مضمومة", colorClass: "bg-2" },
        { title: "كلمات مكسورة", colorClass: "bg-3" },
        { title: "مد بالألف", colorClass: "bg-4" },
        { title: "مد بالواو", colorClass: "bg-5" },
        { title: "مد بالياء", colorClass: "bg-6" }
    ];

    // قاعدة بيانات تجريبية (يمكنك التوسع فيها)
    function getWordsFor(char) {
        return {
            "كلمات مفتوحة": [`${char}َـرَدَ`, `${char}َـعَثَ`, `ذَهَـ${char}َ`],
            "كلمات مضمومة": [`${char}ُـذِرَ`, `${char}ُـعِثَ`, `كُتُـ${char}ُ`],
            "كلمات مكسورة": [`${char}ِـلادُ`, `لَـ${char}ِـسَ`, `${char}ِـنْتُ`],
            "مد بالألف": [`${char}َـابٌ`, `${char}َـاسِم`, `صَـ${char}ِـر`],
            "مد بالواو": [`${char}ُـومَة`, `حُـ${char}ُـوب`, `طُـ${char}ُـول`],
            "مد بالياء": [`عَـ${char}ِـير`, `طَـ${char}ِـيب`, `${char}ِـير`]
        };
    }

    // تهيئة القائمة المنسدلة
    const picker = document.getElementById('letterPicker');
    alphabet.split('').forEach(l => {
        let op = document.createElement('option');
        op.value = l; op.text = "حرف " + l;
        picker.appendChild(op);
    });

    function renderWorksheet() {
        const char = picker.value;
        document.getElementById('headerLetter').innerText = char;
        const table = document.getElementById('contentTable');
        table.innerHTML = "";
        
        const wordsData = getWordsFor(char);

        sections.forEach(sec => {
            const row = document.createElement('tr');
            
            // خلية الكلمات الثلاث
            const words = wordsData[sec.title];
            words.forEach(w => {
                const td = document.createElement('td');
                // تلوين الحرف المستهدف بالأحمر (إذا كان يبدأ بالكلمة أو يحتوي عليها)
                const highlightedWord = w.replace(new RegExp(char, 'g'), `<span class="highlight">${char}</span>`);
                td.innerHTML = `<div class="word-text">${highlightedWord}</div>`;
                row.appendChild(td);
            });

            // خلية العنوان الجانبي (مثل الصورة)
            const sideCell = document.createElement('td');
            sideCell.className = `level-cell ${sec.colorClass}`;
            sideCell.innerText = sec.title;
            row.appendChild(sideCell);

            table.appendChild(row);
        });
    }

    // التشغيل عند الفتح
    renderWorksheet();
</script>

</body>
</html>
