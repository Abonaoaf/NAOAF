<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة نواف الفيفي الذكية</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            user-select: none;
        }

        .main-title {
            font-size: 32px;
            color: #ffce00;
            text-shadow: 2px 2px #000;
            margin: 10px 0 5px 0;
        }

        .sub-title {
            font-size: 18px;
            color: #4caf50;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* الجزء العلوي: اختيار الحرف واللون */
        .selection-zone {
            background: #333;
            padding: 10px;
            border-radius: 15px;
            width: 95%;
            max-width: 950px;
            margin-bottom: 10px;
            border: 2px solid #555;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
            gap: 6px;
        }

        .btn {
            font-size: 26px;
            padding: 12px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: white;
            color: black;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .char-select-btn.active {
            background: var(--target-color, #ff0000);
            color: white;
            box-shadow: 0 0 10px var(--target-color, #ff0000);
        }

        /* أيقونة اختيار اللون */
        .color-picker-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #444;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 2px solid #fff;
        }

        .color-picker-container input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .color-icon { font-size: 24px; }

        /* السبورة */
        .board {
            width: 95%;
            max-width: 900px;
            background: white;
            border: 12px solid #5d4037;
            border-radius: 20px;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            margin: 15px 0;
        }

        #displayArea {
            font-size: 130px;
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
        }

        .highlight { color: var(--target-color, #ff0000); }

        /* منطقة التحكم السفلية */
        .keyboard-zone {
            background: #222;
            padding: 15px;
            border-radius: 20px;
            width: 95%;
            max-width: 900px;
        }

        .btn-harkat { background: #4caf50; color: white; font-size: 38px; }
        .btn-special { background: #9c27b0; color: white; font-size: 38px; }
        .btn-tanwin { background: #2196f3; color: white; font-size: 38px; }
        .write-btn { background: #eee; color: #333; font-size: 28px; }
        
        .action-btns {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action { font-size: 18px; padding: 15px; border-radius: 10px; color: white; border:none; cursor:pointer; }
        .btn-space { background: #555; }
        .btn-delete { background: #c0392b; }
        .btn-clear { background: #7f8c8d; }

        .section-title { font-size: 14px; color: #aaa; margin-bottom: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="main-title">نواف الفيفي - سبورتي الذكية</div>
    <div class="sub-title">لكل أصدقائي 🌟</div>

    <div class="selection-zone">
        <div class="section-title">اختر حرف الدرس ولون التمييز:</div>
        <div class="grid" id="selectGrid">
            </div>
    </div>

    <div class="board">
        <div id="displayArea">...</div>
    </div>

    <div class="keyboard-zone">
        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 15px;">
            <button class="btn btn-harkat" onclick="addChar('َ')">َ</button>
            <button class="btn btn-harkat" onclick="addChar('ُ')">ُ</button>
            <button class="btn btn-harkat" onclick="addChar('ِ')">ِ</button>
            <button class="btn btn-special" onclick="addChar('ْ')">ْ</button>
            <button class="btn btn-special" onclick="addChar('ّ')">ّ</button>
            <button class="btn btn-tanwin" onclick="addChar('ً')">ً</button>
            <button class="btn btn-tanwin" onclick="addChar('ٌ')">ٌ</button>
            <button class="btn btn-tanwin" onclick="addChar('ٍ')">ٍ</button>
        </div>

        <div class="grid" id="writeGrid"></div>

        <div class="action-btns">
            <button class="btn-action btn-space" onclick="addChar(' ')">مسافة ⎵</button>
            <button class="btn-action btn-delete" onclick="deleteLast()">مسح حرف ⌫</button>
            <button class="btn-action btn-clear" onclick="clearAll()">جديد 🗑️</button>
        </div>
    </div>

    <script>
        const allChars = "أإآبتثجحخدذرزسشصضطظعغفقكلمنهويةوي";
        let targetChar = 'ب';
        let currentWord = "";
        let targetColor = "#ff0000";

        const selectGrid = document.getElementById('selectGrid');
        const writeGrid = document.getElementById('writeGrid');
        const displayArea = document.getElementById('displayArea');

        // إنشاء لوحات الحروف
        allChars.split('').forEach(c => {
            const sBtn = document.createElement('button');
            sBtn.className = 'btn char-select-btn';
            if(c === targetChar) sBtn.classList.add('active');
            sBtn.innerText = c;
            sBtn.onclick = () => {
                document.querySelectorAll('.char-select-btn').forEach(b => b.classList.remove('active'));
                sBtn.classList.add('active');
                targetChar = c;
                updateDisplay();
            };
            selectGrid.appendChild(sBtn);

            const wBtn = document.createElement('button');
            wBtn.className = 'btn write-btn';
            wBtn.innerText = c;
            wBtn.onclick = () => addChar(c);
            writeGrid.appendChild(wBtn);
        });

        // إضافة أيقونة اختيار اللون في نهاية الشبكة العلوية
        const colorContainer = document.createElement('div');
        colorContainer.className = 'btn color-picker-container';
        colorContainer.innerHTML = `<span class="color-icon">🎨</span><input type="color" id="picker" value="#ff0000">`;
        colorContainer.querySelector('input').oninput = (e) => {
            targetColor = e.target.value;
            document.documentElement.style.setProperty('--target-color', targetColor);
            updateDisplay();
        };
        selectGrid.appendChild(colorContainer);

        function addChar(c) {
            currentWord += c;
            updateDisplay();
        }

        function deleteLast() {
            currentWord = currentWord.slice(0, -1);
            updateDisplay();
        }

        function clearAll() {
            currentWord = "";
            updateDisplay();
        }

        function updateDisplay() {
            const regex = new RegExp(`(${targetChar}[\u064B-\u0652]?)`, 'g');
            const formatted = currentWord.replace(regex, `<span class="highlight">$1</span>`);
            displayArea.innerHTML = formatted || "...";
        }
    </script>
</body>
</html>
