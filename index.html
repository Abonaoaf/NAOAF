<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرب القراءة الذكي</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; }
        .main-wrapper { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .header { font-size: 28px; font-weight: bold; margin-bottom: 20px; border-bottom: 3px solid #333; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 2px solid #000; height: 120px; vertical-align: middle; position: relative; }
        
        .side-label { width: 120px; font-size: 20px; font-weight: bold; background-color: #f0f0f0; }

        /* تنسيق المربع الذي تكتب فيه */
        .input-box {
            font-size: 60px;
            font-weight: bold;
            color: black;
            outline: none;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            word-spacing: 10px;
        }

        /* هذا الجزء هو سحر التلوين التلقائي */
        .vowel {
            color: red;
            font-size: 1.2em; /* تكبير الحركة قليلاً */
        }

        .row-fatha { background-color: #fffde7; }
        .row-damma { background-color: #e3f2fd; }
        .row-kasra { background-color: #fce4ec; }
        .row-mad { background-color: #f1f8e9; }

        .instruction { color: #666; margin-bottom: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">لوحة التدريب على القراءة التفاعلية</div>
    <p class="instruction">اكتب الكلمة مع حركاتها في المربعات أدناه (ستتحول الحركات للأحمر تلقائياً)</p>
    
    <table>
        <tr class="row-fatha">
            <td class="side-label">بالفتحة</td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
        </tr>
        <tr class="row-damma">
            <td class="side-label">بالضمة</td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
        </tr>
        <tr class="row-kasra">
            <td class="side-label">بالكسرة</td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
        </tr>
        <tr class="row-mad">
            <td class="side-label">بالمدود</td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
            <td><div class="input-box" contenteditable="true" oninput="colorize(this)"></div></td>
        </tr>
    </table>

    <div style="margin-top: 20px; color: red; font-weight: bold;">نقرأ كثيراً حتى نقرأ سريعاً بإذن الله 🌟</div>
</div>

<script>
    function colorize(element) {
        // حفظ مكان المؤشر (Cursor)
        const selection = window.getSelection();
        const range = selection.getRangeAt(0);
        const offset = range.startOffset;

        let text = element.innerText;
        
        // قائمة الحركات والمدود التي نريد تلوينها
        // تشمل: الفتحة، الضمة، الكسرة، السكون، التنوين، وحروف المد
        const vowels = /([ًٌٍَُِّْاوي])/g;

        // استبدال الحركات بـ وسام (span) أحمر
        let coloredHTML = text.replace(vowels, '<span class="vowel">$1</span>');
        
        element.innerHTML = coloredHTML;

        // إعادة المؤشر لمكانه الصحيح
        const newRange = document.createRange();
        newRange.setStart(element, element.childNodes.length);
        newRange.collapse(true);
        selection.removeAllRanges();
        selection.addRange(newRange);
    }
</script>

</body>
</html>
