<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة نواف - لوحة التحكم الكاملة</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            user-select: none; /* لمنع تحديد النص أثناء الضغط السريع */
        }

        .header {
            font-size: 28px;
            margin: 10px 0;
            color: #ffce00;
            text-shadow: 2px 2px #000;
        }

        /* الجزء العلوي: اختيار الحرف المراد تلوينه */
        .selection-zone {
            background: #333;
            padding: 10px;
            border-radius: 15px;
            width: 95%;
            max-width: 900px;
            margin-bottom: 10px;
            border: 2px solid #ff0000;
        }

        .section-title {
            font-size: 16px;
            color: #ffaaaa;
            margin-bottom: 8px;
            text-align: center;
        }

        /* الشبكات (الحروف، الحركات، لوحة الكتابة) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(45px, 1fr));
            gap: 5px;
        }

        .btn {
            font-size: 24px;
            padding: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: white;
            color: black;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .char-select-btn.active {
            background: #ff0000;
            color: white;
            box-shadow: 0 0 10px #ff0000;
        }

        /* السبورة الكبيرة */
        .board {
            width: 95%;
            max-width: 900px;
            background: white;
            border: 12px solid #5d4037;
            border-radius: 20px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            margin: 15px 0;
        }

        #displayArea {
            font-size: 120px;
            font-weight: bold;
            word-break: break-all;
            text-align: center;
        }

        .highlight { color: #ff0000; }

        /* منطقة التحكم السفلية (لوحة مفاتيح نواف) */
        .keyboard-zone {
            background: #222;
            padding: 15px;
            border-radius: 20px;
            width: 95%;
            max-width: 900px;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-action {
            flex: 1;
            font-size: 20px;
            padding: 15px;
            border-radius: 10px;
            color: white;
        }

        .btn-space { background: #555; }
        .btn-delete { background: #c0392b; }
        .btn-clear { background: #7f8c8d; }

        .haraka-btn { background: #4caf50; color: white; font-size: 35px; }
        .tanwin-btn { background: #2196f3; color: white; font-size: 35px; }
        .write-btn { background: #eee; color: #333; font-size: 30px; }
    </style>
</head>
<body>

    <div class="header">🏆 سبورة البطل نواف الذكية</div>

    <div class="selection-zone">
        <div class="section-title">اختر الحرف الذي تريد تلوينه بالأحمر:</div>
        <div class="grid" id="selectGrid"></div>
    </div>

    <div class="board">
        <div id="displayArea">...</div>
    </div>

    <div class="keyboard-zone">
        <div class="section-title">اضغط على الحروف والحركات لتكتب الكلمة:</div>
        
        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 10px;">
            <button class="btn haraka-btn" onclick="addChar('َ')">َ</button>
            <button class="btn haraka-btn" onclick="addChar('ُ')">ُ</button>
            <button class="btn haraka-btn" onclick="addChar('ِ')">ِ</button>
            <button class="btn haraka-btn" onclick="addChar('ْ')">ْ</button>
            <button class="btn haraka-btn" onclick="addChar('ّ')">ّ</button>
            <button class="btn tanwin-btn" onclick="addChar('ً')">ً</button>
            <button class="btn tanwin-btn" onclick="addChar('ٌ')">ٌ</button>
            <button class="btn tanwin-btn" onclick="addChar('ٍ')">ٍ</button>
        </div>

        <div class="grid" id="writeGrid"></div>

        <div class="action-btns">
            <button class="btn btn-action btn-space" onclick="addChar(' ')">مسافة ⎵</button>
            <button class="btn btn-action btn-delete" onclick="deleteLast()">مسح حرف ⌫</button>
            <button class="btn btn-action btn-clear" onclick="clearAll()">مسح الكل 🗑️</button>
        </div>
    </div>

    <script>
        const chars = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
        let targetChar = 'ب';
        let currentWord = "";

        const selectGrid = document.getElementById('selectGrid');
        const writeGrid = document.getElementById('writeGrid');
        const displayArea = document.getElementById('displayArea');

        // إنشاء أزرار اختيار الحرف المستهدف
        chars.split('').forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'btn char-select-btn';
            if(c === targetChar) btn.classList.add('active');
            btn.innerText = c;
            btn.onclick = () => {
                document.querySelectorAll('.char-select-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                targetChar = c;
                updateDisplay();
            };
            selectGrid.appendChild(btn);

            // إنشاء أزرار الكتابة
            const wBtn = document.createElement('button');
            wBtn.className = 'btn write-btn';
            wBtn.innerText = c;
            wBtn.onclick = () => addChar(c);
            writeGrid.appendChild(wBtn);
        });

        function addChar(c) {
            currentWord += c;
            updateDisplay();
        }

        function deleteLast() {
            currentWord = currentWord.slice(0, -1);
            updateDisplay();
        }

        function clearAll() {
            currentWord = "";
            updateDisplay();
        }

        function updateDisplay() {
            // التلوين الذكي: الحرف المستهدف + أي حركة/تنوين تتبعه
            const regex = new RegExp(`(${targetChar}[\u064B-\u0652]?)`, 'g');
            const formatted = currentWord.replace(regex, `<span class="highlight">$1</span>`);
            displayArea.innerHTML = formatted || "...";
        }
    </script>
</body>
</html>
