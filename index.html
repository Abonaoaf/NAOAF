// وظيفة تهيئة القائمة المنسدلة
function init() {
    const selector = document.getElementById('charSelector');
    for (let char in alphabetData) {
        let opt = document.createElement('option');
        opt.value = char;
        opt.innerHTML = char;
        if(char === "ص") opt.selected = true;
        selector.appendChild(opt);
    }
    generateWords();
}

// وظيفة توليد الكلمات وتلوينها مع الحفاظ على الاتصال
function generateWords() {
    const char = document.getElementById('charSelector').value;
    const words = alphabetData[char];
    
    for(let i=1; i<=18; i++) {
        const td = document.getElementById('td' + i);
        const word = words[i-1];
        td.innerHTML = formatWord(word, char);
        
        // تفعيل التلوين التلقائي عند الكتابة اليدوية
        td.oninput = function() {
            const currentText = this.innerText;
            const currentChar = document.getElementById('charSelector').value;
            this.innerHTML = formatWord(currentText, currentChar);
            setCaretToEnd(this);
        };
    }
}

function formatWord(word, char) {
    // Regex يبحث عن الحرف مع حركته
    const regex = new RegExp(`(${char}[\u064B-\u0652]?)`, 'g');
    // نضع الكلمة داخل span لمنع تقطع الحروف (Arabic ligatures)
    return `<span class="word-cell">${word.replace(regex, '<span class="highlight">$1</span>')}</span>`;
}

// وظيفة لإبقاء المؤشر في نهاية الكلمة أثناء الكتابة
function setCaretToEnd(el) {
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
}

window.onload = init;
</script>
