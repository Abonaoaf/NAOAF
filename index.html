<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشاط القراءة - عبد العزيز</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap');
        
        body { font-family: 'Cairo', sans-serif; background: #eee; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .no-print { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 600px; }
        
        select, button { font-family: 'Cairo'; padding: 10px; font-size: 1rem; border-radius: 5px; border: 2px solid #007bff; margin: 5px; cursor: pointer; }
        button { background: #007bff; color: white; border: none; }

        .paper { 
            background: white; width: 210mm; min-height: 280mm; padding: 10mm; 
            border: 2px solid #000; box-sizing: border-box; display: flex; flex-direction: column;
        }

        .title-box { border: 3px solid #000; padding: 10px; text-align: center; margin-bottom: 15px; font-size: 2rem; font-weight: 900; }

        .main-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #000; }
        .main-table td { border: 2px solid #000; height: 110px; text-align: center; vertical-align: middle; font-size: 3rem; font-weight: 900; overflow: hidden; }

        /* تعديل عمود المستويات ليظهر النص بشكل صحيح */
        .level-cell { 
            width: 60px; font-size: 1.2rem; font-weight: bold; background: #f8f9fa;
            text-align: center; vertical-align: middle; border: 2px solid #000;
        }
        .vertical-text { writing-mode: vertical-rl; transform: rotate(180deg); display: inline-block; white-space: nowrap; }

        .highlight { color: #d32f2f; }

        /* ألوان المستويات */
        .bg-1 { background-color: #fff9c4; } .bg-2 { background-color: #e3f2fd; }
        .bg-3 { background-color: #f1f8e9; } .bg-4 { background-color: #fce4ec; }
        .bg-5 { background-color: #ede7f6; } .bg-6 { background-color: #e0f2f1; }

        .footer { text-align: center; margin-top: auto; padding: 20px; color: #d32f2f; font-weight: 900; font-size: 1.5rem; text-decoration: underline; }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .paper { box-shadow: none; border: 2px solid #000; width: 100%; margin: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <strong>🎓 اختر الحرف لتوليد النشاط:</strong><br>
    <select id="letterPicker" onchange="render()"></select>
    <button onclick="window.print()">🖨️ طباعة</button>
</div>

<div class="paper">
    <div class="title-box">نشاط قرائي (( حرف / <span id="charH">ب</span> ))</div>
    <table class="main-table" id="table"></table>
    <div class="footer">نقرأ كثيراً حتى نقرأ سريعاً بإذن الله</div>
</div>

<script>
    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    const levels = [
        { t: "كلمات مفتوحة", c: "bg-1" }, { t: "كلمات مضمومة", c: "bg-2" },
        { t: "كلمات مكسورة", c: "bg-3" }, { t: "مد بالألف", c: "bg-4" },
        { t: "مد بالواو", c: "bg-5" }, { t: "مد بالياء", c: "bg-6" }
    ];

    function getWords(h) {
        return {
            "كلمات مفتوحة": [`${h}َـرَدَ`, `رَ${h}َـدَ`, `نَـصَـ${h}َ`],
            "كلمات مضمومة": [`${h}ُـصِرَ`, `بَـصَـ${h}ُ`, `نُـ${h}ِـبَ`],
            "كلمات مكسورة": [`${h}ِـرَام`, `لَـ${h}ِـسَ`, `بِـ${h}ِـر`],
            "مد بالألف": [`${h}َـادَ`, `صَـ${h}ِـر`, `${h}َـامَ`],
            "مد بالواو": [`${h}ُـوص`, `نَـصُـ${h}ُ`, `صُـ${h}ُـوف`],
            "مد بالياء": [`رَ${h}ِـيد`, `نَـصِـ${h}ُ`, `فَـصِـ${h}ـيل`]
        };
    }

    const sel = document.getElementById('letterPicker');
    alphabet.split('').forEach(l => {
        let o = document.createElement('option'); o.value = l; o.text = "حرف " + l;
        sel.appendChild(o);
    });

    function render() {
        const h = sel.value;
        document.getElementById('charH').innerText = h;
        const table = document.getElementById('table');
        table.innerHTML = "";
        const data = getWords(h);

        levels.forEach(lvl => {
            const row = document.createElement('tr');
            
            // إضافة الكلمات أولاً (3 خانات)
            data[lvl.t].forEach(word => {
                const td = document.createElement('td');
                // الإصلاح هنا: استخدام replace مع HTML صحيح
                td.innerHTML = word.split(h).join(`<span class="highlight">${h}</span>`);
                row.appendChild(td);
            });

            // إضافة اسم المستوى في الجهة اليسرى (أو اليمنى حسب الترتيب)
            const lTd = document.createElement('td');
            lTd.className = `level-cell ${lvl.c}`;
            lTd.innerHTML = `<span class="vertical-text">${lvl.t}</span>`;
            row.appendChild(lTd);

            table.appendChild(row);
        });
    }
    render();
</script>
</body>
</html>
