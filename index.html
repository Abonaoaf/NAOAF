<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرب نواف - بسيط وذكي</title>
    
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { background: white; max-width: 900px; margin: auto; border: 5px solid #2c3e50; border-radius: 15px; overflow: hidden; }
        .header { background: #e63946; color: white; padding: 15px; font-size: 25px; font-weight: bold; }
        .controls { padding: 15px; background: #eee; border-bottom: 2px solid #ddd; }
        
        select { font-size: 20px; padding: 10px; border-radius: 5px; border: 2px solid #e63946; }
        .btn { padding: 10px 20px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; color: white; font-weight: bold; margin: 5px; }
        .btn-save { background: #27ae60; }
        .btn-color { background: #2c3e50; }

        table { width: 100%; border-collapse: collapse; }
        td { border: 1px solid #ccc; height: 100px; position: relative; width: 25%; }
        
        /* المربع الذي تكتب فيه */
        .word-input {
            width: 100%; height: 100%;
            border: none; outline: none;
            text-align: center; font-size: 60px; font-weight: bold;
            background: transparent; display: block;
        }
        
        /* طبقة التلوين */
        .word-display {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* تجعل الضغط يمر للمربع اللي تحته */
            display: none; /* تختفي وقت الكتابة */
            font-size: 60px; font-weight: bold; line-height: 100px;
        }

        .hl { color: #e63946; } /* لون الحرف أحمر */
        .side { background: #2c3e50; color: white; font-size: 18px; width: 100px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مدرسة البطل نـواف 🌟</div>
    <div class="controls">
        <label>اختر الحرف: </label>
        <select id="mainChar" onchange="clearAndRefresh()">
            <option value="أ">أ</option><option value="ب">ب</option><option value="ت">ت</option>
            <option value="ث">ث</option><option value="ج">ج</option><option value="ح">ح</option>
            <option value="خ">خ</option><option value="د">د</option><option value="ذ">ذ</option>
            <option value="ر">ر</option><option value="ز">ز</option><option value="س">س</option>
            <option value="ش">ش</option><option value="ص" selected>ص</option><option value="ض">ض</option>
            <option value="ط">ط</option><option value="ظ">ظ</option><option value="ع">ع</option>
            <option value="غ">غ</option><option value="ف">ف</option><option value="ق">ق</option>
            <option value="ك">ك</option><option value="ل">ل</option><option value="م">م</option>
            <option value="ن">ن</option><option value="هـ">هـ</option><option value="و">و</option>
            <option value="ي">ي</option>
        </select>
        <button class="btn btn-color" onclick="applyColoring()">تلوين الحروف 🖌️</button>
    </div>

    <table>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    const rows = ["الفتحة", "الضمة", "الكسرة", "مد الألف", "مد الواو", "مد الياء"];
    
    function init() {
        const body = document.getElementById('tableBody');
        body.innerHTML = "";
        for (let r of rows) {
            let rowHtml = `<tr><td class="side">${r}</td>`;
            for (let i = 0; i < 3; i++) {
                rowHtml += `<td>
                    <input type="text" class="word-input" onfocus="showInput(this)" onblur="showDisplay(this)">
                    <div class="word-display"></div>
                </td>`;
            }
            rowHtml += `</tr>`;
            body.innerHTML += rowHtml;
        }
    }

    // عندما تضغط على المربع لتكتب
    function showInput(input) {
        input.style.opacity = "1";
        input.nextElementSibling.style.display = "none";
    }

    // عندما تخرج من المربع (ينتهي التعديل)
    function showDisplay(input) {
        if (input.value.trim() === "") return;
        
        const display = input.nextElementSibling;
        const char = document.getElementById('mainChar').value;
        
        // تجهيز شكل الحرف للبحث (مثل الألف والهاء)
        let pattern = (char === "أ") ? "[أإآا]" : (char === "هـ") ? "[هـه]" : char;
        const regex = new RegExp(`(${pattern}[\u064B-\u0652]?)`, 'g');

        // تطبيق التلوين
        display.innerHTML = input.value.replace(regex, `<span class="hl">$1</span>`);
        
        // إخفاء المربع وإظهار النسخة الملونة
        input.style.opacity = "0";
        display.style.display = "block";
    }

    function applyColoring() {
        const inputs = document.querySelectorAll('.word-input');
        inputs.forEach(input => showDisplay(input));
    }

    function clearAndRefresh() {
        const inputs = document.querySelectorAll('.word-input');
        inputs.forEach(input => {
            input.value = "";
            input.style.opacity = "1";
            input.nextElementSibling.style.display = "none";
        });
    }

    init();
</script>

</body>
</html>
