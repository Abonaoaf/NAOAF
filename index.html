<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرسة نواف - قاهر المستحيل</title>
    <style>
        :root { --main-red: #FF0000; --dark-blue: #1A2A3A; }
        body { font-family: 'Arial', sans-serif; background: #F0F2F5; text-align: center; padding: 20px; }
        .container { background: white; max-width: 900px; margin: auto; border-radius: 25px; border: 6px solid var(--dark-blue); overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .header { background: var(--main-red); color: white; padding: 20px; font-size: 30px; font-weight: bold; }
        
        .harakat-bar { background: #fff; padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #eee; }
        .h-btn { 
            background: white; border: 3px solid var(--main-red); border-radius: 15px; 
            width: 65px; height: 65px; font-size: 40px; font-weight: bold; color: var(--main-red);
            cursor: pointer; transition: 0.2s;
        }
        .h-btn:hover { background: var(--main-red); color: white; }

        table { width: 100%; border-collapse: collapse; background: white; }
        td { border: 1px solid #ddd; height: 120px; position: relative; width: 30%; }
        .side { background: var(--dark-blue); color: white; font-size: 22px; width: 140px; font-weight: bold; }

        /* منطقة الكتابة السحرية */
        .wrapper { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        .word-input {
            width: 100%; height: 100%; border: none; outline: none;
            text-align: center; font-size: 65px; font-weight: bold;
            background: transparent; position: relative; z-index: 3;
            color: black; /* نكتب بالأسود بشكل طبيعي جداً */
        }

        /* طبقة التلوين الأحمر التي تظهر "فوق" الحرف المختار فقط */
        .color-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 65px; font-weight: bold; white-space: pre;
            color: transparent; /* نخفي كل النص */
        }

        /* الحرف المختار وحركته فقط هم من سيظهرون بالأحمر */
        .hl { color: var(--main-red); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مدرسة نـواف - تحدي الذكاء 🥊</div>

    <div class="harakat-bar">
        <button class="h-btn" onmousedown="event.preventDefault(); addH('َ')"> َ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ُ')"> ُ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ِ')"> ِ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ْ')"> ْ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ّ')"> ّ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ً')"> ً </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ٌ')"> ٌ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ٍ')"> ٍ </button>
    </div>

    <table>
        <tr><td class="side">الفتحة</td><td><div class="wrapper"><input type="text" class="word-input" onfocus="activeIn=this" oninput="sync(this)"><div class="color-layer"></div></div></td><td><div class="wrapper"><input type="text" class="word-input" onfocus="activeIn=this" oninput="sync(this)"><div class="color-layer"></div></div></td><td><div class="wrapper"><input type="text" class="word-input" onfocus="activeIn=this" oninput="sync(this)"><div class="color-layer"></div></div></td></tr>
        <tr><td class="side">الضمة</td><td><div class="wrapper"><input type="text" class="word-input" onfocus="activeIn=this" oninput="sync(this)"><div class="color-layer"></div></div></td><td><div class="wrapper"><input type="text" class="word-input" onfocus="activeIn=this" oninput="sync(this)"><div class="color-layer"></div></div></td><td><div class="wrapper"><input type="text" class="word-input" onfocus="activeIn=this" oninput="sync(this)"><div class="color-layer"></div></div></td></tr>
        <tr><td class="side">الكسرة</td><td><div class="wrapper"><input type="text" class="word-input" onfocus="activeIn=this" oninput="sync(this)"><div class="color-layer"></div></div></td><td><div class="wrapper"><input type="text" class="word-input" onfocus="activeIn=this" oninput="sync(this)"><div class="color-layer"></div></div></td><td><div class="wrapper"><input type="text" class="word-input" onfocus="activeIn=this" oninput="sync(this)"><div class="color-layer"></div></div></td></tr>
    </table>
</div>

<script>
    let activeIn = null;
    const targetChar = "ص"; // الحرف الذي نريد صيده وتلوينه

    function addH(h) {
        if (!activeIn) return;
        let start = activeIn.selectionStart;
        let val = activeIn.value;
        
        // استبدال الحركة إذا كانت موجودة
        if (/[\u064B-\u0652]/.test(val.charAt(start - 1))) {
            val = val.slice(0, start - 1) + val.slice(start);
            start--;
        }

        activeIn.value = val.slice(0, start) + h + val.slice(start);
        activeIn.focus();
        activeIn.setSelectionRange(start + 1, start + 1);
        sync(activeIn);
    }

    function sync(input) {
        const layer = input.nextElementSibling;
        const val = input.value;
        if (!val) { layer.innerHTML = ""; return; }

        // صيد الحرف المختار مع أي حركة تتبعه (بما في ذلك الحركات التي يضعها المستخدم)
        let p = (targetChar === "أ") ? "[أإآا]" : (targetChar === "هـ") ? "[هـه]" : targetChar;
        let regex = new RegExp(`(${p}[\u0651]?[\u064B-\u0652]?)`, 'g');

        // السحر هنا: الطبقة الملونة تأخذ نفس النص تماماً
        // لكننا نجعل كل الحروف شفافة ماعدا "الحرف المختار وحركته" نجعله أحمر
        layer.innerHTML = val.replace(regex, `<span class="hl">$1</span>`);
        
        // لجعل النص الأسود الأصلي يختفي "فقط" في مكان الحرف الأحمر لكي لا يتداخلا
        // سنستخدم حيلة بسيطة: النص الأحمر في الطبقة الثانية يغطي الأسود تماماً.
    }
</script>
</body>
</html>
