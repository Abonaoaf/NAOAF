<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد النشاط القرائي</title>
    <style>
        :root {
            --primary: #2c3e50;
            --bg-color: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); text-align: center; padding: 20px; }
        .no-print { margin-bottom: 30px; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        
        /* تصميم الورقة */
        .worksheet { background: white; width: 800px; margin: 0 auto; padding: 30px; border: 5px double #333; position: relative; }
        h1 { color: #d32f2f; margin-bottom: 5px; }
        .subtitle { font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .section-box { border: 2px solid #444; border-radius: 8px; overflow: hidden; }
        .section-title { padding: 10px; font-weight: bold; font-size: 1.1rem; border-bottom: 2px solid #444; }
        .words { padding: 15px; font-size: 2rem; min-height: 120px; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
        
        /* ألوان الأقسام */
        .color-1 { background-color: #fff9c4; } .color-1 .section-title { background: #fbc02d; }
        .color-2 { background-color: #e3f2fd; } .color-2 .section-title { background: #2196f3; color: white; }
        .color-3 { background-color: #f1f8e9; } .color-3 .section-title { background: #8bc34a; }
        .color-4 { background-color: #fce4ec; } .color-4 .section-title { background: #e91e63; color: white; }
        .color-5 { background-color: #ede7f6; } .color-5 .section-title { background: #673ab7; color: white; }
        .color-6 { background-color: #e0f2f1; } .color-6 .section-title { background: #009688; color: white; }

        .footer-note { margin-top: 30px; color: #d32f2f; font-weight: bold; font-size: 1.3rem; }
        
        .char-highlight { color: #d32f2f; }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .worksheet { border: 3px solid #000; width: 100%; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <h3>أداة توليد أنشطة الحروف</h3>
        <p>اختر الحرف لتحديث الكلمات:</p>
        <button onclick="updateLetter('ب')">حرف ب</button>
        <button onclick="updateLetter('ت')">حرف ت</button>
        <button onclick="window.print()">طباعة النشاط</button>
    </div>

    <div class="worksheet" id="worksheet">
        <h1>نشاط قرائي (( حرف / <span id="main-char">ب</span> ))</h1>
        <p class="subtitle">نقرأ كثيراً لنقرأ سريعاً بإذن الله</p>

        <div class="grid-container">
            <div class="section-box color-1">
                <div class="section-title">كلمات مفتوحة</div>
                <div class="words" id="open-vowel"></div>
            </div>
            <div class="section-box color-2">
                <div class="section-title">كلمات مضمومة</div>
                <div class="words" id="close-vowel"></div>
            </div>
            <div class="section-box color-3">
                <div class="section-title">كلمات مكسورة</div>
                <div class="words" id="break-vowel"></div>
            </div>
            <div class="section-box color-4">
                <div class="section-title">مد بالألف</div>
                <div class="words" id="mad-alif"></div>
            </div>
            <div class="section-box color-5">
                <div class="section-title">مد بالواو</div>
                <div class="words" id="mad-waw"></div>
            </div>
            <div class="section-box color-6">
                <div class="section-title">مد بالياء</div>
                <div class="words" id="mad-ya"></div>
            </div>
        </div>

        <div class="footer-note">نقرأ كثيراً حتى نقرأ سريعاً بإذن الله</div>
    </div>

    <script>
        const data = {
            'ب': {
                open: ['بَـرَدَ', 'بَـعَثَ', 'ذَهَـبَ'],
                close: ['بُـذِرَ', 'بُـعِثَ', 'كُتُـبُ'],
                break: ['بِـلادُ', 'لَـبِـسَ', 'بِـنْتُ'],
                alif: ['بَـابٌ', 'بَـاسِم', 'صَـابِر'],
                waw: ['بُـومَة', 'حُـبُوب', 'طُـبُول'],
                ya: ['عَـبِير', 'طَـبِيب', 'بِـير']
            }
            // يمكنك إضافة المزيد من الحروف هنا بنفس التنسيق
        };

        function updateLetter(char) {
            document.getElementById('main-char').innerText = char;
            const letterData = data[char];
            
            document.getElementById('open-vowel').innerHTML = letterData.open.join('<br>');
            document.getElementById('close-vowel').innerHTML = letterData.close.join('<br>');
            document.getElementById('break-vowel').innerHTML = letterData.break.join('<br>');
            document.getElementById('mad-alif').innerHTML = letterData.alif.join('<br>');
            document.getElementById('mad-waw').innerHTML = letterData.waw.join('<br>');
            document.getElementById('mad-ya').innerHTML = letterData.ya.join('<br>');
        }

        // تشغيل افتراضي لحرف الباء
        updateLetter('ب');
    </script>
</body>
</html>
