<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرب القراءة التفاعلي</title>
    <style>
        :root { --border-color: #000; }
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f4; padding: 20px; }
        .main-wrapper { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        .header { text-align: center; font-size: 30px; font-weight: bold; margin-bottom: 20px; color: #333; border-bottom: 3px solid var(--border-color); padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; direction: rtl; }
        th, td { border: 2px solid var(--border-color); height: 110px; text-align: center; vertical-align: middle; }
        
        /* عمود العناوين في اليمين */
        .side-label { width: 80px; font-size: 20px; font-weight: bold; background-color: #f0f0f0; color: #000; }
        
        /* تلوين الصفوف لتسهيل التمييز البصري للطفل */
        .row-fatha { background-color: #fff9c4; } 
        .row-damma { background-color: #e3f2fd; } 
        .row-kasra { background-color: #fce4ec; } 
        .row-alf { background-color: #e8f5e9; }   
        .row-waw { background-color: #f3e5f5; }   
        .row-yaa { background-color: #fff3e0; }   

        /* تنسيق الكلمة والحركة */
        .word-box { font-size: 55px; font-weight: bold; color: black; outline: none; white-space: nowrap; }
        .mark { color: red; font-size: 65px; position: relative; top: -5px; } /* تكبير الحركة جداً */

        .controls { margin-bottom: 20px; text-align: center; border-bottom: 1px solid #ccc; padding-bottom: 15px; }
        select { font-size: 22px; padding: 10px 30px; border-radius: 8px; border: 2px solid #007bff; cursor: pointer; background: #fff; }

        @media print { .controls { display: none; } .main-wrapper { box-shadow: none; border: none; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="controls">
        <label style="font-size: 22px; font-weight: bold;">اختر الحرف: </label>
        <select id="letterPicker" onchange="renderTable()">
            </select>
        <p style="color: #666;">* اضغط على الكلمة لتعديلها يدوياً (كل الكلمات ثلاثية).</p>
    </div>

    <div class="header">نشاط قرائي (( حرف <span id="currentLetter" style="color: red;">أ</span> ))</div>
    
    <table>
        <tbody id="tableBody">
            </tbody>
    </table>

    <div style="text-align: center; margin-top: 30px; color: red; font-size: 24px; font-weight: bold;">
        نقرأ كثيراً حتى نقرأ سريعاً بإذن الله
    </div>
</div>

<script>
    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    const levels = [
        { title: 'بالفتحة', mark: 'َ', class: 'row-fatha' },
        { title: 'بالضمة', mark: 'ُ', class: 'row-damma' },
        { title: 'بالكسرة', mark: 'ِ', class: 'row-kasra' },
        { title: 'مد بالألف', mark: 'ا', class: 'row-alf' },
        { title: 'مد بالواو', mark: 'و', class: 'row-waw' },
        { title: 'مد بالياء', mark: 'ي', class: 'row-yaa' }
    ];

    // توليد قائمة الحروف كاملة
    const picker = document.getElementById('letterPicker');
    alphabet.split('').forEach(l => {
        let opt = document.createElement('option');
        opt.value = l;
        opt.innerText = `حرف (${l})`;
        picker.appendChild(opt);
    });

    function renderTable() {
        const letter = picker.value;
        document.getElementById('currentLetter').innerText = letter;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        levels.forEach(level => {
            const tr = document.createElement('tr');
            tr.className = level.class;

            // 1. إضافة عنوان المستوى في جهة اليمين أولاً
            const sideTd = document.createElement('td');
            sideTd.className = 'side-label';
            sideTd.innerText = level.title;
            tr.appendChild(sideTd);

            // 2. إضافة 3 كلمات ثلاثية في الصف
            for (let i = 0; i < 3; i++) {
                const td = document.createElement('td');
                // تنسيق الكلمة: حرف (أسود) + حركة (حمراء كبيرة) + حرفين (أسود)
                td.innerHTML = `<div class="word-box" contenteditable="true">
                                   <span>${letter}</span><span class="mark">${level.mark}</span><span>دد</span>
                                </div>`;
                tr.appendChild(td);
            }

            tbody.appendChild(tr);
        });
    }

    renderTable(); // التشغيل الافتراضي
</script>

</body>
</html>
