<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرسة الحروف الذكية</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            background-color: #ff0000;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .toolbar {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            background: #fafafa;
            border-bottom: 2px solid #eee;
        }

        select {
            padding: 10px 25px;
            font-size: 18px;
            border-radius: 8px;
            border: 2px solid #ddd;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            font-size: 20px;
            width: 150px;
        }

        td {
            border: 1px solid #eee;
            padding: 10px;
        }

        /* خانة الكتابة السحرية */
        .editable-cell {
            min-height: 40px;
            padding: 10px;
            font-size: 28px;
            border: 1px dashed #ccc;
            border-radius: 5px;
            outline: none;
            background: #fff;
            color: black;
            text-align: center;
        }

        .editable-cell:focus {
            border-color: #ff0000;
            background: #fffef0;
        }

        .red-char {
            color: #ff0000 !important;
            font-weight: bold;
        }

        .inputs-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">🏫 مدرسة الحروف - التلوين التلقائي</div>
    
    <div class="toolbar">
        <label style="font-size: 20px;">اختر الحرف المستهدف:</label>
        <select id="mainChar" onchange="resetAllCells()">
            </select>
    </div>

    <table>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    const chars = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    const categories = ["الفتحة", "الضمة", "الكسرة", "مد الألف", "مد الواو", "مد الياء"];
    const select = document.getElementById('mainChar');
    const tableBody = document.getElementById('tableBody');

    // 1. تعبئة قائمة الحروف
    chars.split('').forEach(c => {
        let opt = document.createElement('option');
        opt.value = c;
        opt.innerHTML = c;
        select.appendChild(opt);
    });

    // 2. بناء الجدول (6 أنواع × 3 كلمات)
    categories.forEach(cat => {
        let row = `
            <tr>
                <th>${cat}</th>
                <td>
                    <div class="inputs-group">
                        <div class="editable-cell" contenteditable="true" oninput="handleInput(this)"></div>
                        <div class="editable-cell" contenteditable="true" oninput="handleInput(this)"></div>
                        <div class="editable-cell" contenteditable="true" oninput="handleInput(this)"></div>
                    </div>
                </td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });

    // 3. دالة معالجة التلوين الفوري
    function handleInput(element) {
        const targetChar = document.getElementById('mainChar').value;
        let text = element.innerText;
        
        // حفظ مكان المؤشر (Cursor Position)
        const selection = window.getSelection();
        const range = selection.getRangeAt(0);
        const offset = range.startOffset;

        // Regex للبحث عن الحرف مع حركاته (فتحة، ضمة، كسرة، سكون، تنوين، شدة)
        const regex = new RegExp(`(${targetChar}[\u064B-\u0652\u0670]?)`, 'g');
        
        // تطبيق التلوين عبر HTML
        const newHTML = text.replace(regex, `<span class="red-char">$1</span>`);
        
        if (element.innerHTML !== newHTML) {
            element.innerHTML = newHTML;
            
            // إعادة المؤشر لمكانه الصحيح بعد تحديث الـ HTML
            const newRange = document.createRange();
            const newSelection = window.getSelection();
            if (element.lastChild) {
                newRange.setStart(element.lastChild, element.innerText.length); 
                newRange.collapse(true);
                newSelection.removeAllRanges();
                newSelection.addRange(newRange);
            }
        }
    }

    function resetAllCells() {
        document.querySelectorAll('.editable-cell').forEach(cell => {
            handleInput(cell); // إعادة معالجة الكلمات المكتوبة بناءً على الحرف الجديد
        });
    }
</script>

</body>
    </html>
