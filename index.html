<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة نواف الفيفي - الإصدار النهائي</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            user-select: none;
            touch-action: manipulation;
        }

        .main-title { font-size: 32px; color: #ffce00; margin: 15px 0 5px 0; }
        .sub-title { font-size: 18px; color: #4caf50; margin-bottom: 10px; }

        /* منطقة السبورة - ضمان اتصال الحروف */
        .board {
            width: 95%;
            max-width: 900px;
            background: white;
            border: 12px solid #5d4037;
            border-radius: 25px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #displayArea {
            font-size: 150px; /* حجم ضخم جداً */
            font-weight: bold;
            display: flex;
            flex-direction: row-reverse; /* لضمان اتصال الحروف العربية */
            align-items: center;
            justify-content: center;
        }

        /* لوحة التحكم */
        .keyboard-zone {
            background: #2c3e50;
            padding: 20px;
            border-radius: 25px;
            width: 95%;
            max-width: 950px;
        }

        /* اختيار الأقلام */
        .pens-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .pen {
            width: 70px; height: 70px;
            border-radius: 50%; cursor: pointer;
            border: 5px solid #fff; transition: 0.2s;
        }

        .pen.active { transform: scale(1.2); border-color: #ffce00; box-shadow: 0 0 20px rgba(255,206,0,0.6); }

        /* شبكة الحروف والحركات */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; }
        
        .btn {
            font-size: 38px; height: 85px; cursor: pointer; border: none;
            border-radius: 15px; background: white; color: black;
            font-weight: bold; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px #ccc;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        /* تلوين أزرار الحركات للتمييز */
        .btn-fatha { background: #4caf50; color: white; } /* أخضر */
        .btn-shadda { background: #9c27b0; color: white; } /* بنفسجي */
        .btn-tanwin { background: #2196f3; color: white; } /* أزرق */

        .action-btns { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-action { font-size: 22px; padding: 20px; border-radius: 15px; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-space { background: #555; }
        .btn-delete { background: #c0392b; }
        .btn-clear { background: #7f8c8d; }

        .char-span { 
            line-height: 1;
            margin-left: -2px; /* تداخل بسيط لضمان الاتصال */
        }
    </style>
</head>
<body>

    <div class="main-title">نواف الفيفي - سبورتي الذكية</div>
    <div class="sub-title">اختر لون القلم ثم اكتب يا بطل 🌟</div>

    <div class="board">
        <div id="displayArea"></div>
    </div>

    <div class="keyboard-zone">
        <div class="pens-container">
            <div class="pen active" style="background: red;" onclick="setPen('red', this)"></div>
            <div class="pen" style="background: blue;" onclick="setPen('blue', this)"></div>
            <div class="pen" style="background: green;" onclick="setPen('green', this)"></div>
            <div class="pen" style="background: black;" onclick="setPen('black', this)"></div>
        </div>

        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 20px;">
            <button class="btn btn-fatha" onclick="addChar('َ')">َ</button>
            <button class="btn btn-fatha" onclick="addChar('ُ')">ُ</button>
            <button class="btn btn-fatha" onclick="addChar('ِ')">ِ</button>
            <button class="btn btn-shadda" onclick="addChar('ْ')">ْ</button>
            <button class="btn btn-shadda" onclick="addChar('ّ')">ّ</button>
            <button class="btn btn-tanwin" onclick="addChar('ً')">ً</button>
            <button class="btn btn-tanwin" onclick="addChar('ٌ')">ٌ</button>
            <button class="btn btn-tanwin" onclick="addChar('ٍ')">ٍ</button>
        </div>

        <div class="grid" id="writeGrid"></div>

        <div class="action-btns">
            <button class="btn-action btn-space" onclick="addChar(' ')">مسافة</button>
            <button class="btn-action btn-delete" onclick="deleteLast()">مسح ⌫</button>
            <button class="btn-action btn-clear" onclick="clearAll()">جديد 🗑️</button>
        </div>
    </div>

    <script>
        const allChars = "أإآبتثجحخدذرزسشصضطظعغفقكلمنهويةوي";
        let activeColor = 'red';
        let wordData = []; 

        function setPen(color, element) {
            activeColor = color;
            document.querySelectorAll('.pen').forEach(p => p.classList.remove('active'));
            element.classList.add('active');
        }

        const writeGrid = document.getElementById('writeGrid');
        const displayArea = document.getElementById('displayArea');

        allChars.split('').forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = c;
            btn.onclick = () => addChar(c);
            writeGrid.appendChild(btn);
        });

        function addChar(c) {
            wordData.push({ char: c, color: activeColor });
            render();
        }

        function deleteLast() {
            wordData.pop();
            render();
        }

        function clearAll() {
            wordData = [];
            render();
        }

        function render() {
            displayArea.innerHTML = "";
            if (wordData.length === 0) {
                displayArea.style.color = "#ccc";
                displayArea.innerText = "اكتب..";
                return;
            }

            // رسم الحروف من اليمين للياسر مع التصاق تام
            wordData.forEach(item => {
                const span = document.createElement('span');
                span.className = "char-span";
                span.innerText = item.char;
                span.style.color = item.color;
                displayArea.appendChild(span);
            });
        }
    </script>
</body>
</html>
