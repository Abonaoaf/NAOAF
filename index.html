<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحدي نواف - النسخة الحديدية</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main-red: #FF0000; --dark-blue: #1A2A3A; }
        body { font-family: 'Arial', sans-serif; background: #F4F4F9; padding: 10px; text-align: center; }
        .container { background: white; max-width: 950px; margin: auto; border: 5px solid var(--dark-blue); border-radius: 20px; overflow: hidden; }
        .header { background: var(--main-red); color: white; padding: 15px; font-size: 28px; font-weight: bold; }
        
        /* أزرار الحركات */
        .harakat-bar { background: #FFF; padding: 15px; display: flex; justify-content: center; gap: 8px; border-bottom: 3px solid #DDD; }
        .h-btn { 
            background: #FFF; border: 3px solid var(--main-red); border-radius: 12px; 
            width: 65px; height: 65px; font-size: 45px; font-weight: bold; color: var(--main-red);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        table { width: 100%; border-collapse: collapse; }
        td { border: 2px solid #CCC; height: 110px; position: relative; background: white; }
        
        /* المربع الأساسي */
        .word-input {
            width: 100%; height: 100%; border: none; outline: none;
            text-align: center; font-size: 65px; font-weight: bold;
            background: transparent; position: relative; z-index: 2;
            color: black; 
        }
        
        /* طبقة التلوين الخلفية الذكية */
        .word-display {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; font-size: 65px; font-weight: bold; 
            line-height: 110px; display: flex; align-items: center; justify-content: center;
            white-space: pre; color: transparent;
        }

        /* هنا السر: تلوين الحرف المختار بالأحمر مع ضمان عدم فصل الحروف */
        .hl { color: var(--main-red); visibility: visible; }
        
        .side { background: var(--dark-blue); color: white; font-size: 20px; width: 130px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مدرسة نـواف - لا مكان للمستحيل 💪</div>

    <div class="harakat-bar">
        <button class="h-btn" onmousedown="event.preventDefault(); addH('َ')"> َ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ُ')"> ُ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ِ')"> ِ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ْ')"> ْ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ّ')"> ّ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ً')"> ً </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ٌ')"> ٌ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addH('ٍ')"> ٍ </button>
    </div>

    <table>
        <tr><td class="side">الفتحة</td><td><input type="text" class="word-input" onfocus="lastI=this" oninput="sync(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastI=this" oninput="sync(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastI=this" oninput="sync(this)"><div class="word-display"></div></td></tr>
        <tr><td class="side">الضمة</td><td><input type="text" class="word-input" onfocus="lastI=this" oninput="sync(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastI=this" oninput="sync(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastI=this" oninput="sync(this)"><div class="word-display"></div></td></tr>
        <tr><td class="side">الكسرة</td><td><input type="text" class="word-input" onfocus="lastI=this" oninput="sync(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastI=this" oninput="sync(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastI=this" oninput="sync(this)"><div class="word-display"></div></td></tr>
    </table>
</div>

<script>
    let lastI = null;
    const charToHighlight = "ص"; // الحرف المختار (يمكنك تغييره ليكون متغيراً)

    function addH(h) {
        if (!lastI) return;
        let start = lastI.selectionStart;
        let end = lastI.selectionEnd;
        let val = lastI.value;
        
        lastI.value = val.slice(0, start) + h + val.slice(end);
        lastI.focus();
        lastI.setSelectionRange(start + 1, start + 1);
        sync(lastI);
    }

    function sync(input) {
        const display = input.nextElementSibling;
        const text = input.value;
        if (!text) { display.innerHTML = ""; return; }

        // استخدام RegExp للبحث عن الحرف + أي حركة تتبعه مباشرة
        // الحرف المختار أو بدائله (مثل هـ / ه)
        let p = (charToHighlight === "أ") ? "[أإآا]" : (charToHighlight === "هـ") ? "[هـه]" : charToHighlight;
        let regex = new RegExp(`(${p}[\u0651]?[\u064B-\u0652]?)`, 'g');

        // التلوين: نجعل النص الأصلي في الـ input شفافاً (باستثناء المؤشر)
        // ونظهر النص الملون في الـ display خلفه تماماً
        display.innerHTML = text.replace(regex, `<span class="hl">$1</span>`);
        
        input.style.color = "rgba(0,0,0,0.3)"; // نص باهت للكتابة
        // بمجرد مطابقة الحرف، الـ display سيعرض النسخة الحمراء فوقه
    }
</script>
</body>
</html>
