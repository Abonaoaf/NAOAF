<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة نواف التعليمية - النسخة المراجعة</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main-red: #e63946; --dark-blue: #2c3e50; }
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { background: white; max-width: 1000px; margin: auto; border: 4px solid var(--dark-blue); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { background: var(--main-red); color: white; padding: 15px; font-size: 30px; font-weight: bold; text-align: center; border-bottom: 5px solid #b91c1c; }
        .status-bar { background: #34495e; color: #fff; padding: 6px; font-size: 14px; text-align: center; }
        .controls { padding: 15px; background: #eee; text-align: center; border-bottom: 2px solid #ddd; }
        select { font-size: 24px; padding: 5px 25px; border-radius: 10px; border: 3px solid var(--main-red); font-weight: bold; cursor: pointer; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 10px 30px; font-size: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save:hover { background: #219150; transform: scale(1.05); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 1px solid #ccc; height: 120px; font-size: 80px; font-weight: bold; text-align: center; }
        .hl { color: var(--main-red); }
        .side { width: 130px; font-size: 20px; background: var(--dark-blue); color: white; font-weight: normal; }
        .editable { outline: none; display: block; width: 100%; height: 100%; line-height: 120px; white-space: nowrap; }
        .r1 { background: #fff5f5; } .r2 { background: #fffaf0; } .r3 { background: #f0fff4; }
        .r4 { background: #ebf8ff; } .r5 { background: #faf5ff; } .r6 { background: #fff5f7; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مدرسة البطل نـواف - القراءة المتقنة 🚀</div>
    <div id="status" class="status-bar">جاري فحص الاتصال...</div>
    
    <div class="controls">
        <label style="font-size: 20px; font-weight: bold;">اختر الحرف: </label>
        <select id="charSelector" onchange="loadData()">
            </select>
        <button class="btn-save" onclick="uploadData()">حفظ تعديلاتي للسحابة 💾</button>
    </div>

    <table>
        <tr class="r1"><td class="side">الفتحة</td><td id="td1"></td><td id="td2"></td><td id="td3"></td></tr>
        <tr class="r2"><td class="side">الضمة</td><td id="td4"></td><td id="td5"></td><td id="td6"></td></tr>
        <tr class="r3"><td class="side">الكسرة</td><td id="td7"></td><td id="td8"></td><td id="td9"></td></tr>
        <tr class="r4"><td class="side">مد الألف</td><td id="td10"></td><td id="td11"></td><td id="td12"></td></tr>
        <tr class="r5"><td class="side">مد الواو</td><td id="td13"></td><td id="td14"></td><td id="td15"></td></tr>
        <tr class="r6"><td class="side">مد الياء</td><td id="td16"></td><td id="td17"></td><td id="td18"></td></tr>
    </table>
</div>

<script>
// --- إعدادات Firebase (ضع بياناتك هنا) ---
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
};

try { firebase.initializeApp(firebaseConfig); } catch(e) {}
const database = firebase.database();

// --- قاعدة بيانات كلمات نواف (مراجعة يدوياً) ---
const masterDB = {
    "أ": ["أَكَلَ","أَمَرَ","أَخَذَ","أُكِلَ","أُمِرَ","أُخِذَ","إِبِلِ","إِذَنِ","إِرَمِ","آدَمُ","آيَةُ","آكَـلَ","أُوبُ","أُودُ","أُورُ","إِيمَ","إِيادُ","إِيهِ"],
    "ب": ["بَرَأَ","بَحَثَ","بَلَغَ","بُعِثَ","بُهِتَ","بُورِكَ","بِحارُ","بِقاعُ","بِلادُ","بَارَ","بَاعَ","بَانَ","بُومُ","بُورُ","بُوحُ","بِيرُ","بِيعَ","نَبِيلُ"],
    "م": ["مَسَحَ","مَنَعَ","مَلَكَ","مُسِحَ","مُنِعَ","مُلِكَ","مِدادُ","مِثالُ","مِقْدارُ","مَاتَ","مَالَ","مَانَ","مُورُ","مُومُ","نُمورُ","مِيلُ","سَمِيعُ","أَمِيرُ"],
    "هـ": ["هَدَمَ","هَرَبَ","هَزَمَ","هُدِمَ","هُرِبَ","هُزِمَ","هِلالُ","هِشامُ","هِباتُ","هَامَ","هَانَ","هَادَ","هُودُ","زُهورُ","كُهوفُ","هِيـمَ","فَهيمُ","شَهيدُ"],
    "ص": ["صَبَرَ","صَدَقَ","صَلَحَ","صُبِرَ","صُدِقَ","صُورَ","صِغارُ","صِعابُ","صِراطُ","صَادَ","صَامَ","صَارَ","صُوصُ","صُورُ","نَصومُ","صِيدَ","رَصِيدُ","عَصِيرُ"],
    "ن": ["نَصَرَ","نَظَرَ","نَزَلَ","نُصِرَ","نُظِرَ","نُزِلَ","نِضالُ","نِداءُ","نِتاجُ","نَامَ","نَالَ","نَارُ","نُورُ","نُونُ","فُنونُ","نِيلُ","مُنيرُ","نَصيبُ"]
};

const allChars = "أبتثجحخدذرزمسشصضطظعغفقكلمنهـوي";

window.onload = function() {
    const sel = document.getElementById('charSelector');
    for (let c of allChars) {
        let opt = document.createElement('option');
        opt.value = c; opt.text = c;
        if(c === "ص") opt.selected = true;
        sel.add(opt);
    }
    loadData();
};

function loadData() {
    const char = document.getElementById('charSelector').value;
    const status = document.getElementById('status');
    
    // سحب الكلمات من MasterDB أو توليد افتراضي إذا لم يوجد الحرف في القائمة اليدوية بعد
    let words = masterDB[char] || generateGeneric(char);
    
    displayWords(words);

    try {
        database.ref('nawaf_educational_data/' + char).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                displayWords(snapshot.val());
                status.innerText = "✅ تم تحميل تعديلاتك الخاصة لهذا الحرف";
            } else {
                status.innerText = "🤖 يتم عرض الكلمات المراجعة لغوياً";
            }
        });
    } catch(e) { status.innerText = "⚠️ وضع المعاينة (يرجى ربط السحابة)"; }
}

function displayWords(words) {
    for (let i = 1; i <= 18; i++) {
        const cell = document.getElementById('td' + i);
        cell.innerHTML = `<div contenteditable="true" class="editable" oninput="applyColor(this)">${words[i-1] || ''}</div>`;
        applyColor(cell.firstChild);
    }
}

function generateGeneric(c) {
    // خطة بديلة للحروف التي لم تكتمل في masterDB بعد
    return [c+"َ...",c+"َ...",c+"َ...",c+"ُ...",c+"ُ...",c+"ُ...",c+"ِ...",c+"ِ...",c+"ِ...",c+"ا...",c+"ا...",c+"ا...",c+"و...",c+"و...",c+"و...",c+"ي...",c+"ي...",c+"ي..."];
}

function uploadData() {
    const char = document.getElementById('charSelector').value;
    const words = [];
    for (let i = 1; i <= 18; i++) {
        words.push(document.getElementById('td' + i).innerText);
    }
    database.ref('nawaf_educational_data/' + char).set(words).then(() => {
        alert("بطل يا نواف! تم حفظ تعديلات حرف (" + char + ") في السحابة.");
    });
}

function applyColor(el) {
    let content = el.innerText;
    const activeChar = document.getElementById('charSelector').value;
    let pattern = (activeChar === "أ") ? "[أإآا]" : (activeChar === "هـ") ? "[هـه]" : activeChar;
    
    // تلوين الحرف مع حركته فقط
    const regex = new RegExp(`(${pattern}[\u064B-\u0652]?)`, 'g');
    el.innerHTML = content.replace(regex, `<span class="hl">$1</span>`);
    
    // تثبيت المؤشر في مكان الكتابة
    const range = document.createRange();
    const sel = window.getSelection();
    if (el.childNodes.length > 0) {
        range.selectNodeContents(el);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
    }
}
</script>
</body>
</html>
