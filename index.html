<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرب القراءة السحابي - نواف</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main-red: #e63946; --dark-blue: #2c3e50; }
        body { font-family: 'Arial', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .container { background: white; max-width: 1000px; margin: auto; border: 4px solid var(--dark-blue); border-radius: 20px; overflow: hidden; }
        .header { background: var(--main-red); color: white; padding: 15px; font-size: 28px; font-weight: bold; text-align: center; }
        .status-bar { background: #34495e; color: #fff; padding: 8px; font-size: 14px; text-align: center; }
        .controls { padding: 15px; background: #eee; text-align: center; border-bottom: 2px solid #ddd; }
        select { font-size: 22px; padding: 5px 20px; border-radius: 8px; border: 2px solid var(--main-red); font-weight: bold; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 10px 25px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 1px solid #ccc; height: 110px; font-size: 75px; font-weight: bold; text-align: center; }
        .hl { color: var(--main-red); display: inline; }
        .side { width: 110px; font-size: 18px; background: var(--dark-blue); color: white; }
        .editable { outline: none; display: block; width: 100%; height: 100%; line-height: 110px; }
        .r1 { background: #fff5f5; } .r2 { background: #fffaf0; } .r3 { background: #f0fff4; }
        .r4 { background: #ebf8ff; } .r5 { background: #faf5ff; } .r6 { background: #fff5f7; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مدرسة نواف - النسخة السحابية ☁️</div>
    <div id="status" class="status-bar">جاري الاتصال...</div>
    
    <div class="controls">
        <select id="charSelector" onchange="fetchData()">
            </select>
        <button class="btn-save" onclick="uploadData()">حفظ التعديلات ✅</button>
    </div>

    <table>
        <tr class="r1"><td class="side">الفتحة</td><td id="td1"></td><td id="td2"></td><td id="td3"></td></tr>
        <tr class="r2"><td class="side">الضمة</td><td id="td4"></td><td id="td5"></td><td id="td6"></td></tr>
        <tr class="r3"><td class="side">الكسرة</td><td id="td7"></td><td id="td8"></td><td id="td9"></td></tr>
        <tr class="r4"><td class="side">مد الألف</td><td id="td10"></td><td id="td11"></td><td id="td12"></td></tr>
        <tr class="r5"><td class="side">مد الواو</td><td id="td13"></td><td id="td14"></td><td id="td15"></td></tr>
        <tr class="r6"><td class="side">مد الياء</td><td id="td16"></td><td id="td17"></td><td id="td18"></td></tr>
    </table>
</div>

<script>
// ضع بيانات Firebase الخاصة بك هنا
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const allChars = "أبتثجحخدذرزمسشصضطظعغفقكلمنهـوي";

// كلمات افتراضية لكي لا يظهر الجدول فارغاً أبداً
const defaultWords = ["صَبَرَ","رَصَدَ","صَدَرَ","نَصَرَ","بَصَلُ","بَصَرُ","نُصِرَ","نُصِبَ","صَادَ","صَامَ","صُوصُ","صَالَ","صَبْرُ","مِصْرُ","نَصْرُ","رَصَدُ","رَصِيدُ","مُصَابُ"];

window.onload = function() {
    const sel = document.getElementById('charSelector');
    for (let c of allChars) {
        let opt = document.createElement('option');
        opt.value = c; opt.text = c;
        if(c === "ص") opt.selected = true;
        sel.add(opt);
    }
    fetchData();
};

function fetchData() {
    const char = document.getElementById('charSelector').value;
    const status = document.getElementById('status');
    status.innerText = "⏳ جاري البحث عن كلمات حرف (" + char + ")...";
    
    database.ref('nawaf_educational_data/' + char).once('value').then((snapshot) => {
        // إذا المسار فارغ في Firebase، استخدم الكلمات الافتراضية
        const words = snapshot.val() || defaultWords;
        
        for (let i = 1; i <= 18; i++) {
            const cell = document.getElementById('td' + i);
            cell.innerHTML = `<div contenteditable="true" class="editable" oninput="applyColor(this)">${words[i-1] || ''}</div>`;
            applyColor(cell.firstChild);
        }
        status.innerText = snapshot.val() ? "✅ تم التحميل من السحابة" : "⚠️ تم استخدام الكلمات الافتراضية (لم يتم الحفظ بعد)";
    });
}

function uploadData() {
    const char = document.getElementById('charSelector').value;
    const words = [];
    for (let i = 1; i <= 18; i++) {
        words.push(document.getElementById('td' + i).innerText);
    }
    
    document.getElementById('status').innerText = "📤 جاري الحفظ...";
    database.ref('nawaf_educational_data/' + char).set(words).then(() => {
        document.getElementById('status').innerText = "🚀 تم الحفظ بنجاح!";
        alert("تم الحفظ في السحابة!");
    });
}

function applyColor(el) {
    let content = el.innerText;
    const activeChar = document.getElementById('charSelector').value;
    let pattern = (activeChar === "أ") ? "[أإآا]" : (activeChar === "هـ") ? "[هـه]" : activeChar;
    const regex = new RegExp(`(${pattern}[\u064B-\u0652]?)`, 'g');
    
    // تلوين بدون فقدان التركيز
    el.innerHTML = content.replace(regex, `<span class="hl">$1</span>`);
    
    // تثبيت المؤشر في النهاية
    const range = document.createRange();
    const sel = window.getSelection();
    range.selectNodeContents(el);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
}
</script>
</body>
</html>
