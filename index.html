<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشاط القراءة - عبدالعزيز</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@900&display=swap');
        
        body { font-family: 'Cairo', sans-serif; background: #f0f0f0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .no-print { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 700px; }
        
        select, button { font-family: 'Cairo'; padding: 10px; font-size: 1rem; border-radius: 5px; border: 2px solid #d32f2f; margin: 5px; cursor: pointer; }
        button { background: #d32f2f; color: white; border: none; }

        .paper { 
            background: white; width: 210mm; min-height: 280mm; padding: 10mm; 
            border: 2px solid #000; box-sizing: border-box; display: flex; flex-direction: column;
        }

        .title-box { border: 2px solid #000; padding: 10px; text-align: center; margin-bottom: 15px; font-size: 2.3rem; font-weight: 900; }

        .main-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #000; }
        .main-table td { border: 2px solid #000; height: 110px; text-align: center; vertical-align: middle; position: relative; }

        /* الكلمة باللون الأحمر بالكامل لضمان التلاحم والحركات واضحة */
        .word-text { 
            font-family: 'Amiri', serif; 
            font-size: 4.5rem; 
            font-weight: 700; 
            color: #d32f2f; 
            direction: rtl; 
            white-space: nowrap;
            letter-spacing: 0;
            display: inline-block;
        }

        .edit-btn { position: absolute; top: 2px; right: 2px; cursor: pointer; opacity: 0.2; font-size: 0.8rem; }
        .edit-btn:hover { opacity: 1; }

        /* عمود اليمين */
        .level-cell { 
            width: 60px; font-size: 1.2rem; font-weight: 900; background: #f9f9f9;
            text-align: center; vertical-align: middle; border: 2px solid #000;
        }
        .vertical-text { writing-mode: vertical-rl; transform: rotate(180deg); display: inline-block; white-space: nowrap; }

        /* الألوان الستة المتفق عليها */
        .bg-1 { background-color: #fffde7; } .bg-2 { background-color: #e3f2fd; }
        .bg-3 { background-color: #fbe9e7; } .bg-4 { background-color: #f1f8e9; }
        .bg-5 { background-color: #f3e5f5; } .bg-6 { background-color: #e0f2f1; }

        .footer { text-align: center; margin-top: auto; padding: 15px; color: #d32f2f; font-weight: 900; font-size: 1.6rem; }

        @media print {
            .no-print, .edit-btn { display: none !important; }
            body { background: white; padding: 0; }
            .paper { border: 2px solid #000; width: 100%; margin: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <strong>لوحة التحكم - الأقسام الستة</strong><br>
    <select id="letterPicker" onchange="render()"></select>
    <button onclick="window.print()">🖨️ طباعة النشاط</button>
</div>

<div class="paper">
    <div class="title-box">نشاط قرائي (( حرف / <span id="charH">أ</span> ))</div>
    <table class="main-table" id="table"></table>
    <div class="footer">نقرأ كثيراً حتى نقرأ سريعاً بإذن الله</div>
</div>

<script>
    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    // الأقسام الستة المطلوبة
    const levels = [
        { t: "بالفتحة", c: "bg-1" }, { t: "بالضمة", c: "bg-2" },
        { t: "بالكسرة", c: "bg-3" }, { t: "بالمد بالألف", c: "bg-4" },
        { t: "بالمد بالواو", c: "bg-5" }, { t: "بالمد بالياء", c: "bg-6" }
    ];

    let customWords = {};

    function getDefaultWords(h) {
        // كلمات ثلاثية بسيطة جداً لكل حرف
        return {
            "بالفتحة": [`${h}َـرَدَ`, `دَرَ${h}َ`, `رَ${h}َـدَ`],
            "بالضمة": [`${h}ُـصِرَ`, `بُـ${h}ِـرَ`, `نُـ${h}ِـبَ`],
            "بالكسرة": [`${h}ِـرَام`, `بِـ${h}ِـر`, `لِـ${h}َـام`],
            "بالمد بالألف": [`${h}َـادَ`, `صَـ${h}ـا`, `بَـ${h}ـا`],
            "بالمد بالواو": [`${h}ُـور`, `سُـ${h}ـور`, `نُـ${h}ـور`],
            "بالمد بالياء": [`رَ${h}ِـيد`, `فِـ${h}ـيل`, `تِـ${h}ـين`]
        };
    }

    const sel = document.getElementById('letterPicker');
    alphabet.split('').forEach(l => {
        let o = document.createElement('option'); o.value = l; o.text = "حرف " + l;
        sel.appendChild(o);
    });

    function editWord(lvlT, idx) {
        const char = sel.value;
        const currentWords = customWords[lvlT] || getDefaultWords(char)[lvlT];
        const newWord = prompt("أدخل كلمة ثلاثية بسيطة:", currentWords[idx]);
        if (newWord) {
            if (!customWords[lvlT]) customWords[lvlT] = [...currentWords];
            customWords[lvlT][idx] = newWord;
            render();
        }
    }

    function render() {
        const h = sel.value;
        document.getElementById('charH').innerText = h;
        const table = document.getElementById('table');
        table.innerHTML = "";
        const defaultData = getDefaultWords(h);

        levels.forEach(lvl => {
            const row = document.createElement('tr');
            
            // عمود اليمين (اسم القسم)
            const lTd = document.createElement('td');
            lTd.className = `level-cell ${lvl.c}`;
            lTd.innerHTML = `<span class="vertical-text">${lvl.t}</span>`;
            row.appendChild(lTd);

            // الكلمات الثلاث
            const words = customWords[lvl.t] || defaultData[lvl.t];
            words.forEach((word, idx) => {
                const td = document.createElement('td');
                td.innerHTML = `
                    <span class="edit-btn no-print" onclick="editWord('${lvl.t}', ${idx})">✏️</span>
                    <div class="word-text">${word}</div>
                `;
                row.appendChild(td);
            });

            table.appendChild(row);
        });
    }
    render();
</script>
</body>
</html>
