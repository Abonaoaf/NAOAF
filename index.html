<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشاط القراءة المبسط - عبدالعزيز</title>
    <style>
        /* استخدام خطوط النظام الأساسية لضمان البساطة والوضوح التام */
        body { 
            font-family: "Traditional Arabic", "Sakkal Majalla", "Microsoft Sans Serif", sans-serif; 
            background: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .no-print { 
            background: #f9f9f9; 
            padding: 15px; 
            border: 1px solid #ccc; 
            margin-bottom: 20px; 
            text-align: center; 
            width: 90%; 
            max-width: 600px; 
        }

        .paper { 
            width: 210mm; 
            min-height: 280mm; 
            padding: 15mm; 
            border: 1px solid #000; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column;
        }

        .title-box { 
            border: 2px solid #000; 
            padding: 10px; 
            text-align: center; 
            margin-bottom: 20px; 
            font-size: 2rem; 
            font-weight: bold; 
        }

        .main-table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; 
        }

        .main-table td { 
            border: 1px solid #000; 
            height: 100px; 
            text-align: center; 
            vertical-align: middle; 
            font-size: 4rem; /* حجم كبير جداً للطفل */
            font-weight: bold;
            color: #000;
        }

        /* تلوين الحركات فقط بالأحمر */
        .haraka { color: #ff0000; font-weight: bold; }

        .level-cell { 
            width: 70px; 
            font-size: 1.1rem; 
            background: #fafafa; 
            font-weight: bold;
        }

        .vertical-text { 
            writing-mode: vertical-rl; 
            transform: rotate(180deg); 
            display: inline-block; 
            white-space: nowrap; 
        }

        .footer { 
            text-align: center; 
            margin-top: auto; 
            padding-top: 20px; 
            color: #ff0000; 
            font-weight: bold; 
            font-size: 1.5rem; 
        }

        @media print {
            .no-print { display: none; }
            body { padding: 0; }
            .paper { border: none; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <strong>اختيار الحرف للنشاط:</strong>
    <select id="letterPicker" onchange="render()"></select>
    <button onclick="window.print()" style="padding: 10px; cursor: pointer;">طباعة الورقة</button>
</div>

<div class="paper">
    <div class="title-box">نشاط قرائي (( حرف / <span id="charH">ب</span> ))</div>
    <table class="main-table" id="table"></table>
    <div class="footer">نقرأ كثيراً حتى نقرأ سريعاً بإذن الله</div>
</div>

<script>
    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    const levels = [
        { t: "بالفتحة", c: "#ffffff" }, { t: "بالضمة", c: "#ffffff" },
        { t: "بالكسرة", c: "#ffffff" }, { t: "بالمد بالألف", c: "#ffffff" },
        { t: "بالمد بالواو", c: "#ffffff" }, { t: "بالمد بالياء", c: "#ffffff" }
    ];

    // كلمات ثلاثية سهلة جداً (أفعال بسيطة)
    const easyWords = {
        'أ': ["أَكَلَ", "أَخَذَ", "أَمَرَ"],
        'ب': ["بَرَأَ", "بَحَثَ", "بَلَغَ"],
        'ت': ["تَرَكَ", "تَلَا", "تَابَ"],
        'ك': ["كَتَبَ", "كَسَرَ", "كَسَبَ"],
        'س': ["سَجَدَ", "سَمِعَ", "سَأَلَ"],
        'ق': ["قَرَأَ", "قَسَمَ", "قَطَعَ"],
        'د': ["دَخَلَ", "دَرَسَ", "دَفَعَ"]
        // يمكن إضافة باقي الحروف بنفس النمط البسيط
    };

    function colorize(word) {
        return word.replace(/([ًٌٍَُِّْ])/g, '<span class="haraka">$1</span>');
    }

    const sel = document.getElementById('letterPicker');
    alphabet.split('').forEach(l => {
        let o = document.createElement('option'); o.value = l; o.text = "حرف " + l;
        sel.appendChild(o);
    });

    function render() {
        const h = sel.value;
        document.getElementById('charH').innerText = h;
        const table = document.getElementById('table');
        table.innerHTML = "";

        // توليد كلمات ثلاثية تلقائية بسيطة إذا لم تكن موجودة في القائمة أعلاه
        const getRowWords = (type) => {
            if (easyWords[h] && type === "بالفتحة") return easyWords[h];
            
            // نماذج عامة للقياس (ثلاثية بسيطة)
            if (type === "بالفتحة") return [`${h}َـرَجَ`, `دَرَ${h}َ`, `رَ${h}َـدَ`].slice(0,3);
            if (type === "بالضمة") return [`${h}ُـكِمَ`, `رُ${h}ِـمَ`, `خُـ${h}ِـفَ`].slice(0,3);
            if (type === "بالكسرة") return [`${h}ِـرَمَ`, `بِـ${h}ِـرَ`, `لِـ${h}ِـسَ`].slice(0,3);
            if (type === "بالمد بالألف") return [`${h}َـادَ`, `بَـ${h}ـا`, `سَـ${h}ـا`].slice(0,3);
            if (type === "بالمد بالواو") return [`${h}ُـور`, `دُ${h}ُـور`, `فُـ${h}ـول`].slice(0,3);
            if (type === "بالمد بالياء") return [`${h}ِـيد`, `تِـ${h}ـين`, `فِـ${h}ـيل`].slice(0,3);
        };

        levels.forEach(lvl => {
            const row = document.createElement('tr');
            
            // عمود القسم
            const lTd = document.createElement('td');
            lTd.className = "level-cell";
            lTd.innerHTML = `<span class="vertical-text">${lvl.t}</span>`;
            row.appendChild(lTd);

            // الكلمات الثلاث
            const words = getRowWords(lvl.t);
            words.forEach(word => {
                const td = document.createElement('td');
                td.innerHTML = colorize(word);
                row.appendChild(td);
            });

            table.appendChild(row);
        });
    }
    render();
</script>
</body>
</html>
