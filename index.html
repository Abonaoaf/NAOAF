<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشاط القراءة - عبدالعزيز</title>
    <style>
        /* خط النسخ البسيط والواضح */
        @import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');
        
        body { font-family: 'Amiri', serif; background: #eee; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .no-print { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; width: 100%; max-width: 600px; border: 1px solid #ccc; }
        
        select, button { padding: 10px; font-size: 1rem; border-radius: 5px; margin: 5px; cursor: pointer; font-family: sans-serif; }

        .paper { 
            background: white; width: 210mm; min-height: 280mm; padding: 15mm; 
            border: 2px solid #000; box-sizing: border-box; display: flex; flex-direction: column;
        }

        .title-box { border: 2px solid #000; padding: 10px; text-align: center; margin-bottom: 20px; font-size: 2.2rem; font-weight: bold; }

        .main-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .main-table td { border: 2px solid #000; height: 100px; text-align: center; vertical-align: middle; position: relative; font-size: 4.5rem; font-weight: bold; color: #000; }

        /* تلوين الحركات فقط باللون الأحمر */
        .h { color: #d32f2f; }

        /* عمود اليمين بالألوان */
        .level-cell { width: 60px; font-size: 1.2rem; font-weight: bold; text-align: center; vertical-align: middle; color: #333; }
        .vertical-text { writing-mode: vertical-rl; transform: rotate(180deg); display: inline-block; white-space: nowrap; }

        /* الألوان الجانبية الستة */
        .bg-1 { background-color: #fff9c4; } .bg-2 { background-color: #e3f2fd; }
        .bg-3 { background-color: #fce4ec; } .bg-4 { background-color: #f1f8e9; }
        .bg-5 { background-color: #ede7f6; } .bg-6 { background-color: #e0f2f1; }

        .footer { text-align: center; margin-top: auto; padding-top: 20px; color: #d32f2f; font-weight: bold; font-size: 1.5rem; }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .paper { border: 2px solid #000; width: 100%; margin: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <strong>اختر الحرف لإنشاء النشاط:</strong>
    <select id="letterPicker" onchange="render()"></select>
    <button onclick="window.print()">🖨️ طباعة</button>
</div>

<div class="paper">
    <div class="title-box">نشاط قرائي (( حرف / <span id="charH">ب</span> ))</div>
    <table class="main-table" id="table"></table>
    <div class="footer">نقرأ كثيراً حتى نقرأ سريعاً بإذن الله</div>
</div>

<script>
    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    const levels = [
        { t: "بالفتحة", c: "bg-1" }, { t: "بالضمة", c: "bg-2" },
        { t: "بالكسرة", c: "bg-3" }, { t: "بالمد بالألف", c: "bg-4" },
        { t: "بالمد بالواو", c: "bg-5" }, { t: "بالمد بالياء", c: "bg-6" }
    ];

    // دالة لتلوين الحركات فقط بالأحمر
    function colorize(word) {
        return word.replace(/([ًٌٍَُِّْ])/g, '<span class="h">$1</span>');
    }

    // كلمات ثلاثية سهلة جداً تناسب طفل 6 سنوات
    function getWords(h) {
        return {
            "بالفتحة": [`${h}َـبَـرَ`, `سَـ${h}َـدَ`, `كَـتَـ${h}َ`],
            "بالضمة": [`${h}ُـكِـمَ`, `رُ${h}ِـمَ`, `كُـتُـ${h}ُ`],
            "بالكسرة": [`${h}ِـرَام`, `بِـ${h}ِـر`, `لِـ${h}ِـي`],
            "بالمد بالألف": [`${h}َـادَ`, `بَـ${h}ـا`, `سَـ${h}ـا`],
            "بالمد بالواو": [`${h}ُـور`, `دُ${h}ُـور`, `تُـ${h}ـوت`],
            "بالمد بالياء": [`رَ${h}ِـيد`, `تِـ${h}ـين`, `فِـ${h}ـيل`]
        };
    }

    const sel = document.getElementById('letterPicker');
    alphabet.split('').forEach(l => {
        let o = document.createElement('option'); o.value = l; o.text = "حرف " + l;
        sel.appendChild(o);
    });

    function render() {
        const h = sel.value;
        document.getElementById('charH').innerText = h;
        const table = document.getElementById('table');
        table.innerHTML = "";
        const data = getWords(h);

        levels.forEach(lvl => {
            const row = document.createElement('tr');
            
            // عمود اليمين الملون
            const lTd = document.createElement('td');
            lTd.className = `level-cell ${lvl.c}`;
            lTd.innerHTML = `<span class="vertical-text">${lvl.t}</span>`;
            row.appendChild(lTd);

            // الكلمات الثلاث
            data[lvl.t].forEach(word => {
                const td = document.createElement('td');
                td.innerHTML = colorize(word);
                row.appendChild(td);
            });

            table.appendChild(row);
        });
    }
    render();
</script>
</body>
</html>
