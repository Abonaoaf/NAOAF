<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة نواف - الإصدار الثابت والمضمون</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main-red: #FF0000; --dark-blue: #1A2A3A; }
        body { font-family: 'Arial', sans-serif; background: #F4F4F9; padding: 10px; text-align: center; }
        .container { background: white; max-width: 950px; margin: auto; border: 5px solid var(--dark-blue); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .header { background: var(--main-red); color: white; padding: 15px; font-size: 28px; font-weight: bold; }
        
        /* شريط الحركات الكبير */
        .harakat-bar { background: #FFF; padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 3px solid #DDD; flex-wrap: wrap; }
        .h-btn { 
            background: #FFF; border: 3px solid var(--main-red); border-radius: 12px; 
            width: 60px; height: 60px; font-size: 40px; font-weight: bold; color: var(--main-red);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .h-btn:active { background: #ffebeb; transform: scale(0.9); }

        .controls { padding: 15px; background: #EEE; display: flex; justify-content: center; gap: 15px; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 2px solid #CCC; height: 100px; position: relative; background: white; vertical-align: middle; }
        
        /* المربعات الأساسية للكتابة */
        .word-box {
            width: 90%; height: 80%; margin: auto; border: 1px solid #eee; outline: none;
            text-align: center; font-size: 50px; font-weight: bold;
            display: block; line-height: 80px; overflow: hidden; white-space: nowrap;
        }

        .hl { color: var(--main-red) !important; } /* تلوين الحرف المختار وحركته */
        .side { background: var(--dark-blue); color: white; font-size: 18px; width: 120px; font-weight: bold; }
        .btn-save { background: #27AE60; color: white; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مدرسة نـواف - الإصدار النهائي المعتمد 🚀</div>

    <div class="controls">
        <label style="font-weight: bold;">اختر الحرف للتلوين:</label>
        <select id="mainChar" onchange="loadFromCloud()" style="font-size: 20px; padding: 5px;">
            <option value="أ">أ</option><option value="ب">ب</option><option value="ت">ت</option>
            <option value="ث">ث</option><option value="ج">ج</option><option value="ح">ح</option>
            <option value="خ">خ</option><option value="د">د</option><option value="ذ">ذ</option>
            <option value="ر">ر</option><option value="ز">ز</option><option value="س">س</option>
            <option value="ش">ش</option><option value="ص" selected>ص</option><option value="ض">ض</option>
            <option value="ط">ط</option><option value="ظ">ظ</option><option value="ع">ع</option>
            <option value="غ">غ</option><option value="ف">ف</option><option value="ق">ق</option>
            <option value="ك">ك</option><option value="ل">ل</option><option value="م">م</option>
            <option value="ن">ن</option><option value="هـ">هـ</option><option value="و">و</option>
            <option value="ي">ي</option>
        </select>
        <button class="btn-save" onclick="saveToCloud()">حفظ السحابة 💾</button>
    </div>

    <div class="harakat-bar">
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('َ')"> َ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ُ')"> ُ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ِ')"> ِ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ْ')"> ْ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ّ')"> ّ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ً')"> ً </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ٌ')"> ٌ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ٍ')"> ٍ </button>
    </div>

    <table>
        <tr><td class="side">الفتحة</td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td></tr>
        <tr><td class="side">الضمة</td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td></tr>
        <tr><td class="side">الكسرة</td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td></tr>
        <tr><td class="side">مد الألف</td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td></tr>
        <tr><td class="side">مد الواو</td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td></tr>
        <tr><td class="side">مد الياء</td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td><td><div contenteditable="true" class="word-box" onfocus="currentInput=this" oninput="colorize(this)"></div></td></tr>
    </table>
</div>

<script>
    const firebaseConfig = { apiKey: "...", authDomain: "...", databaseURL: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
    try { firebase.initializeApp(firebaseConfig); } catch(e){}
    const database = firebase.database();

    let currentInput = null;

    function addHarakah(h) {
        if (!currentInput) return;
        
        let sel = window.getSelection();
        if (sel.rangeCount > 0) {
            let range = sel.getRangeAt(0);
            
            // إضافة الحركة
            let node = document.createTextNode(h);
            range.insertNode(node);
            
            // نقل المؤشر بعد الحركة مباشرة
            range.setStartAfter(node);
            sel.removeAllRanges();
            sel.addRange(range);
        }
        colorize(currentInput);
    }

    function colorize(el) {
        let char = document.getElementById('mainChar').value;
        let text = el.innerText;
        
        let p = (char === "أ") ? "[أإآا]" : (char === "هـ") ? "[هـه]" : char;
        // يلون الحرف + الشدة (إن وجدت) + الحركة (إن وجدت)
        let regex = new RegExp(`(${p}[\u0651]?[\u064B-\u0652]?)`, 'g');
        
        let coloredHTML = text.replace(regex, `<span class="hl">$1</span>`);
        
        // حفظ مكان المؤشر لكي لا يقفز للبداية
        let sel = window.getSelection();
        let offset = sel.anchorOffset;
        
        el.innerHTML = coloredHTML;
        
        // إعادة وضع المؤشر في النهاية
        let range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
    }

    function saveToCloud() {
        const char = document.getElementById('mainChar').value;
        const words = Array.from(document.querySelectorAll('.word-box')).map(i => i.innerText);
        database.ref('nawaf_educational_data/' + char).set(words).then(() => alert("تم حفظ الكلمات بنجاح ✅"));
    }

    function loadFromCloud() {
        const char = document.getElementById('mainChar').value;
        database.ref('nawaf_educational_data/' + char).once('value').then(snap => {
            const words = snap.val() || Array(18).fill("");
            const boxes = document.querySelectorAll('.word-box');
            boxes.forEach((box, index) => {
                box.innerText = words[index] || "";
                colorize(box);
            });
        });
    }

    window.onload = loadFromCloud;
</script>
</body>
</html>
