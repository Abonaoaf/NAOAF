<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة نواف التعليمية - الإصدار المستقر</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main-red: #e63946; --dark-blue: #2c3e50; }
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { background: white; max-width: 1000px; margin: auto; border: 4px solid var(--dark-blue); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { background: var(--main-red); color: white; padding: 15px; font-size: 30px; font-weight: bold; text-align: center; }
        .status-bar { background: #34495e; color: #fff; padding: 5px; font-size: 14px; text-align: center; }
        .controls { padding: 15px; background: #eee; text-align: center; border-bottom: 2px solid #ddd; }
        select { font-size: 24px; padding: 5px 25px; border-radius: 10px; border: 3px solid var(--main-red); font-weight: bold; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 10px 30px; font-size: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 1px solid #ccc; height: 110px; font-size: 70px; font-weight: bold; text-align: center; vertical-align: middle; }
        .hl { color: var(--main-red); display: inline; }
        .side { width: 120px; font-size: 18px; background: var(--dark-blue); color: white; }
        
        /* جعل المربعات قابلة للتعديل بوضوح */
        .editable { 
            outline: none; 
            width: 100%; 
            height: 100%; 
            line-height: 110px; 
            cursor: text;
            min-height: 110px;
        }
        .editable:focus { background-color: #fff9f9; border: 2px inset var(--main-red); }

        .r1 { background: #fff5f5; } .r2 { background: #fffaf0; } .r3 { background: #f0fff4; }
        .r4 { background: #ebf8ff; } .r5 { background: #faf5ff; } .r6 { background: #fff5f7; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مدرسة نواف - التلوين الذكي المطور 🖌️</div>
    <div id="status" class="status-bar">جاري تشغيل النظام...</div>
    <div class="controls">
        <label style="font-size: 18px; font-weight: bold;">اختر الحرف: </label>
        <select id="charSelector" onchange="loadData()">
            </select>
        <button class="btn-save" onclick="saveData()">حفظ التعديلات في السحابة 💾</button>
    </div>

    <table>
        <tr class="r1"><td class="side">الفتحة</td><td id="td1"></td><td id="td2"></td><td id="td3"></td></tr>
        <tr class="r2"><td class="side">الضمة</td><td id="td4"></td><td id="td5"></td><td id="td6"></td></tr>
        <tr class="r3"><td class="side">الكسرة</td><td id="td7"></td><td id="td8"></td><td id="td9"></td></tr>
        <tr class="r4"><td class="side">مد الألف</td><td id="td10"></td><td id="td11"></td><td id="td12"></td></tr>
        <tr class="r5"><td class="side">مد الواو</td><td id="td13"></td><td id="td14"></td><td id="td15"></td></tr>
        <tr class="r6"><td class="side">مد الياء</td><td id="td16"></td><td id="td17"></td><td id="td18"></td></tr>
    </table>
</div>

<script>
// --- بيانات Firebase (يجب استبدالها ببياناتك) ---
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
};

// تشغيل Firebase بأمان
let database;
try {
    firebase.initializeApp(firebaseConfig);
    database = firebase.database();
} catch (e) { console.log("Firebase error"); }

// الكلمات الصحيحة والمراجعة
const masterDB = {
    "أ": ["أَكَلَ","أَمَرَ","أَخَذَ","أُكِلَ","أُمِرَ","أُخِذَ","إِبِلِ","إِذَنِ","إِرَمِ","آدَمُ","آيَةُ","آكَـلَ","أُوبُ","أُودُ","أُورُ","إِيمَ","إِيادُ","إِيهِ"],
    "ب": ["بَرَأَ","بَحَثَ","بَلَغَ","بُعِثَ","بُهِتَ","بُورِكَ","بِحارُ","بِقاعُ","بِلادُ","بَارَ","بَاعَ","بَانَ","بُومُ","بُورُ","بُوحُ","بِيرُ","بِيعَ","نَبِيلُ"],
    "ل": ["لَبَنَ","لَحِقَ","لَمَسَ","لُجَّ","لُقِيَ","لُبِثَ","لِبَاسُ","لِسَانُ","لِحَاظُ","لادَ","لامَ","لابَ","لُوطُ","لُومُ","قُلُوبُ","لِيـنُ","حَلِيمُ","وَلِيدُ"],
    "ص": ["صَبَرَ","صَدَقَ","صَلَحَ","صُبِرَ","صُدِقَ","صُورَ","صِغَارُ","صِعَابُ","صِرَاطُ","صَادَ","صَامَ","صَارَ","صُوصُ","صُورُ","نَصُومُ","صِيدَ","رَصِيدُ","عَصِيرُ"],
    "م": ["مَسَحَ","مَنَعَ","مَلَكَ","مُسِحَ","مُنِعَ","مُلِكَ","مِدادُ","مِثالُ","مِقْدارُ","مَاتَ","مَالَ","مَانَ","مُورُ","مُومُ","نُمورُ","مِيلُ","سَمِيعُ","أَمِيرُ"],
    "هـ": ["هَدَمَ","هَرَبَ","هَزَمَ","هُدِمَ","هُرِبَ","هُزِمَ","هِلالُ","هِشامُ","هِباتُ","هَامَ","هَانَ","هَادَ","هُودُ","زُهورُ","كُهوفُ","هِيـمَ","فَهيمُ","شَهيدُ"]
};

const allChars = "أبتثجحخدذرزمسشصضطظعغفقكلمنهـوي";

window.onload = function() {
    const sel = document.getElementById('charSelector');
    for (let c of allChars) {
        let opt = document.createElement('option');
        opt.value = c; opt.text = c;
        if(c === "ص") opt.selected = true;
        sel.add(opt);
    }
    loadData();
};

function loadData() {
    const char = document.getElementById('charSelector').value;
    const status = document.getElementById('status');
    status.innerText = "⏳ جاري التحميل...";

    // محاولة الجلب من السحابة أولاً
    if(database) {
        database.ref('nawaf_educational_data/' + char).once('value').then(snap => {
            let words = snap.val() || masterDB[char] || Array(18).fill(char + "...");
            renderTable(words);
            status.innerText = snap.exists() ? "✅ تم التحميل من السحابة" : "🤖 عرض الكلمات الافتراضية";
        }).catch(e => {
            renderTable(masterDB[char] || Array(18).fill(char + "..."));
        });
    } else {
        renderTable(masterDB[char] || Array(18).fill(char + "..."));
    }
}

function renderTable(words) {
    for (let i = 1; i <= 18; i++) {
        const td = document.getElementById('td' + i);
        // نضع الكلمة داخل div قابل للتعديل
        td.innerHTML = `<div contenteditable="true" class="editable" onblur="applyColorAfter(this)">${words[i-1]}</div>`;
        applyColorAfter(td.firstChild);
    }
}

// دالة التلوين (تعمل بعد الانتهاء من الكتابة أو عند الخروج من المربع لضمان عدم تعليق الكود)
function applyColorAfter(el) {
    let text = el.innerText;
    const char = document.getElementById('charSelector').value;
    let p = (char === "أ") ? "[أإآا]" : (char === "هـ") ? "[هـه]" : char;
    
    const regex = new RegExp(`(${p}[\u064B-\u0652]?)`, 'g');
    el.innerHTML = text.replace(regex, `<span class="hl">$1</span>`);
}

function saveData() {
    const char = document.getElementById('charSelector').value;
    const words = [];
    for (let i = 1; i <= 18; i++) {
        words.push(document.getElementById('td' + i).innerText);
    }
    
    if(database) {
        database.ref('nawaf_educational_data/' + char).set(words).then(() => {
            alert("تم حفظ التعديلات بنجاح! ✅");
        });
    } else {
        alert("خطأ: لم يتم ربط Firebase بشكل صحيح.");
    }
}
</script>
</body>
</html>
