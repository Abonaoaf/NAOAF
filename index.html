<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة نواف الفيفي الذكية</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            user-select: none;
        }

        .main-title { font-size: 32px; color: #ffce00; margin-top: 15px; }
        .sub-title { font-size: 18px; color: #4caf50; margin-bottom: 10px; }

        /* منطقة السبورة - الحل الجديد */
        .board {
            width: 95%;
            max-width: 900px;
            background: white;
            border: 12px solid #5d4037;
            border-radius: 25px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        #displayArea {
            font-size: 150px;
            font-weight: bold;
            text-align: center;
            color: #333;
            direction: rtl;
            white-space: nowrap;
            letter-spacing: -5px; /* لضمان التلاحم */
        }

        /* لوحة التحكم */
        .keyboard-zone {
            background: #2c3e50;
            padding: 20px;
            border-radius: 25px;
            width: 95%;
            max-width: 950px;
        }

        .pens-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .pen {
            width: 70px; height: 70px;
            border-radius: 50%; cursor: pointer;
            border: 5px solid #fff; transition: 0.2s;
        }

        .pen.active { transform: scale(1.2); border-color: #ffce00; box-shadow: 0 0 20px rgba(255,206,0,0.6); }

        /* شبكة الحروف والحركات */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; }
        
        .btn {
            font-size: 38px; height: 85px; cursor: pointer; border: none;
            border-radius: 15px; background: white; color: black;
            font-weight: bold; display: flex; align-items: center; justify-content: center;
        }

        /* تلوين الحركات حسب الفئة */
        .btn-green { background: #4caf50; color: white; } /* فتحة ضمة كسرة */
        .btn-purple { background: #9c27b0; color: white; } /* شدة سكون */
        .btn-blue { background: #2196f3; color: white; } /* تنوين */

        .action-btns { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-action { font-size: 22px; padding: 20px; border-radius: 15px; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-space { background: #555; }
        .btn-delete { background: #c0392b; }
        .btn-clear { background: #7f8c8d; }
    </style>
</head>
<body>

    <div class="main-title">نواف الفيفي - سبورتي الذكية</div>
    <div class="sub-title">لكل أصدقائي 🌟</div>

    <div class="board">
        <div id="displayArea"></div>
    </div>

    <div class="keyboard-zone">
        <div class="pens-container">
            <div class="pen active" style="background: red;" onclick="setPen('red', this)"></div>
            <div class="pen" style="background: blue;" onclick="setPen('blue', this)"></div>
            <div class="pen" style="background: green;" onclick="setPen('green', this)"></div>
            <div class="pen" style="background: black;" onclick="setPen('black', this)"></div>
        </div>

        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 20px;">
            <button class="btn btn-green" onclick="addChar('َ')">َ</button>
            <button class="btn btn-green" onclick="addChar('ُ')">ُ</button>
            <button class="btn btn-green" onclick="addChar('ِ')">ِ</button>
            <button class="btn btn-purple" onclick="addChar('ْ')">ْ</button>
            <button class="btn btn-purple" onclick="addChar('ّ')">ّ</button>
            <button class="btn btn-blue" onclick="addChar('ً')">ً</button>
            <button class="btn btn-blue" onclick="addChar('ٌ')">ٌ</button>
            <button class="btn btn-blue" onclick="addChar('ٍ')">ٍ</button>
        </div>

        <div id="lettersGrid" class="grid"></div>

        <div class="action-btns">
            <button class="btn-action btn-space" onclick="addChar(' ')">مسافة</button>
            <button class="btn-action btn-delete" onclick="deleteLast()">مسح ⌫</button>
            <button class="btn-action btn-clear" onclick="clearAll()">جديد 🗑️</button>
        </div>
    </div>

    <script>
        const letters = "أإآبتثجحخدذرزسشصضطظعغفقكلمنهويةوي";
        let wordData = []; 
        let activeColor = 'red';

        function setPen(color, el) {
            activeColor = color;
            document.querySelectorAll('.pen').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
        }

        const grid = document.getElementById('lettersGrid');
        letters.split('').forEach(l => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = l;
            b.onclick = () => addChar(l);
            grid.appendChild(b);
        });

        function addChar(c) {
            wordData.push({ char: c, color: activeColor });
            render();
        }

        function deleteLast() { wordData.pop(); render(); }
        function clearAll() { wordData = []; render(); }

        function render() {
            const area = document.getElementById('displayArea');
            area.innerHTML = "";
            if (wordData.length === 0) { area.innerText = "اكتب.."; return; }

            // السر في الاتصال: نستخدم ميزة نادرة تسمى mix-blend-mode أو تجميع النصوص
            // هنا سنستخدم span واحد لكل حرف مع الحفاظ على صفرية المسافة
            wordData.forEach(item => {
                const s = document.createElement('span');
                s.innerText = item.char;
                s.style.color = item.color;
                // إجبار الحرف على عدم حجز مساحة جانبية تفصله عن جاره
                s.style.display = "inline-block";
                s.style.width = "auto";
                area.appendChild(s);
            });
        }
    </script>
</body>
</html>
