<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة نواف الذكية</title>
    <style>
        :root { --main-text-color: black; }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            user-select: none;
        }

        .settings-bar {
            background: #34495e;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 95%;
            max-width: 900px;
            justify-content: center;
            flex-wrap: wrap;
        }

        select { font-size: 20px; padding: 5px 15px; border-radius: 8px; cursor: pointer; }

        .board {
            width: 95%;
            max-width: 900px;
            background: white;
            border: 12px solid #5d4037;
            border-radius: 25px;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        #displayArea {
            font-size: 150px;
            font-weight: bold;
            direction: rtl;
            color: var(--main-text-color);
            display: block;
            white-space: nowrap;
        }

        .target-char { color: #ff0000; display: inline; }

        .keyboard-zone {
            background: #2c3e50;
            padding: 20px;
            border-radius: 25px;
            width: 95%;
            max-width: 950px;
        }

        .pens-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .pen { width: 60px; height: 60px; border-radius: 50%; cursor: pointer; border: 4px solid #fff; }
        .pen.active { border-color: #ffce00; transform: scale(1.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 10px; }
        .btn {
            font-size: 35px; height: 80px; cursor: pointer; border: none;
            border-radius: 12px; background: white; color: black;
            font-weight: bold; display: flex; align-items: center; justify-content: center;
        }

        .btn-green { background: #4caf50; color: white; }
        .btn-purple { background: #9c27b0; color: white; }
        .btn-blue { background: #2196f3; color: white; }

        .action-btns { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-action { font-size: 20px; padding: 15px; border-radius: 12px; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-space { background: #555; }
        .btn-delete { background: #c0392b; }
        .btn-clear { background: #7f8c8d; }
    </style>
</head>
<body>

    <div class="main-title" style="margin-top:10px;">نواف الفيفي - سبورتي الذكية</div>
    
    <div class="settings-bar">
        <span>حرف الدرس:</span>
        <select id="targetSelect" onchange="updateDisplay()">
            <option value="">بدون</option>
        </select>
        <span style="margin-right: 15px;">لون القلم:</span>
        <div class="pens-container" style="margin-bottom: 0;">
            <div class="pen active" style="background: black;" onclick="changeWriteColor('black', this)"></div>
            <div class="pen" style="background: green;" onclick="changeWriteColor('green', this)"></div>
            <div class="pen" style="background: blue;" onclick="changeWriteColor('blue', this)"></div>
        </div>
    </div>

    <div class="board">
        <div id="displayArea">ابدأ..</div>
    </div>

    <div class="keyboard-zone">
        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 20px;">
            <button class="btn btn-green" onclick="addHarka('َ')">َ</button>
            <button class="btn btn-green" onclick="addHarka('ُ')">ُ</button>
            <button class="btn btn-green" onclick="addHarka('ِ')">ِ</button>
            <button class="btn btn-purple" onclick="addHarka('ْ')">ْ</button>
            <button class="btn btn-purple" onclick="addHarka('ّ')">ّ</button>
            <button class="btn btn-blue" onclick="addHarka('ً')">ً</button>
            <button class="btn btn-blue" onclick="addHarka('ٌ')">ٌ</button>
            <button class="btn btn-blue" onclick="addHarka('ٍ')">ٍ</button>
        </div>

        <div id="lettersGrid" class="grid"></div>

        <div class="action-btns">
            <button class="btn-action btn-space" onclick="addChar(' ')">مسافة</button>
            <button class="btn-action btn-delete" onclick="deleteLast()">مسح ⌫</button>
            <button class="btn-action btn-clear" onclick="clearAll()">جديد 🗑️</button>
        </div>
    </div>

    <script>
        const letters = "اأإآبتثجحخدذرزسشصضطظعغفقكلمنهويةوي";
        const harkat = "ًٌٍَُِّْ";
        let currentText = "";
        
        const targetSelect = document.getElementById('targetSelect');
        const displayArea = document.getElementById('displayArea');

        // بناء اللوحة
        letters.split('').forEach(l => {
            const opt = document.createElement('option');
            opt.value = l; opt.innerText = l;
            targetSelect.appendChild(opt);

            const b = document.createElement('button');
            b.className = 'btn'; b.innerText = l;
            b.onclick = () => addChar(l);
            document.getElementById('lettersGrid').appendChild(b);
        });

        function addChar(c) {
            currentText += c;
            updateDisplay();
        }

        // منطق ذكي للحركات: استبدال الحركة السابقة بحركة جديدة
        function addHarka(h) {
            if (currentText.length === 0) return;
            
            let last = currentText.slice(-1);
            // إذا كان آخر شيء مدخلاً هو "حركة"، نقوم بمسحها أولاً قبل إضافة الجديدة
            if (harkat.includes(last)) {
                currentText = currentText.slice(0, -1);
            }
            
            currentText += h;
            updateDisplay();
        }

        function deleteLast() {
            currentText = currentText.slice(0, -1);
            updateDisplay();
        }

        function clearAll() {
            currentText = "";
            updateDisplay();
        }

        function changeWriteColor(color, el) {
            document.documentElement.style.setProperty('--main-text-color', color);
            document.querySelectorAll('.pen').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            updateDisplay();
        }

        function updateDisplay() {
            if (!currentText) {
                displayArea.innerText = "ابدأ..";
                return;
            }

            const target = targetSelect.value;
            if (!target) {
                displayArea.innerHTML = currentText;
                return;
            }

            // تلوين حرف الدرس باللون الأحمر مع حركته
            const regex = new RegExp(`(${target}[\u064B-\u0652]?)`, 'g');
            const formatted = currentText.replace(regex, `<span class="target-char">$1</span>`);
            displayArea.innerHTML = formatted;
        }
    </script>
</body>
</html>
