<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشاط القراءة الاحترافي</title>
    <style>
        /* استيراد خطوط عربية كلاسيكية عريضة */
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@900&family=Tajawal:wght@800&display=swap');
        
        body { font-family: 'Tajawal', sans-serif; background: #f0f0f0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .no-print { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 700px; }
        
        select, button { font-family: 'Tajawal'; padding: 10px; font-size: 1rem; border-radius: 5px; border: 2px solid #27ae60; margin: 5px; cursor: pointer; font-weight: bold; }
        button { background: #27ae60; color: white; border: none; }

        .paper { 
            background: white; width: 210mm; min-height: 285mm; padding: 10mm; 
            border: 2px solid #000; box-sizing: border-box; display: flex; flex-direction: column;
        }

        .title-box { border: 2px solid #000; padding: 10px; text-align: center; margin-bottom: 15px; font-size: 2.5rem; font-weight: 900; }

        .main-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #000; }
        .main-table td { border: 2px solid #000; height: 110px; text-align: center; vertical-align: middle; position: relative; }

        /* سر الحل: منع المسافات تماماً باستخدام flex وتصفير التباعد */
        .word-container { 
            font-family: 'Amiri', serif; 
            font-size: 4.2rem; 
            font-weight: 700; 
            direction: rtl; 
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 0;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }
        
        /* تلوين الحرف مع الحفاظ على الاتصال */
        .highlight { color: #d32f2f; display: inline; }

        .edit-btn { 
            position: absolute; top: 2px; right: 2px; font-size: 0.8rem; 
            cursor: pointer; opacity: 0.2; padding: 5px; filter: grayscale(1);
        }
        .edit-btn:hover { opacity: 1; filter: none; }

        /* عمود اليمين */
        .level-cell { 
            width: 50px; font-size: 1.2rem; font-weight: 900; background: #f9f9f9;
            text-align: center; vertical-align: middle; border: 2px solid #000;
        }
        .vertical-text { writing-mode: vertical-rl; transform: rotate(180deg); display: inline-block; white-space: nowrap; }

        /* ألوان الخلفيات مثل الصورة */
        .bg-1 { background-color: #fffde7; } .bg-2 { background-color: #e3f2fd; }
        .bg-3 { background-color: #fbe9e7; } .bg-4 { background-color: #f1f8e9; }
        .bg-5 { background-color: #f3e5f5; } .bg-6 { background-color: #e0f2f1; }

        .footer { text-align: center; margin-top: auto; padding: 10px; color: #d32f2f; font-weight: 900; font-size: 1.6rem; border-top: 1px solid #eee; }

        @media print {
            .no-print, .edit-btn { display: none !important; }
            body { background: white; padding: 0; }
            .paper { border: 2px solid #000; width: 100%; margin: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <strong>لوحة التحكم الذكية</strong><br>
    <select id="letterPicker" onchange="resetAndRender()"></select>
    <button onclick="window.print()">🖨️ طباعة النشاط</button>
</div>

<div class="paper">
    <div class="title-box">نشاط قرائي (( حرف / <span id="charH">ب</span> ))</div>
    <table class="main-table" id="table"></table>
    <div class="footer">نقرأ كثيراً حتى نقرأ سريعاً بإذن الله</div>
</div>

<script>
    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    const levels = [
        { t: "المستوى الأول", c: "bg-1" }, { t: "المستوى الثاني", c: "bg-2" },
        { t: "المستوى الثالث", c: "bg-3" }, { t: "المستوى الرابع", c: "bg-4" },
        { t: "المستوى الخامس", c: "bg-5" }, { t: "المستوى السادس", c: "bg-6" }
    ];

    let customWords = {};

    function getDefaultWords(h) {
        // كلمات تحاكي الصورة الأولى تماماً
        return {
            "المستوى الأول": [`صَ${h}َـرَ`, `رَ${h}َـدَ`, `نَـصَـ${h}َ`],
            "المستوى الثاني": [`${h}َـصَـلُ`, `بَـ${h}َـرُ`, `نُـ${h}ِـبَ`],
            "المستوى الثالث": [`صَـ${h}ـادَ`, `صَـ${h}ـامَ`, `صُـوص`],
            "المستوى الرابع": [`صَـ${h}ـرُ`, `مِـ${h}ـرُ`, `رَصْـد`],
            "المستوى الخامس": [`رَصِـيد`, `نَـصِـيب`, `نَصُـوم`],
            "المستوى السادس": [`مُـصَـاب`, `مِـصْحَف`, `تَخْصِيص`]
        };
    }

    const sel = document.getElementById('letterPicker');
    alphabet.split('').forEach(l => {
        let o = document.createElement('option'); o.value = l; o.text = "حرف " + l;
        sel.appendChild(o);
    });

    function resetAndRender() { customWords = {}; render(); }

    function editWord(lvlT, idx) {
        const char = sel.value;
        const currentWords = customWords[lvlT] || getDefaultWords(char)[lvlT];
        const newWord = prompt("تعديل الكلمة:", currentWords[idx]);
        if (newWord) {
            if (!customWords[lvlT]) customWords[lvlT] = [...currentWords];
            customWords[lvlT][idx] = newWord;
            render();
        }
    }

    function render() {
        const h = sel.value;
        document.getElementById('charH').innerText = h;
        const table = document.getElementById('table');
        table.innerHTML = "";
        const defaultData = getDefaultWords(h);

        levels.forEach(lvl => {
            const row = document.createElement('tr');
            
            // عمود اليمين (المستوى)
            const lTd = document.createElement('td');
            lTd.className = `level-cell ${lvl.c}`;
            lTd.innerHTML = `<span class="vertical-text">${lvl.t}</span>`;
            row.appendChild(lTd);

            // الكلمات الثلاث
            const words = customWords[lvl.t] || defaultData[lvl.t];
            words.forEach((word, idx) => {
                const td = document.createElement('td');
                // تلوين الحرف مع منع التفكك
                const highlighted = word.split(h).join(`<span class="highlight">${h}</span>`);
                td.innerHTML = `
                    <span class="edit-btn no-print" onclick="editWord('${lvl.t}', ${idx})">✏️</span>
                    <div class="word-container">${highlighted}</div>
                `;
                row.appendChild(td);
            });

            table.appendChild(row);
        });
    }
    render();
</script>
</body>
</html>
