<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرسة الحروف - شقلبة وتلوين</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background-color: #ff0000;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .toolbar {
            padding: 20px;
            background: #fafafa;
            border-bottom: 2px solid #eee;
            text-align: center;
        }

        select {
            padding: 10px;
            font-size: 18px;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            width: 120px;
        }

        td {
            border: 1px solid #eee;
            padding: 15px;
        }

        .inputs-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .word-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .editable-cell {
            min-height: 40px;
            padding: 8px;
            font-size: 24px;
            border: 2px solid #ddd;
            border-radius: 5px;
            outline: none;
            text-align: center;
        }

        .flipped-text {
            font-size: 18px;
            color: #7f8c8d;
            background: #f9f9f9;
            border-radius: 4px;
            padding: 2px;
            min-height: 25px;
            text-align: center;
            border: 1px solid #eee;
        }

        .red-char {
            color: #ff0000 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">🏫 مدرسة الحروف - التلوين والشقلبة</div>
    
    <div class="toolbar">
        <label>اختر الحرف:</label>
        <select id="mainChar" onchange="refreshAll()">
            </select>
    </div>

    <table>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const chars = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    const categories = ["الفتحة", "الضمة", "الكسرة", "مد الألف", "مد الواو", "مد الياء"];
    const select = document.getElementById('mainChar');
    const tableBody = document.getElementById('tableBody');

    // تعبئة قائمة الحروف
    chars.split('').forEach(c => {
        let opt = document.createElement('option');
        opt.value = c;
        opt.innerText = c;
        select.appendChild(opt);
    });

    // بناء الجدول
    categories.forEach(cat => {
        let row = `<tr><th>${cat}</th><td><div class="inputs-group">`;
        for(let i=0; i<3; i++) {
            row += `
                <div class="word-box">
                    <div class="editable-cell" contenteditable="true" oninput="processWord(this)"></div>
                    <div class="flipped-text" title="الكلمة متشقلبة"></div>
                </div>`;
        }
        row += `</div></td></tr>`;
        tableBody.innerHTML += row;
    });

    function processWord(element) {
        const targetChar = document.getElementById('mainChar').value;
        const flippedBox = element.nextElementSibling;
        let text = element.innerText;

        // 1. شقلبة الحروف (عكس النص)
        // نستخدم Array.from للتعامل الصحيح مع الحروف العربية والحركات
        flippedBox.innerText = Array.from(text).reverse().join('');

        // 2. تلوين الحرف المختار
        const regex = new RegExp(`(${targetChar}[\u064B-\u0652\u0670]?)`, 'g');
        const newHTML = text.replace(regex, `<span class="red-char">$1</span>`);

        // تحديث المحتوى بدون فقدان التركيز (Focus)
        if (element.innerHTML !== newHTML) {
            const selection = window.getSelection();
            const range = selection.getRangeAt(0);
            const offset = range.startOffset;

            element.innerHTML = newHTML;

            // إعادة تعيين مكان المؤشر
            const newRange = document.createRange();
            if (element.lastChild) {
                newRange.setStart(element.lastChild, element.innerText.length);
                newRange.collapse(true);
                selection.removeAllRanges();
                selection.addRange(newRange);
            }
        }
    }

    function refreshAll() {
        document.querySelectorAll('.editable-cell').forEach(cell => processWord(cell));
    }
</script>

</body>
</html>
