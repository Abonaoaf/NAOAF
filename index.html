<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة البطل نواف</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ffce00;
            text-shadow: 2px 2px #000;
        }

        /* حاوية الحروف الكبيرة */
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 900px;
            background: #333;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .char-btn {
            font-size: 30px;
            padding: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: white;
            color: black;
            transition: 0.2s;
        }

        .char-btn.active {
            background: #ff0000;
            color: white;
            transform: scale(1.1);
        }

        /* أزرار الحركات الضخمة */
        .harakat-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .haraka-btn {
            font-size: 50px; /* حجم كبير جداً */
            width: 80px;
            height: 80px;
            cursor: pointer;
            border: 4px solid #4caf50;
            background: #fff;
            border-radius: 50%;
            color: #2e7d32;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* السبورة */
        .board {
            width: 100%;
            max-width: 850px;
            background: white;
            border: 15px solid #5d4037;
            border-radius: 20px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        #wordInput {
            width: 90%;
            font-size: 40px;
            text-align: center;
            margin-top: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 10px;
        }

        #displayArea {
            font-size: 150px; /* حجم الكلمة المعروضة */
            margin: 20px 0;
            font-weight: bold;
            min-height: 180px;
        }

        .highlight {
            color: #ff0000;
        }

        .settings {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">🏆 سبورة البطل نواف الذكية</div>

    <div class="alphabet-grid" id="alphabetGrid"></div>

    <div class="harakat-container">
        <button class="haraka-btn" onclick="addHaraka('َ')">َ</button>
        <button class="haraka-btn" onclick="addHaraka('ُ')">ُ</button>
        <button class="haraka-btn" onclick="addHaraka('ِ')">ِ</button>
        <button class="haraka-btn" onclick="addHaraka('ْ')">ْ</button>
        <button class="haraka-btn" onclick="addHaraka('ّ')">ّ</button>
    </div>

    <div class="board">
        <input type="text" id="wordInput" placeholder="اكتب الكلمة هنا يا بطل..." oninput="draw()">
        <div id="displayArea"></div>
    </div>

    <script>
        const chars = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
        let selectedChar = 'ب'; // افتراضي

        // إنشاء أزرار الحروف
        const grid = document.getElementById('alphabetGrid');
        chars.split('').forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'char-btn';
            if(c === selectedChar) btn.classList.add('active');
            btn.innerText = c;
            btn.onclick = () => {
                document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedChar = c;
                draw();
            };
            grid.appendChild(btn);
        });

        function addHaraka(h) {
            const input = document.getElementById('wordInput');
            input.value += h;
            draw();
            input.focus();
        }

        function draw() {
            const input = document.getElementById('wordInput').value;
            const display = document.getElementById('displayArea');
            
            // تلوين الحرف المختار مع أي حركة تتبعه
            const regex = new RegExp(`(${selectedChar}[\u064B-\u0652\u0670]?)`, 'g');
            const result = input.replace(regex, `<span class="highlight">$1</span>`);
            
            display.innerHTML = result || "...";
        }

        // تشغيل أولي
        draw();
    </script>
</body>
</html>
