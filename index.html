<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة نواف الملونة</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            user-select: none;
        }

        .main-title { font-size: 30px; color: #ffce00; margin: 10px 0; }
        .sub-title { font-size: 18px; color: #4caf50; margin-bottom: 10px; }

        /* منطقة السبورة */
        .board {
            width: 95%;
            max-width: 900px;
            background: white;
            border: 12px solid #5d4037;
            border-radius: 25px;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        #displayArea {
            font-size: 140px;
            font-weight: bold;
            display: flex;
            direction: rtl;
            color: #333;
        }

        /* لوحة التحكم */
        .keyboard-zone {
            background: #2c3e50;
            padding: 15px;
            border-radius: 25px;
            width: 95%;
            max-width: 900px;
        }

        /* اختيار الأقلام */
        .pens-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            background: #34495e;
            padding: 10px;
            border-radius: 15px;
        }

        .pen {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid #fff;
            transition: 0.2s;
        }

        .pen.active {
            transform: scale(1.2);
            border-color: #ffce00;
            box-shadow: 0 0 15px rgba(255,206,0,0.5);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; }
        
        .btn {
            font-size: 30px; height: 70px; cursor: pointer; border: none;
            border-radius: 12px; background: white; color: black;
            font-weight: bold; display: flex; align-items: center; justify-content: center;
        }

        /* الحركات أصبحت تأخذ لون القلم أيضاً */
        .btn-harkat { background: #eee; font-size: 40px; }

        .action-btns { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-action { font-size: 20px; padding: 15px; border-radius: 12px; color: white; border: none; cursor: pointer; }
        .btn-space { background: #555; }
        .btn-delete { background: #c0392b; }
        .btn-clear { background: #7f8c8d; }

        /* لضمان اتصال الحروف */
        .char-span { display: inline-block; }
    </style>
</head>
<body>

    <div class="main-title">نواف الفيفي - سبورتي الذكية</div>
    <div class="sub-title">اختر لون القلم ثم اكتب الحرف يا بطل 🌟</div>

    <div class="board">
        <div id="displayArea"></div>
    </div>

    <div class="keyboard-zone">
        <div class="pens-container">
            <div class="pen active" style="background: red;" onclick="setPen('red', this)"></div>
            <div class="pen" style="background: blue;" onclick="setPen('blue', this)"></div>
            <div class="pen" style="background: green;" onclick="setPen('green', this)"></div>
            <div class="pen" style="background: black;" onclick="setPen('black', this)"></div>
        </div>

        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 15px;">
            <button class="btn btn-harkat" onclick="addChar('َ')">َ</button>
            <button class="btn btn-harkat" onclick="addChar('ُ')">ُ</button>
            <button class="btn btn-harkat" onclick="addChar('ِ')">ِ</button>
            <button class="btn btn-harkat" onclick="addChar('ْ')">ْ</button>
            <button class="btn btn-harkat" onclick="addChar('ّ')">ّ</button>
            <button class="btn btn-harkat" onclick="addChar('ً')">ً</button>
            <button class="btn btn-harkat" onclick="addChar('ٌ')">ٌ</button>
            <button class="btn btn-harkat" onclick="addChar('ٍ')">ٍ</button>
        </div>

        <div class="grid" id="writeGrid"></div>

        <div class="action-btns">
            <button class="btn-action btn-space" onclick="addChar(' ')">مسافة</button>
            <button class="btn-action btn-delete" onclick="deleteLast()">مسح</button>
            <button class="btn-action btn-clear" onclick="clearAll()">جديد</button>
        </div>
    </div>

    <script>
        const allChars = "أإآبتثجحخدذرزسشصضطظعغفقكلمنهويةوي";
        let activeColor = 'red';
        let wordData = []; // تخزين الحرف ولونه لضمان الاتصال

        function setPen(color, element) {
            activeColor = color;
            document.querySelectorAll('.pen').forEach(p => p.classList.remove('active'));
            element.classList.add('active');
        }

        const writeGrid = document.getElementById('writeGrid');
        const displayArea = document.getElementById('displayArea');

        allChars.split('').forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = c;
            btn.onclick = () => addChar(c);
            writeGrid.appendChild(btn);
        });

        function addChar(c) {
            wordData.push({ char: c, color: activeColor });
            render();
        }

        function deleteLast() {
            wordData.pop();
            render();
        }

        function clearAll() {
            wordData = [];
            render();
        }

        function render() {
            displayArea.innerHTML = "";
            if (wordData.length === 0) {
                displayArea.innerText = "اكتب..";
                return;
            }

            wordData.forEach(item => {
                const span = document.createElement('span');
                span.innerText = item.char;
                span.style.color = item.color;
                // الحيلة لضمان الاتصال: عدم ترك أي مسافة بين الـ spans
                displayArea.appendChild(span);
            });
        }
    </script>
</body>
</html>
