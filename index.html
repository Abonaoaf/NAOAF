<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة نواف - الإصدار النهائي المستقر</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main-red: #FF0000; --dark-blue: #1A2A3A; }
        body { font-family: 'Arial', sans-serif; background: #F4F4F9; padding: 10px; text-align: center; }
        .container { background: white; max-width: 950px; margin: auto; border: 5px solid var(--dark-blue); border-radius: 20px; overflow: hidden; }
        .header { background: var(--main-red); color: white; padding: 15px; font-size: 28px; font-weight: bold; }
        
        .harakat-bar { background: #FFF; padding: 15px; display: flex; justify-content: center; gap: 8px; border-bottom: 3px solid #DDD; }
        .h-btn { 
            background: #FFF; border: 3px solid var(--main-red); border-radius: 12px; 
            width: 60px; height: 60px; font-size: 40px; font-weight: bold; color: var(--main-red);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .controls { padding: 15px; background: #EEE; display: flex; justify-content: center; gap: 15px; align-items: center; }
        select { font-size: 20px; padding: 5px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; }
        td { border: 2px solid #CCC; height: 100px; position: relative; width: 28%; background: white; }
        
        .word-input {
            width: 100%; height: 100%; border: none; outline: none;
            text-align: center; font-size: 55px; font-weight: bold;
            background: transparent; position: relative; z-index: 2;
        }
        
        .word-display {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; font-size: 55px; font-weight: bold; 
            line-height: 100px; color: transparent;
        }

        .hl { color: var(--main-red) !important; }
        .side { background: var(--dark-blue); color: white; font-size: 20px; width: 130px; font-weight: bold; }
        .btn-save { background: #27AE60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مدرسة نـواف - لوحة القراءة الذكية 🚀</div>

    <div class="controls">
        <label>الحرف:</label>
        <select id="mainChar" onchange="loadFromCloud()">
            <option value="أ">أ</option><option value="ب">ب</option><option value="ت">ت</option>
            <option value="ث">ث</option><option value="ج">ج</option><option value="ح">ح</option>
            <option value="خ">خ</option><option value="د">د</option><option value="ذ">ذ</option>
            <option value="ر">ر</option><option value="ز">ز</option><option value="س">س</option>
            <option value="ش">ش</option><option value="ص" selected>ص</option><option value="ض">ض</option>
            <option value="ط">ط</option><option value="ظ">ظ</option><option value="ع">ع</option>
            <option value="غ">غ</option><option value="ف">ف</option><option value="ق">ق</option>
            <option value="ك">ك</option><option value="ل">ل</option><option value="م">م</option>
            <option value="ن">ن</option><option value="هـ">هـ</option><option value="و">و</option>
            <option value="ي">ي</option>
        </select>
        <button class="btn-save" onclick="saveToCloud()">حفظ في السحابة 💾</button>
    </div>

    <div class="harakat-bar">
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('َ')"> َ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ُ')"> ُ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ِ')"> ِ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ْ')"> ْ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ّ')"> ّ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ً')"> ً </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ٌ')"> ٌ </button>
        <button class="h-btn" onmousedown="event.preventDefault(); addHarakah('ٍ')"> ٍ </button>
    </div>

    <table>
        <tr><td class="side">الفتحة</td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td></tr>
        <tr><td class="side">الضمة</td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td></tr>
        <tr><td class="side">الكسرة</td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td></tr>
        <tr><td class="side">مد الألف</td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td></tr>
        <tr><td class="side">مد الواو</td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td></tr>
        <tr><td class="side">مد الياء</td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td><td><input type="text" class="word-input" onfocus="lastFocusedInput=this" oninput="showDisplay(this)"><div class="word-display"></div></td></tr>
    </table>
</div>

<script>
    const firebaseConfig = { apiKey: "...", authDomain: "...", databaseURL: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
    try { firebase.initializeApp(firebaseConfig); } catch(e){}
    const database = firebase.database();

    let lastFocusedInput = null;

    function addHarakah(h) {
        if (!lastFocusedInput) return;
        let val = lastFocusedInput.value;
        let pos = lastFocusedInput.selectionStart;

        // مسح الحركة القديمة لو وجدت قبل إضافة الجديدة
        if (/[\u064B-\u0652]/.test(val.charAt(pos - 1))) {
            val = val.slice(0, pos - 1) + val.slice(pos);
            pos--;
        }

        lastFocusedInput.value = val.slice(0, pos) + h + val.slice(pos);
        lastFocusedInput.focus();
        lastFocusedInput.setSelectionRange(pos + 1, pos + 1);
        showDisplay(lastFocusedInput);
    }

    function showDisplay(input) {
        const display = input.nextElementSibling;
        const char = document.getElementById('mainChar').value;
        const text = input.value;
        
        if (!text.trim()) { input.style.color = "black"; display.innerHTML = ""; return; }

        let p = (char === "أ") ? "[أإآا]" : (char === "هـ") ? "[هـه]" : char;
        const regex = new RegExp(`(${p}[\u0651]?[\u064B-\u0652]?)`, 'g');

        display.innerHTML = text.replace(regex, `<span class="hl">$1</span>`);
        input.style.color = "transparent";
        input.style.caretColor = "black";
        display.style.color = "black";
    }

    function saveToCloud() {
        const char = document.getElementById('mainChar').value;
        const words = Array.from(document.querySelectorAll('.word-input')).map(i => i.value);
        database.ref('nawaf_educational_data/' + char).set(words).then(() => alert("تم الحفظ بنجاح ✅"));
    }

    function loadFromCloud() {
        const char = document.getElementById('mainChar').value;
        database.ref('nawaf_educational_data/' + char).once('value').then(snap => {
            const words = snap.val() || Array(18).fill("");
            const inputs = document.querySelectorAll('.word-input');
            inputs.forEach((input, index) => {
                input.value = words[index] || "";
                showDisplay(input);
            });
        });
    }

    window.onload = loadFromCloud;
</script>
</body>
</html>
