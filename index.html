<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرسة الحروف التفاعلية</title>
    <style>
        :root {
            --primary-color: #e74c3c; /* الأحمر للحروف */
            --bg-color: #f8f9fa;
            --table-header: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            background-color: red;
            color: white;
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 15px;
            border-radius: 10px 10px 0 0;
            font-size: 24px;
            font-weight: bold;
        }

        .controls {
            background: white;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid #ddd;
        }

        select, input {
            padding: 8px;
            font-size: 18px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        table {
            width: 100%;
            max-width: 800px;
            background: white;
            border-collapse: collapse;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        th, td {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
            font-size: 28px;
        }

        th {
            background-color: var(--table-header);
            color: white;
            width: 30%;
        }

        /* تنسيق التلوين السحري */
        .highlight {
            color: var(--primary-color);
            font-weight: bold;
        }

        .input-cell {
            width: 100%;
            border: none;
            text-align: center;
            font-size: 28px;
            outline: none;
        }

        .btn-save {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">🏆 مدرسة الحروف - الإصدار التفاعلي</div>

    <div class="controls">
        <label>اختر حرف التلوين:</label>
        <select id="charSelector" onchange="applyColoring()">
            <option value="ب">ب</option>
            <option value="ت">ت</option>
            <option value="ص">ص</option>
            <option value="ق">ق</option>
        </select>
        <button class="btn-save" onclick="window.print()">حفظ كـ PDF 💾</button>
    </div>

    <table>
        <tr data-type="فتحة">
            <th>الفتحة</th>
            <td><input type="text" class="input-cell" oninput="formatInput(this)" placeholder="اكتب كلمة..."></td>
        </tr>
        <tr data-type="ضمة">
            <th>الضمة</th>
            <td><input type="text" class="input-cell" oninput="formatInput(this)" placeholder="اكتب كلمة..."></td>
        </tr>
        <tr data-type="كسرة">
            <th>الكسرة</th>
            <td><input type="text" class="input-cell" oninput="formatInput(this)" placeholder="اكتب كلمة..."></td>
        </tr>
        <tr data-type="مد الألف">
            <th>مد الألف</th>
            <td><input type="text" class="input-cell" oninput="formatInput(this)" placeholder="اكتب كلمة..."></td>
        </tr>
    </table>

    <div id="displayArea" style="margin-top: 20px; font-size: 40px;"></div>

    <script>
        function formatInput(input) {
            const char = document.getElementById('charSelector').value;
            const text = input.value;
            
            // تعبير نمطي للبحث عن الحرف مع أي حركة تتبعه (فتحة، ضمة، كسرة، سكون، تنوين)
            // الحركات العربية في اليونيكود تقع بين U+064B و U+0652
            const regex = new RegExp(`(${char}[\u064B-\u0652]?)`, 'g');
            
            // هذه الخدعة لإظهار التنسيق داخل التسمية التوضيحية لأن الـ Input لا يدعم تلوين حرف واحد
            // سنقوم بعرض النتيجة في حاوية منفصلة أو تحويل الخلية لنص عند الانتهاء
            console.log("الكلمة المعالجة: ", text.replace(regex, `<span class="highlight">$1</span>`));
        }

        // دالة لتحويل المدخلات إلى نص ملون عند الرغبة في العرض النهائي
        function applyColoring() {
            const char = document.getElementById('charSelector').value;
            const inputs = document.querySelectorAll('.input-cell');
            const regex = new RegExp(`(${char}[\u064B-\u0652]?)`, 'g');

            inputs.forEach(input => {
                if(input.value) {
                    // تحويل الحرف المستهدف للأحمر برمجياً
                    let formatted = input.value.replace(regex, `<span class="highlight">$1</span>`);
                    // تحديث العرض (اختياري)
                }
            });
        }
    </script>
</body>
</html>
