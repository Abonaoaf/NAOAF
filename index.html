<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة نواف الذكية</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            user-select: none;
        }

        .main-title { font-size: 32px; color: #ffce00; margin: 15px 0 5px 0; }
        .sub-title { font-size: 18px; color: #4caf50; margin-bottom: 15px; }

        .board {
            width: 95%;
            max-width: 900px;
            background: white;
            border: 12px solid #5d4037;
            border-radius: 25px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        #displayArea {
            font-size: 160px;
            font-weight: bold;
            text-align: center;
            direction: rtl;
            color: red; 
            transition: color 0.3s;
        }

        .keyboard-zone {
            background: #2c3e50;
            padding: 20px;
            border-radius: 25px;
            width: 95%;
            max-width: 950px;
        }

        .pens-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .pen {
            width: 75px; height: 75px;
            border-radius: 50%; cursor: pointer;
            border: 5px solid #fff;
        }

        .pen.active { border-color: #ffce00; transform: scale(1.1); box-shadow: 0 0 15px white; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; }
        
        .btn {
            font-size: 40px; height: 90px; cursor: pointer; border: none;
            border-radius: 15px; background: white; color: black;
            font-weight: bold; display: flex; align-items: center; justify-content: center;
        }

        /* ألوان الحركات المطلوبة */
        .btn-green { background: #4caf50; color: white; } /* فتحة ضمة كسرة */
        .btn-purple { background: #9c27b0; color: white; } /* شدة سكون */
        .btn-blue { background: #2196f3; color: white; } /* تنوين */

        .action-btns { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-action { font-size: 22px; padding: 20px; border-radius: 15px; color: white; border: none; font-weight: bold; }
        .btn-space { background: #555; }
        .btn-delete { background: #c0392b; }
        .btn-clear { background: #7f8c8d; }
    </style>
</head>
<body>

    <div class="main-title">نواف الفيفي - سبورتي الذكية</div>
    <div class="sub-title">اختر لون القلم واكتب اسمك الجميل يا بطل 🌟</div>

    <div class="board">
        <div id="displayArea">نواف</div>
    </div>

    <div class="keyboard-zone">
        <div class="pens-container">
            <div class="pen active" style="background: red;" onclick="changeBoardColor('red', this)"></div>
            <div class="pen" style="background: blue;" onclick="changeBoardColor('blue', this)"></div>
            <div class="pen" style="background: green;" onclick="changeBoardColor('green', this)"></div>
            <div class="pen" style="background: black;" onclick="changeBoardColor('black', this)"></div>
        </div>

        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 20px;">
            <button class="btn btn-green" onclick="addChar('َ')">َ</button>
            <button class="btn btn-green" onclick="addChar('ُ')">ُ</button>
            <button class="btn btn-green" onclick="addChar('ِ')">ِ</button>
            <button class="btn btn-purple" onclick="addChar('ْ')">ْ</button>
            <button class="btn btn-purple" onclick="addChar('ّ')">ّ</button>
            <button class="btn btn-blue" onclick="addChar('ً')">ً</button>
            <button class="btn btn-blue" onclick="addChar('ٌ')">ٌ</button>
            <button class="btn btn-blue" onclick="addChar('ٍ')">ٍ</button>
        </div>

        <div id="lettersGrid" class="grid"></div>

        <div class="action-btns">
            <button class="btn-action btn-space" onclick="addChar(' ')">مسافة</button>
            <button class="btn-action btn-delete" onclick="deleteLast()">مسح ⌫</button>
            <button class="btn-action btn-clear" onclick="clearAll()">جديد 🗑️</button>
        </div>
    </div>

    <script>
        // أضفت حرف "ا" في بداية لوحة الحروف لسهولة استخدامه في المد
        const letters = "اأإآبتثجحخدذرزسشصضطظعغفقكلمنهويةوي";
        let currentText = "نواف";

        const grid = document.getElementById('lettersGrid');
        letters.split('').forEach(l => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = l;
            b.onclick = () => addChar(l);
            grid.appendChild(b);
        });

        function addChar(c) {
            if (document.getElementById('displayArea').innerText === "نواف" && currentText === "نواف") {
                currentText = "";
            }
            currentText += c;
            updateDisplay();
        }

        function deleteLast() {
            currentText = currentText.slice(0, -1);
            updateDisplay();
        }

        function clearAll() {
            currentText = "";
            updateDisplay();
        }

        function updateDisplay() {
            const area = document.getElementById('displayArea');
            area.innerText = currentText || "ابدأ";
        }

        function changeBoardColor(color, el) {
            document.getElementById('displayArea').style.color = color;
            document.querySelectorAll('.pen').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
