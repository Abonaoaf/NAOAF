<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرب القراءة الصغير</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f8ff; text-align: center; padding: 20px; }
        .container { background: white; max-width: 800px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        select { font-size: 1.2rem; padding: 10px; border-radius: 8px; border: 2px solid #007bff; margin-bottom: 20px; width: 200px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { border: 2px solid #e0e0e0; border-radius: 10px; padding: 10px; background: #fff; }
        .card h3 { color: #007bff; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .word-list { list-style: none; padding: 0; }
        .word-item { font-size: 1.8rem; margin: 10px 0; cursor: pointer; border-bottom: 1px dashed #ccc; padding: 5px; }
        .char { color: black; }
        .mark { color: red; font-weight: bold; }
        .instruction { font-size: 0.9rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>مرحباً بطل القراءة الصغير 🌟</h1>
    <p>اختر الحرف لتبدأ التدريب:</p>
    
    <select id="letterSelect" onchange="updateWords()">
        <option value="">-- اختر حرفاً --</option>
        <option value="ب">حرف الباء (ب)</option>
        <option value="ت">حرف التاء (ت)</option>
        <option value="ث">حرف الثاء (ث)</option>
        <option value="ج">حرف الجيم (ج)</option>
        </select>

    <div id="displayArea" class="grid-container" style="display:none;">
        </div>

    <p class="instruction">* يمكنك الضغط على أي كلمة لتعديلها يدوياً.</p>
</div>

<script>
    const types = [
        { title: "بالفتحة ◌َ", suffix: "َ", words: ["ـَـ", "ـَـ", "ـَـ"] },
        { title: "بالضمة ◌ُ", suffix: "ُ", words: ["ـُـ", "ـُـ", "ـُـ"] },
        { title: "بالكسرة ◌ِ", suffix: "ِ", words: ["ـِـ", "ـِـ", "ـِـ"] },
        { title: "مد بالألف ا", suffix: "ا", words: ["ـاـ", "ـاـ", "ـاـ"] },
        { title: "مد بالواو و", suffix: "و", words: ["ـوـ", "ـوـ", "ـوـ"] },
        { title: "مد بالياء ي", suffix: "ي", words: ["ـيـ", "ـيـ", "ـيـ"] }
    ];

    function updateWords() {
        const char = document.getElementById('letterSelect').value;
        const area = document.getElementById('displayArea');
        
        if (!char) { area.style.display = 'none'; return; }
        
        area.innerHTML = '';
        area.style.display = 'grid';

        types.forEach(type => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let wordsHTML = `<ul class="word-list">`;
            type.words.forEach(w => {
                // هنا نقوم بوضع الحرف المختار مع الحركة المطلوبة
                wordsHTML += `<li class="word-item" contenteditable="true">
                                <span class="char">${char}</span><span class="mark">${type.suffix}</span><span class="char">...</span>
                              </li>`;
            });
            wordsHTML += `</ul>`;

            card.innerHTML = `<h3>${type.title}</h3>${wordsHTML}`;
            area.appendChild(card);
        });
    }
</script>

</body>
</html>
