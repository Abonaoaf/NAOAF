<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سبورة نواف الذكية</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main-text-color: black; }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px;
            margin: 0;
            overflow-x: hidden;
        }

        .main-title { font-size: 28px; color: #ffce00; margin: 10px 0; }

        .settings-bar {
            background: #34495e;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            width: 95%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* تعديل منطقة السبورة لتكون عملاقة في كل المتصفحات */
        .board {
            width: 95vw; /* عرض كامل الشاشة */
            background: white;
            border: 10px solid #5d4037;
            border-radius: 25px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        #displayArea {
            font-size: 45vw; /* حجم الخط يعتمد على عرض الشاشة ليظل عملاقاً */
            font-weight: bold;
            direction: rtl;
            color: var(--main-text-color);
            white-space: nowrap;
            padding: 0 20px;
        }

        .target-char { color: #ff0000 !important; }

        .pens-container { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .pen { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; }
        .pen.active { transform: scale(1.1); border-color: #ffce00; }

        .keyboard-zone {
            background: #2c3e50;
            padding: 15px;
            border-radius: 20px;
            width: 95%;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; }
        .btn {
            font-size: 35px; height: 75px; cursor: pointer; border: none;
            border-radius: 12px; background: white; color: black;
            font-weight: bold; display: flex; align-items: center; justify-content: center;
        }

        .btn-green { background: #4caf50; color: white; }
        .btn-purple { background: #9c27b0; color: white; }
        .btn-blue { background: #2196f3; color: white; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-action { font-size: 16px; padding: 15px 5px; border-radius: 12px; color: white; border: none; font-weight: bold; }
        .btn-success { background: #f1c40f; color: #000; }
    </style>
</head>
<body>

    <div class="main-title">نواف الفيفي - سبورتي هدية لكل أصدقائي🎊</div>
    
    <div class="settings-bar">
        <div style="font-size: 20px;">حرف الدرس: 
            <select id="targetSelect" style="font-size: 20px;" onchange="updateDisplay()"><option value="">بدون</option></select>
        </div>
        <div class="pens-container">
            <div class="pen active" style="background: black;" onclick="changeWriteColor('black', this)"></div>
            <div class="pen" style="background: blue;" onclick="changeWriteColor('blue', this)"></div>
            <div class="pen" style="background: green;" onclick="changeWriteColor('green', this)"></div>
            <div class="pen" style="background: #e67e22;" onclick="changeWriteColor('#e67e22', this)"></div>
            <div class="pen" style="background: #9b59b6;" onclick="changeWriteColor('#9b59b6', this)"></div>
            <div class="pen" style="background: #e91e63;" onclick="changeWriteColor('#e91e63', this)"></div>
        </div>
    </div>

    <div class="board"><div id="displayArea">نواف</div></div>

    <div class="keyboard-zone">
        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 15px;">
            <button class="btn btn-green" onclick="addHarka('َ')">َ</button>
            <button class="btn btn-green" onclick="addHarka('ُ')">ُ</button>
            <button class="btn btn-green" onclick="addHarka('ِ')">ِ</button>
            <button class="btn btn-purple" onclick="addHarka('ْ')">ْ</button>
            <button class="btn btn-purple" onclick="addHarka('ّ')">ّ</button>
            <button class="btn btn-blue" onclick="addHarka('ً')">ً</button>
            <button class="btn btn-blue" onclick="addHarka('ٌ')">ٌ</button>
            <button class="btn btn-blue" onclick="addHarka('ٍ')">ٍ</button>
        </div>
        <div id="lettersGrid" class="grid"></div>
        <div class="action-btns">
            <button class="btn-action" style="background:#555" onclick="addChar(' ')">مسافة</button>
            <button class="btn-action" style="background:#c0392b" onclick="deleteLast()">مسح</button>
            <button class="btn-action" style="background:#7f8c8d" onclick="clearAll()">جديد</button>
            <button class="btn-action btn-success" onclick="celebrate()">أحسنت! 🎊</button>
        </div>
    </div>

    <script>
        const letters = "اأإآبتثجحخدذرزسشصضطظعغفقكلمنهويةىي";
        const harkat = "ًٌٍَُِّْ";
        let currentText = "نواف";
        const targetSelect = document.getElementById('targetSelect');
        const displayArea = document.getElementById('displayArea');

        letters.split('').forEach(l => {
            const opt = document.createElement('option'); opt.value = l; opt.innerText = l;
            targetSelect.appendChild(opt);
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = l;
            b.onclick = () => addChar(l);
            document.getElementById('lettersGrid').appendChild(b);
        });

        function addChar(c) { if (currentText === "نواف") currentText = ""; currentText += c; updateDisplay(); }
        function addHarka(h) { 
            if (!currentText) return;
            if (harkat.includes(currentText.slice(-1))) currentText = currentText.slice(0, -1);
            currentText += h; updateDisplay(); 
        }
        function deleteLast() { currentText = currentText.slice(0, -1); updateDisplay(); }
        function clearAll() { currentText = ""; updateDisplay(); }
        function changeWriteColor(color, el) {
            document.documentElement.style.setProperty('--main-text-color', color);
            document.querySelectorAll('.pen').forEach(p => p.classList.remove('active'));
            el.classList.add('active'); updateDisplay();
        }
        function updateDisplay() {
            if (!currentText) { displayArea.innerText = "اكتب.."; return; }
            const target = targetSelect.value;
            const regex = new RegExp(`(${target}[\u064B-\u0652]?)`, 'g');
            displayArea.innerHTML = target ? currentText.replace(regex, `<span class="target-char">$1</span>`) : currentText;
        }
        function celebrate() {
            if (!currentText) return;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
        updateDisplay();
    </script>
</body>
</html>
