<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة نواف الفيفي الذكية</title>
    <style>
        :root {
            --target-color: #ff0000;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            user-select: none;
        }

        .main-title {
            font-size: 32px;
            color: #ffce00;
            margin: 15px 0 5px 0;
            text-align: center;
        }

        .sub-title {
            font-size: 18px;
            color: #4caf50;
            margin-bottom: 10px;
        }

        /* السبورة - مركز التركيز */
        .board {
            width: 95%;
            max-width: 900px;
            background: white;
            border: 12px solid #5d4037;
            border-radius: 25px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #displayArea {
            font-size: 140px;
            font-weight: bold;
            text-align: center;
            min-height: 160px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* لوحة التحكم الواحدة */
        .keyboard-zone {
            background: #2c3e50;
            padding: 20px;
            border-radius: 25px;
            width: 95%;
            max-width: 900px;
            border: 2px solid #34495e;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 10px;
        }

        .btn {
            font-size: 32px;
            height: 75px;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: white;
            color: black;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px #ccc;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* تمييز الحركات بالألوان */
        .btn-harkat { background: #4caf50; color: white; font-size: 45px; } /* فتحة ضمة كسرة */
        .btn-special { background: #9c27b0; color: white; font-size: 45px; } /* سكون شدة */
        .btn-tanwin { background: #2196f3; color: white; font-size: 45px; } /* تنوينات */
        
        /* أيقونة اللون بجانب المسح */
        .color-btn { background: #fff; position: relative; font-size: 25px; }
        .color-btn input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-action { font-size: 20px; padding: 15px; border-radius: 12px; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-space { background: #555; grid-column: span 2; }
        .btn-delete { background: #c0392b; }
        .btn-clear { background: #7f8c8d; }

        .highlight { color: var(--target-color); }
        .section-label { text-align: center; font-size: 16px; color: #bdc3c7; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="main-title">نواف الفيفي - سبورتي الذكية</div>
    <div class="sub-title">لكل أصدقائي 🌟</div>

    <div class="board">
        <div id="displayArea">ابدأ الكتابة..</div>
    </div>

    <div class="keyboard-zone">
        
        <div class="section-label">الحركات والتنوين</div>
        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 20px;">
            <button class="btn btn-harkat" onclick="addChar('َ')">َ</button>
            <button class="btn btn-harkat" onclick="addChar('ُ')">ُ</button>
            <button class="btn btn-harkat" onclick="addChar('ِ')">ِ</button>
            <button class="btn btn-special" onclick="addChar('ْ')">ْ</button>
            <button class="btn btn-special" onclick="addChar('ّ')">ّ</button>
            <button class="btn btn-tanwin" onclick="addChar('ً')">ً</button>
            <button class="btn btn-tanwin" onclick="addChar('ٌ')">ٌ</button>
            <button class="btn btn-tanwin" onclick="addChar('ٍ')">ٍ</button>
        </div>

        <div class="section-label">لوحة الحروف</div>
        <div class="grid" id="writeGrid"></div>

        <div class="action-btns">
            <button class="btn-action btn-space" onclick="addChar(' ')">مسافة ⎵</button>
            <button class="btn-action btn-delete" onclick="deleteLast()">مسح ⌫</button>
            <button class="btn-action btn-clear" onclick="clearAll()">جديد 🗑️</button>
            <button class="btn color-btn">🎨<input type="color" oninput="changeColor(this.value)"></button>
        </div>
    </div>

    <script>
        const allChars = "أإآبتثجحخدذرزسشصضطظعغفقكلمنهويةوي";
        let currentWord = "";
        let lastChar = ""; // لتتبع آخر حرف كتبه نواف وتلوينه

        const writeGrid = document.getElementById('writeGrid');
        const displayArea = document.getElementById('displayArea');

        // بناء لوحة الحروف
        allChars.split('').forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = c;
            btn.onclick = () => {
                lastChar = c; // بمجرد الضغط، يصبح هذا هو الحرف المستهدف
                addChar(c);
            };
            writeGrid.appendChild(btn);
        });

        function addChar(c) {
            currentWord += c;
            updateDisplay();
        }

        function deleteLast() {
            currentWord = currentWord.slice(0, -1);
            // تحديث آخر حرف بعد المسح (اختياري)
            updateDisplay();
        }

        function clearAll() {
            currentWord = "";
            lastChar = "";
            updateDisplay();
        }

        function changeColor(val) {
            document.documentElement.style.setProperty('--target-color', val);
            updateDisplay();
        }

        function updateDisplay() {
            if (!currentWord) {
                displayArea.innerHTML = "اكتب يا بطل..";
                return;
            }

            // المنطق الجديد: تلوين أي حرف يطابق "آخر حرف" تم الضغط عليه
            // هذا يجعل نواف يرى الحرف الذي يتعلمه حالياً باللون الأحمر تلقائياً
            const regex = new RegExp(`(${lastChar}[\u064B-\u0652]?)`, 'g');
            const formatted = currentWord.replace(regex, `<span class="highlight">$1</span>`);
            displayArea.innerHTML = formatted;
        }

        // إعداد اللون الافتراضي
        changeColor("#ff0000");
    </script>
</body>
</html>
