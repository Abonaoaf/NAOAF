<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرب القراءة للبطل نواف</title>
    <style>
        :root {
            --primary-red: #e63946;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        select {
            font-size: 20px;
            padding: 10px 30px;
            border-radius: 10px;
            border: 2px solid var(--primary-red);
            cursor: pointer;
            font-weight: bold;
        }
        .main-card {
            width: 100%;
            max-width: 800px;
            background: white;
            border: 3px solid #333;
            border-radius: 12px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
            font-size: 35px;
            font-weight: bold;
        }
        .side-label {
            width: 100px;
            font-size: 18px;
            color: white;
            background-color: #444;
        }
        /* تمييز الحرف والحركة باللون الأحمر */
        .highlight {
            color: var(--primary-red);
        }
        .editable-word {
            outline: none;
            cursor: edit;
            display: inline-block;
            min-width: 50px;
        }
        .editable-word:focus {
            background-color: #ffffd0;
            border-bottom: 2px dashed var(--primary-red);
        }
        .hint {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="control-panel">
    <h3>اختر حرفاً ليتعلم نواف:</h3>
    <select id="charSelector" onchange="updateWords()">
        <option value="ص">حرف الصاد (ص)</option>
        <option value="ب">حرف الباء (ب)</option>
        <option value="ت">حرف التاء (ت)</option>
        <option value="ج">حرف الجيم (ج)</option>
        <option value="د">حرف الدال (د)</option>
        <option value="ر">حرف الراء (ر)</option>
        <option value="س">حرف السين (س)</option>
    </select>
    <p class="hint">يمكنك الضغط على أي كلمة وتغييرها مباشرة!</p>
</div>

<div class="main-card">
    <table>
        <tr style="background: #fff5f5;">
            <td class="side-label" style="background: #e53e3e;">بالفتحة</td>
            <td><span contenteditable="true" class="editable-word" id="f1">صَبَرَ</span></td>
            <td><span contenteditable="true" class="editable-word" id="f2">رَصَدَ</span></td>
            <td><span contenteditable="true" class="editable-word" id="f3">نَصَرَ</span></td>
        </tr>
        <tr style="background: #fffaf0;">
            <td class="side-label" style="background: #dd6b20;">بالضمة</td>
            <td><span contenteditable="true" class="editable-word" id="d1">صُورَ</span></td>
            <td><span contenteditable="true" class="editable-word" id="d2">نُصِرَ</span></td>
            <td><span contenteditable="true" class="editable-word" id="d3">بُصِرَ</span></td>
        </tr>
        <tr style="background: #f0fff4;">
            <td class="side-label" style="background: #38a169;">بالكسرة</td>
            <td><span contenteditable="true" class="editable-word" id="k1">صِغَرُ</span></td>
            <td><span contenteditable="true" class="editable-word" id="k2">رَصِفَ</span></td>
            <td><span contenteditable="true" class="editable-word" id="k3">نَصِفُ</span></td>
        </tr>
        <tr style="background: #ebf8ff;">
            <td class="side-label" style="background: #3182ce;">مد الألف</td>
            <td><span contenteditable="true" class="editable-word" id="a1">صَادَ</span></td>
            <td><span contenteditable="true" class="editable-word" id="a2">صَامَ</span></td>
            <td><span contenteditable="true" class="editable-word" id="a3">صَاحَ</span></td>
        </tr>
        <tr style="background: #faf5ff;">
            <td class="side-label" style="background: #805ad5;">مد الواو</td>
            <td><span contenteditable="true" class="editable-word" id="w1">صُوصُ</span></td>
            <td><span contenteditable="true" class="editable-word" id="w2">نَصُومُ</span></td>
            <td><span contenteditable="true" class="editable-word" id="w3">يَصُونُ</span></td>
        </tr>
        <tr style="background: #fff5f7;">
            <td class="side-label" style="background: #d53f8c;">مد الياء</td>
            <td><span contenteditable="true" class="editable-word" id="y1">رَصِيدُ</span></td>
            <td><span contenteditable="true" class="editable-word" id="y2">نَصِيدُ</span></td>
            <td><span contenteditable="true" class="editable-word" id="y3">بَصِيرُ</span></td>
        </tr>
    </table>
</div>

<script>
    // قاعدة بيانات بسيطة للكلمات (يمكنك إضافة المزيد من الحروف هنا)
    const data = {
        "ص": {
            f: ["صَبَرَ", "رَصَدَ", "نَصَرَ"], d: ["صُورَ", "نُصِرَ", "بُصِرَ"], k: ["صِغَرُ", "رَصِفَ", "نَصِفُ"],
            a: ["صَادَ", "صَامَ", "صَارَ"], w: ["صُوصُ", "نَصُومُ", "يَصُونُ"], y: ["رَصِيدُ", "نَصِيدُ", "عَصِيرُ"]
        },
        "ب": {
            f: ["بَحَثَ", "عَبَرَ", "كَتَبَ"], d: ["بُورِكَ", "خُبِزَ", "طُبِخَ"], k: ["بِصِيرُ", "رَبِحَ", "شَرِبَ"],
            a: ["بَاعَ", "بَانَ", "بَابُ"], w: ["حُبُوبُ", "تَبُوحُ", "يَبُورُ"], y: ["طَبِيبُ", "حَبِيبُ", "نَبِيلُ"]
        }
        // يمكنك إضافة باقي الحروف بنفس الطريقة
    };

    function updateWords() {
        const char = document.getElementById('charSelector').value;
        const words = data[char];
        
        if(words) {
            for(let i=1; i<=3; i++) {
                document.getElementById('f'+i).innerText = words.f[i-1];
                document.getElementById('d'+i).innerText = words.d[i-1];
                document.getElementById('k'+i).innerText = words.k[i-1];
                document.getElementById('a'+i).innerText = words.a[i-1];
                document.getElementById('w'+i).innerText = words.w[i-1];
                document.getElementById('y'+i).innerText = words.y[i-1];
            }
            applyHighlight(char);
        }
    }

    function applyHighlight(char) {
        const elements = document.querySelectorAll('.editable-word');
        elements.forEach(el => {
            let text = el.innerText;
            // تلوين الحرف مع أي حركة تتبعه (فتحة، ضمة، كسرة، سكون)
            const regex = new RegExp(`(${char}[\u064B-\u0652]?)`, 'g');
            el.innerHTML = text.replace(regex, '<span class="highlight">$1</span>');
        });
    }

    // تشغيل التلوين عند البدء
    window.onload = () => applyHighlight('ص');
</script>

</body>
</html>
