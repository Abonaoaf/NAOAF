<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة نواف الفيفي الذكية</title>
    <style>
        :root {
            --target-color: #ff0000;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
            user-select: none;
        }

        .main-title {
            font-size: 36px;
            color: #ffce00;
            text-shadow: 2px 2px #000;
            margin: 10px 0 5px 0;
        }

        .sub-title {
            font-size: 20px;
            color: #4caf50;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* الجزء العلوي: اختيار الحرف واللون */
        .selection-zone {
            background: #333;
            padding: 15px;
            border-radius: 15px;
            width: 95%;
            max-width: 1000px;
            margin-bottom: 15px;
            border: 3px solid #555;
        }

        /* شبكة مربعات أكبر */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 10px;
        }

        .btn {
            font-size: 32px; /* حجم خط أكبر */
            height: 70px;   /* ارتفاع أكبر للمربعات */
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: white;
            color: black;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .char-select-btn.active {
            background: var(--target-color);
            color: white;
            box-shadow: 0 0 15px var(--target-color);
            transform: scale(1.05);
        }

        /* أيقونة اختيار اللون */
        .color-picker-container {
            background: #444;
            border: 3px solid #fff;
            position: relative;
        }

        .color-picker-container input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* السبورة */
        .board {
            width: 95%;
            max-width: 1000px;
            background: white;
            border: 15px solid #5d4037;
            border-radius: 25px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #displayArea {
            font-size: 140px;
            font-weight: bold;
            text-align: center;
            line-height: 1.1;
        }

        .highlight { color: var(--target-color); }

        /* منطقة التحكم السفلية */
        .keyboard-zone {
            background: #222;
            padding: 20px;
            border-radius: 25px;
            width: 95%;
            max-width: 1000px;
            border: 2px solid #444;
        }

        .btn-harkat { background: #4caf50; color: white; font-size: 45px; }
        .btn-special { background: #9c27b0; color: white; font-size: 45px; }
        .btn-tanwin { background: #2196f3; color: white; font-size: 45px; }
        .write-btn { background: #eee; color: #333; font-size: 35px; }
        
        .action-btns {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-action { 
            font-size: 22px; 
            padding: 20px; 
            border-radius: 15px; 
            color: white; 
            border:none; 
            cursor:pointer; 
            font-weight: bold;
        }
        .btn-space { background: #555; }
        .btn-delete { background: #c0392b; }
        .btn-clear { background: #7f8c8d; }

        .section-title { font-size: 18px; color: #ffaaaa; margin-bottom: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-title">نواف الفيفي - سبورتي الذكية</div>
    <div class="sub-title">لكل أصدقائي 🌟</div>

    <div class="selection-zone">
        <div class="section-title">1. اختر حرف الدرس واللون:</div>
        <div class="grid" id="selectGrid"></div>
    </div>

    <div class="board">
        <div id="displayArea">...</div>
    </div>

    <div class="keyboard-zone">
        <div class="section-title">2. اكتب الكلمة بالحركات:</div>
        
        <div class="grid" style="grid-template-columns: repeat(8, 1fr); margin-bottom: 20px;">
            <button class="btn btn-harkat" onclick="addChar('َ')">َ</button>
            <button class="btn btn-harkat" onclick="addChar('ُ')">ُ</button>
            <button class="btn btn-harkat" onclick="addChar('ِ')">ِ</button>
            <button class="btn btn-special" onclick="addChar('ْ')">ْ</button>
            <button class="btn btn-special" onclick="addChar('ّ')">ّ</button>
            <button class="btn btn-tanwin" onclick="addChar('ً')">ً</button>
            <button class="btn btn-tanwin" onclick="addChar('ٌ')">ٌ</button>
            <button class="btn btn-tanwin" onclick="addChar('ٍ')">ٍ</button>
        </div>

        <div class="grid" id="writeGrid"></div>

        <div class="action-btns">
            <button class="btn-action btn-space" onclick="addChar(' ')">مسافة كبيرة ⎵</button>
            <button class="btn-action btn-delete" onclick="deleteLast()">مسح حرف ⌫</button>
            <button class="btn-action btn-clear" onclick="clearAll()">كلمة جديدة 🗑️</button>
        </div>
    </div>

    <script>
        const allChars = "أإآبتثجحخدذرزسشصضطظعغفقكلمنهويةوي";
        let targetChar = 'ب';
        let currentWord = "";

        const selectGrid = document.getElementById('selectGrid');
        const writeGrid = document.getElementById('writeGrid');
        const displayArea = document.getElementById('displayArea');

        // بناء لوحة اختيار الحرف
        allChars.split('').forEach(c => {
            const sBtn = document.createElement('button');
            sBtn.className = 'btn char-select-btn';
            if(c === targetChar) sBtn.classList.add('active');
            sBtn.innerText = c;
            sBtn.onclick = () => {
                document.querySelectorAll('.char-select-btn').forEach(b => b.classList.remove('active'));
                sBtn.classList.add('active');
                targetChar = c;
                updateDisplay();
            };
            selectGrid.appendChild(sBtn);

            // بناء لوحة الكتابة (نفس الحروف بمربعات كبيرة)
            const wBtn = document.createElement('button');
            wBtn.className = 'btn write-btn';
            wBtn.innerText = c;
            wBtn.onclick = () => addChar(c);
            writeGrid.appendChild(wBtn);
        });

        // إضافة اختيار اللون
        const colorContainer = document.createElement('div');
        colorContainer.className = 'btn color-picker-container';
        colorContainer.innerHTML = `🎨<input type="color" id="picker" value="#ff0000">`;
        colorContainer.querySelector('input').oninput = (e) => {
            document.documentElement.style.setProperty('--target-color', e.target.value);
            updateDisplay();
        };
        selectGrid.appendChild(colorContainer);

        function addChar(c) {
            currentWord += c;
            updateDisplay();
        }

        function deleteLast() {
            currentWord = currentWord.slice(0, -1);
            updateDisplay();
        }

        function clearAll() {
            currentWord = "";
            updateDisplay();
        }

        function updateDisplay() {
            const regex = new RegExp(`(${targetChar}[\u064B-\u0652]?)`, 'g');
            const formatted = currentWord.replace(regex, `<span class="highlight">$1</span>`);
            displayArea.innerHTML = formatted || "...";
        }
    </script>
</body>
</html>
