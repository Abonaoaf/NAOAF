<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرب القراءة للبطل نواف</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { background: white; max-width: 950px; margin: auto; border: 4px solid #333; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #e63946; color: white; padding: 20px; font-size: 32px; font-weight: bold; }
        .controls { background: #f8f9fa; padding: 20px; border-bottom: 2px solid #eee; }
        select { font-size: 28px; padding: 8px 30px; border-radius: 10px; border: 2px solid #e63946; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 1px solid #ddd; height: 120px; font-size: 75px; font-weight: bold; position: relative; }
        .side-label { background: #2c3e50; color: white; font-size: 22px; width: 120px; }
        
        /* تلوين الحرف المختار */
        .red-char { color: #e63946; }

        /* ألوان الصفوف */
        .fatha { background-color: #fff5f5; }
        .damma { background-color: #fffaf0; }
        .kasra { background-color: #f0fff4; }
        .alif  { background-color: #ebf8ff; }
        .waw   { background-color: #faf5ff; }
        .yaa   { background-color: #fff5f7; }

        /* منطقة الكتابة */
        .word-input { width: 100%; height: 100%; outline: none; display: flex; align-items: center; justify-content: center; }
        .footer { padding: 15px; background: #eee; font-size: 22px; font-weight: bold; color: #e63946; }
    </style>
</head>
<body>

            <option value="غ">غ</option><option value="ف">ف</option><option value="ق">ق</option>

            <td><div contenteditable="true" class="word-input" id="w8"></div></td>
            <td><div contenteditable="true" class="word-input" id="w9"></div></td>
        </tr>

            <td><div contenteditable="true" class="word-input" id="w14"></div></td>
            <td><div contenteditable="true" class="word-input" id="w15"></div></td>
        </tr>
        <tr class="yaa"><td class="side-label">مد الياء</td>
            <td><div contenteditable="true" class="word-input" id="w16"></div></td>
            <td><div contenteditable="true" class="word-input" id="w17"></div></td>
            <td><div contenteditable="true" class="word-input" id="w18"></div></td>
        </tr>
    </table>

    <div class="footer">نقرأ كثيراً.. لنصبح أذكى بإذن الله! 💪</div>
</div>

function refreshWords() {
    const char = document.getElementById('mainChar').value;
    const words = data[char];
    
    for (let i = 1; i <= 18; i++) {
        const word = words[i-1];
        const cell = document.getElementById('w' + i);
        
        // تلوين الحرف مع الحركة (نبحث عن الحرف متبوعاً بأي تشكيل)
        const regex = new RegExp(`(${char}[\u064B-\u0652]?)`, 'g');
        cell.innerHTML = word.replace(regex, `<span class="red-char">$1</span>`);
        
        // إضافة ميزة تلوين الحرف أثناء الكتابة اليدوية
        cell.oninput = function() {
            const currentText = this.innerText;
            const selection = window.getSelection();
            const offset = selection.focusOffset;
            this.innerHTML = currentText.replace(regex, `<span class="red-char">$1</span>`);
            // محاولة إرجاع المؤشر لمكانه (تقريبية)
            const range = document.createRange();
            range.setStart(this.childNodes[0] || this, offset);
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);
        };
    }
}

// تشغيل عند التحميل
window.onload = refreshWords;
</script>

</html>
